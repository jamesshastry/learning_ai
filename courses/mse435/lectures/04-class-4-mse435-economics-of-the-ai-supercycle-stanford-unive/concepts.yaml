concepts:
  - name: The Context Problem
    aliases:
      - Enterprise Context Gap
      - John or Jane Problem
    definition: >-
      The thesis that AI failures in enterprises are not due to insufficient model intelligence (AGI already
      exists) but because models lack the institutional knowledge that key employees hold in their heads —
      organizational processes, domain-specific procedures, tribal knowledge accumulated over decades.
    tags:
      - enterprise
      - application
      - theory
    timestamps:
      - '05:20'
      - '05:46'
      - '06:07'
      - '15:15'
    relations:
      - target: Dynamo-to-Computer Parallel
        type: related_to
        note: Both describe the gap between technology availability and organizational readiness.
      - target: Jagged Frontier
        type: enables
        note: The context problem explains why AI's frontier is jagged — it fails where context is needed most.

  - name: Dynamo-to-Computer Parallel
    aliases:
      - Technology Adoption Lag
      - Solow Paradox
    definition: >-
      Historical pattern from a 1990 Stanford research paper showing that the electric motor took 40 years
      (1880-1920) to impact factory productivity because organizations simply swapped steam engines for electric
      ones without redesigning processes. The same pattern repeated with PCs (used as typewriters) and is now
      repeating with AI.
    tags:
      - theory
      - history
      - economics
    timestamps:
      - '17:08'
      - '18:22'
      - '18:37'
      - '19:36'
    relations:
      - target: The Context Problem
        type: related_to
        note: Both explain why transformative technology fails to deliver immediate productivity gains.
      - target: Process Rewiring
        type: enables
        note: The dynamo parallel shows that productivity gains require fundamental process redesign.

  - name: Process Rewiring
    aliases:
      - First-Principles Process Redesign
    definition: >-
      The practice of redesigning organizational processes from first principles to leverage AI, rather than
      simply overlaying AI on existing workflows. Illustrated by Databricks reducing connector development
      from 9 months (1 connector) to 1 quarter (7 connectors) not through AI alone but through process changes
      in requirements gathering, testing, and team structure.
    tags:
      - application
      - enterprise
      - optimization
    timestamps:
      - '21:09'
      - '23:15'
      - '23:46'
      - '24:01'
    relations:
      - target: Dynamo-to-Computer Parallel
        type: part_of
        note: Process rewiring is what was needed to capture productivity gains from the dynamo/electric motor.
      - target: The Context Problem
        type: enables
        note: Getting context into AI systems requires process rewiring, not just technical integration.

  - name: Jagged Frontier
    aliases:
      - Ethan Mollick's Jagged Frontier
    definition: >-
      Ethan Mollick's concept that AI capability is not uniformly distributed across tasks — AI is excellent
      at some skills (e.g., coding, certain analysis) but terrible at others (e.g., complex support, nuanced
      judgment), creating an uneven "jagged" capability frontier rather than a smooth improvement curve.
    tags:
      - theory
      - application
    timestamps:
      - '13:46'
      - '13:53'
      - '14:00'
    relations:
      - target: The Context Problem
        type: related_to
        note: Many gaps in the jagged frontier correspond to areas where organizational context is needed.
      - target: Seven Powers Framework
        type: related_to
        note: Companies can build moats in areas where AI's frontier is still jagged.

  - name: Seven Powers Framework
    aliases:
      - Hamilton Helmer Framework
      - Business Moats
    definition: >-
      Hamilton Helmer's framework identifying seven durable competitive advantages (economies of scale, brand,
      switching costs, network effects, cornered resource, counter-positioning, process power). In the AI era,
      while barriers to entry and switching costs decrease, moats from data, scale, brand, and trust remain
      powerful differentiators.
    tags:
      - theory
      - business
      - economics
    timestamps:
      - '10:49'
      - '10:55'
      - '11:02'
    relations:
      - target: Token Factory Economics
        type: contrasts_with
        note: Companies with Seven Powers moats can avoid commodity economics; those without become token factories.
      - target: Open Source Convergence
        type: related_to
        note: Open source lowers barriers to entry, but other moats (data, brand, scale) remain.

  - name: Token Factory Economics
    aliases:
      - Commodity Intelligence
      - Amazon Book Model
    definition: >-
      Ali Ghodsi's prediction that frontier model providers will operate like Amazon.com's book-selling
      business — high volume, economies of scale, but tiny gross margins and small operating margins.
      Very few companies will sustain this model, and the business will consolidate to an oligopoly.
    tags:
      - economics
      - business
    timestamps:
      - '33:13'
      - '33:26'
      - '33:36'
    relations:
      - target: Open Source Convergence
        type: enables
        note: Open source pricing pressure drives frontier models toward commodity economics.
      - target: AI Value Chain Triangle
        type: related_to
        note: Token factory economics would accelerate the triangle flip as model-layer margins compress.

  - name: Open Source Convergence
    aliases:
      - Open Source vs Frontier Gap
    definition: >-
      The rapidly shrinking gap between open-source and proprietary frontier models, now down to approximately
      one month (from 3-4 months previously). Illustrated by Moonshot's Kimi 2.6 release, which would have
      been the best model in history if released just 5 months earlier.
    tags:
      - economics
      - compute
      - application
    timestamps:
      - '32:22'
      - '32:28'
      - '33:58'
      - '34:02'
    relations:
      - target: Token Factory Economics
        type: enables
        note: Open source convergence is the primary force driving frontier models toward commodity pricing.
      - target: Seven Powers Framework
        type: contrasts_with
        note: Open source eliminates the software moat; other moats must compensate.

  - name: Multicast Problem Fallacy
    aliases:
      - Irrelevant Hot Problem
    definition: >-
      Ali Ghodsi's cautionary analogy from his PhD: the "multicast problem" was the hottest networking
      challenge of 2000 that no one has heard of today because bandwidth costs collapsed. Lesson: the
      currently-hyped technical problems (chips, AGI race) may turn out to be irrelevant, while unexpected
      applications (like Airbnb, 9 years after the internet) will create real value.
    tags:
      - theory
      - history
    timestamps:
      - '26:26'
      - '26:37'
      - '36:32'
      - '37:23'
    relations:
      - target: Dynamo-to-Computer Parallel
        type: related_to
        note: Both are historical patterns showing that the transformative applications are often unexpected.

  - name: SaaS Disruption Gradient
    aliases:
      - Software Vulnerability Spectrum
    definition: >-
      The spectrum of vulnerability for existing software companies: (1) companies with data moats and core-loop
      positioning (cybersecurity) are most robust; (2) workflow software that hasn't innovated in 10 years is
      most vulnerable; (3) any company can survive if it innovates, leverages existing data/customers/scale,
      and adapts its pricing/cost structure.
    tags:
      - economics
      - business
      - application
    timestamps:
      - '12:43'
      - '12:50'
      - '13:07'
    relations:
      - target: Seven Powers Framework
        type: enables
        note: Position on the disruption gradient correlates with which of the Seven Powers a company holds.
      - target: Open Source Convergence
        type: related_to
        note: Open source convergence accelerates disruption of companies without strong moats.
