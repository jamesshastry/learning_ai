concepts:
  - name: AI Value Chain Triangle
    aliases:
      - AI Revenue Pyramid
      - Inverted Triangle
    definition: >-
      The distribution of revenue across the AI ecosystem layers (semis, infrastructure, models, apps), currently
      shaped as an inverted triangle with semis capturing ~75% of revenue — opposite to the mature cloud ecosystem
      where apps/SaaS dominate.
    tags:
      - economics
      - theory
      - infrastructure
    timestamps:
      - '05:34'
      - '06:00'
      - '11:10'
      - '31:22'
      - '32:39'
    relations:
      - target: Supercycle Comparison
        type: related_to
        note: Historical supercycles (internet, mobile, cloud) all evolved from infra-heavy to app-heavy revenue distribution.
      - target: Marginal Cost of Intelligence
        type: enables
        note: The high marginal cost of AI inference is a key reason the triangle hasn't flipped.

  - name: Marginal Cost of Intelligence
    aliases:
      - Cost of Serving AI Users
      - AI Unit Economics
    definition: >-
      Unlike traditional software with near-zero marginal distribution costs, each incremental AI user requires
      significant GPU compute for inference, making AI businesses fundamentally more expensive to scale and
      challenging the 80-90% gross margins typical of SaaS.
    tags:
      - economics
      - infrastructure
      - business
    timestamps:
      - '08:36'
      - '09:02'
      - '09:10'
    relations:
      - target: AI Value Chain Triangle
        type: part_of
        note: High marginal costs explain why app-layer revenue remains small relative to semis.
      - target: Training vs Inference Split
        type: related_to
        note: Inference compute is what drives marginal cost per user.

  - name: Supercycle Comparison
    aliases:
      - Technology Supercycles
      - Historical Tech Cycles
    definition: >-
      Framework comparing AI to prior technology revolutions (internet ~25 years ago, mobile ~20 years ago,
      cloud ~10 years ago) in terms of value chain evolution, timing, and how long it took for the revenue
      distribution to shift from infrastructure-heavy to application-heavy.
    tags:
      - theory
      - economics
      - history
    timestamps:
      - '06:50'
      - '09:54'
      - '14:23'
      - '22:48'
    relations:
      - target: AI Value Chain Triangle
        type: enables
        note: Historical supercycles provide the template for predicting when AI's triangle will flip.
      - target: CapEx Cycle Dynamics
        type: related_to
        note: Each supercycle had a heavy CapEx phase before value migrated up the stack.

  - name: CapEx Cycle Dynamics
    aliases:
      - Capital Expenditure Cycles
      - Infrastructure Investment Timing
    definition: >-
      The timing mismatch between massive upfront capital investment in AI infrastructure (chips, data centers)
      built for 5-6 year periods and the application revenue that is generated in real-time, creating cyclical
      phases of inflated infrastructure valuations.
    tags:
      - economics
      - infrastructure
      - business
    timestamps:
      - '14:15'
      - '14:30'
      - '17:38'
    relations:
      - target: Supercycle Comparison
        type: part_of
        note: CapEx timing dynamics are a recurring pattern across all tech supercycles.
      - target: AI Value Chain Triangle
        type: enables
        note: CapEx cycles inflate the bottom of the triangle, delaying the flip.

  - name: Consumer AI Monetization
    aliases:
      - AI Revenue Models
      - AI Ads vs Subscriptions
    definition: >-
      The challenge of monetizing consumer AI applications, where ChatGPT monetizes at ~$10/user/year compared
      to Google's $100/user/year and Meta's $70/user/year. Subscription models may be insufficient; advertising
      with superior intent understanding could be the key unlock.
    tags:
      - economics
      - business
      - application
    timestamps:
      - '34:06'
      - '37:00'
      - '38:00'
      - '38:25'
    relations:
      - target: AI Value Chain Triangle
        type: enables
        note: Consumer monetization improvements would grow the apps layer and help flip the triangle.
      - target: Consumer AI Scale Categories
        type: related_to
        note: Monetization strategies differ based on whether AI reaches utility, social, or niche app scale.

  - name: Consumer AI Scale Categories
    aliases:
      - App Scale Tiers
    definition: >-
      Three tiers of consumer app scale: mandatory utilities (3B+ users, e.g., WhatsApp, Chrome), social
      platforms (1.5-2B users, e.g., Instagram, TikTok), and niche apps (500M-1B users, e.g., Spotify, Twitter).
      ChatGPT currently sits at niche app scale, heading toward social.
    tags:
      - economics
      - application
    timestamps:
      - '34:55'
      - '35:42'
      - '36:50'
    relations:
      - target: Consumer AI Monetization
        type: enables
        note: The terminal scale category determines the total addressable monetization opportunity.

  - name: Training vs Inference Split
    aliases:
      - Training-Inference Ratio
    definition: >-
      The allocation of GPU compute between model training (~60%) and inference serving (~40%) as reported by
      Nvidia, with expectations that inference will grow over time as AI products scale. Training workloads are
      predictable and sustained; inference is bursty and follows human usage patterns.
    tags:
      - infrastructure
      - economics
      - compute
    timestamps:
      - '18:37'
      - '18:54'
      - '19:02'
    relations:
      - target: Marginal Cost of Intelligence
        type: enables
        note: Inference compute directly drives the marginal cost of serving AI users.
      - target: AI Value Chain Triangle
        type: related_to
        note: The shift toward inference-heavy compute could change the economics of the entire stack.

  - name: Vertical Integration Advantage
    aliases:
      - Full-Stack Integration
    definition: >-
      Historical pattern where the biggest winners of each technology supercycle were vertically integrated
      players: Google (internet, ~$3T), Apple (mobile, ~$2.5T), Meta (social, ~$2T). This suggests the
      biggest AI winner may also be vertically integrated across the stack.
    tags:
      - theory
      - business
      - economics
    timestamps:
      - '22:48'
      - '23:00'
      - '23:30'
    relations:
      - target: Supercycle Comparison
        type: part_of
        note: Vertical integration was the winning strategy in prior supercycles.
      - target: AI Value Chain Triangle
        type: related_to
        note: A vertically integrated AI winner could dominate multiple layers of the triangle.

  - name: ASIC Competition
    aliases:
      - Custom AI Chips
      - Alternative Accelerators
    definition: >-
      The competitive landscape of custom AI chips (Google TPU, Meta MTIA, Amazon Trainium, etc.) that could
      challenge Nvidia's GPU dominance. A breakout ASIC success would be the biggest repricing event in the
      semis layer and could accelerate the triangle flip.
    tags:
      - infrastructure
      - economics
      - compute
    timestamps:
      - '17:12'
      - '17:18'
      - '21:25'
    relations:
      - target: AI Value Chain Triangle
        type: enables
        note: ASIC success would compress semis margins and redistribute value up the stack.
      - target: Marginal Cost of Intelligence
        type: enables
        note: Better ASICs could reduce the per-token cost of inference.
