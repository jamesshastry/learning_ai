concepts:
  - name: Responsible Scaling Policy
    aliases: [RSP]
    definition: >-
      Anthropic's framework for tying AI deployment decisions to empirically measured capability
      thresholds, using mandatory if-then commitments that specify required safety measures
      before models at each capability level can be deployed.
    tags: [safety, governance, policy]
    timestamps: ['01:24', '05:00', '10:00']
    relations:
      - target: ASL Levels
        type: contains
        note: RSP defines the ASL level framework for capability assessment.
      - target: Capability Evaluation
        type: requires
        note: RSP decisions are based on systematic capability evaluations.
  - name: ASL Levels
    aliases: [AI Safety Levels, Anthropic Safety Levels]
    definition: >-
      A tiered classification system (ASL-1 through ASL-4+) defining escalating AI capability
      levels with corresponding safety requirements — from no meaningful risk (ASL-1) to
      expert-level capabilities across domains requiring nation-state-level containment (ASL-4).
    tags: [safety, evaluation, governance]
    timestamps: ['12:00', '15:00', '18:03']
    relations:
      - target: Responsible Scaling Policy
        type: part_of
        note: ASL levels are the core assessment framework within RSP.
      - target: Capability Evaluation
        type: determined_by
        note: ASL classification is determined through systematic capability evaluation.
  - name: Computer Use Agent
    aliases: [Desktop Agent, Screen-Based Agent]
    definition: >-
      An AI agent that interacts with desktop computing environments by observing screenshots
      and generating mouse/keyboard actions, enabling general-purpose computer operation
      without application-specific APIs — demonstrated by Anthropic's Claude.
    tags: [agents, application, architecture]
    timestamps: ['25:00', '30:00']
    relations:
      - target: Agent-Computer Interface
        type: alternative_to
        note: Computer use agents use visual interfaces rather than command-line ACIs.
  - name: Capability Evaluation
    aliases: [Dangerous Capability Assessment, Elicitation Framework]
    definition: >-
      Systematic evaluation of AI models for dangerous capabilities across four categories:
      CBRN (weapons), cyber attacks, autonomous replication, and model autonomy — using
      specialized elicitation techniques to test for latent capabilities.
    tags: [safety, evaluation, methodology]
    timestamps: ['08:00', '12:00', '17:00']
    relations:
      - target: ASL Levels
        type: determines
        note: Capability evaluations determine which ASL level a model falls into.
      - target: Responsible Scaling Policy
        type: informs
        note: Evaluation results drive RSP deployment decisions.
  - name: Long-Term Benefit Trust
    aliases: [LTBT]
    definition: >-
      Anthropic's novel governance structure that progressively cedes corporate control to
      elected board members with no financial interest in Anthropic, ensuring safety and
      public benefit interests govern decisions as AI becomes more powerful.
    tags: [governance, safety, organization]
    timestamps: ['43:42', '43:57']
    relations:
      - target: Responsible Scaling Policy
        type: governs
        note: The LTBT oversees the implementation of RSP at the organizational level.
