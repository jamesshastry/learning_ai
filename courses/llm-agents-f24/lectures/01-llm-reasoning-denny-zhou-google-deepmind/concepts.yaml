concepts:
  - name: Chain-of-Thought Prompting
    aliases:
      - CoT
      - Step-by-Step Reasoning
    definition: >-
      A prompting technique where intermediate reasoning steps are included in few-shot examples,
      enabling LLMs to generate step-by-step reasoning before producing final answers, dramatically
      improving performance on complex tasks.
    tags:
      - reasoning
      - prompting
      - theory
    timestamps:
      - '12:05'
      - '17:54'
      - '22:03'
      - '29:57'
    relations:
      - target: Self-Consistency
        type: enables
        note: Chain-of-thought produces diverse reasoning paths that self-consistency can aggregate.
      - target: Least-to-Most Prompting
        type: related_to
        note: Both are reasoning strategies using intermediate steps, with least-to-most adding decomposition.

  - name: Self-Consistency
    aliases:
      - Majority Voting
      - Marginal Inference
    definition: >-
      A decoding strategy that samples multiple reasoning paths from an LLM and selects the most
      frequent final answer via majority vote, grounded in the machine learning principle of
      maximum marginal inference over latent reasoning paths.
    tags:
      - reasoning
      - optimization
      - theory
    timestamps:
      - '46:25'
      - '47:07'
      - '48:06'
      - '49:54'
    relations:
      - target: Chain-of-Thought Prompting
        type: requires
        note: Self-consistency requires intermediate reasoning steps to generate diverse paths.
      - target: Chain-of-Thought Decoding
        type: related_to
        note: Both leverage multiple generation paths; CoT decoding explores via top-k tokens.

  - name: Least-to-Most Prompting
    aliases:
      - Problem Decomposition Prompting
    definition: >-
      A prompting strategy inspired by Polya's problem-solving methodology that decomposes complex
      problems into simpler subproblems, solving them sequentially from easiest to hardest, enabling
      easy-to-hard generalization with minimal demonstrations.
    tags:
      - reasoning
      - prompting
      - application
    timestamps:
      - '24:32'
      - '26:07'
      - '26:52'
    relations:
      - target: Chain-of-Thought Prompting
        type: extends
        note: Adds structured decomposition on top of basic step-by-step reasoning.
      - target: Compositional Generalization
        type: enables
        note: Achieves 99.7% on SCAN with 0.1% data through systematic decomposition.

  - name: Analogical Reasoning
    aliases:
      - LLMs as Analogical Reasoners
    definition: >-
      A zero-shot reasoning approach where the LLM self-generates relevant examples and knowledge
      for each new problem by recalling related problems, inspired by Polya's method of solving
      by analogy, outperforming both zero-shot CoT and manual few-shot CoT.
    tags:
      - reasoning
      - prompting
      - application
    timestamps:
      - '34:15'
      - '35:55'
      - '36:07'
      - '37:28'
    relations:
      - target: Chain-of-Thought Prompting
        type: extends
        note: Generates task-specific examples adaptively rather than using fixed demonstrations.
      - target: Self-Consistency
        type: complementary
        note: Can be combined with self-consistency for further improvement.

  - name: Chain-of-Thought Decoding
    aliases:
      - CoT Decoding
    definition: >-
      A decoding technique showing that pre-trained LLMs contain chain-of-thought reasoning paths
      among top-k token alternatives at the first decoding step, enabling step-by-step reasoning
      without any prompting by exploring alternative starting tokens.
    tags:
      - reasoning
      - theory
      - architecture
    timestamps:
      - '38:46'
      - '39:21'
      - '41:16'
      - '42:53'
    relations:
      - target: Chain-of-Thought Prompting
        type: alternative_to
        note: Achieves reasoning without any prompt engineering through decoding strategy.
      - target: Self-Consistency
        type: related_to
        note: Both leverage multiple generation paths for improved accuracy.

  - name: Intermediate Step Generation
    aliases:
      - Reasoning Steps
      - Scratchpad
    definition: >-
      The foundational principle that LLM performance improves dramatically when models generate
      intermediate computational steps before final answers, whether through training, fine-tuning,
      or prompting — mathematically proven to allow constant-depth transformers to solve any
      inherently serial problem.
    tags:
      - theory
      - reasoning
      - architecture
    timestamps:
      - '23:25'
      - '30:36'
      - '30:52'
      - '43:14'
    relations:
      - target: Chain-of-Thought Prompting
        type: foundation_of
        note: CoT prompting is one instantiation of the broader intermediate step principle.
      - target: Chain-of-Thought Decoding
        type: foundation_of
        note: CoT decoding reveals intermediate steps exist inherently in pretrained models.

  - name: Premise Order Sensitivity
    aliases:
      - Premise Order Effect
    definition: >-
      A fundamental LLM limitation where reordering the premises or sentences in reasoning
      problems causes significant performance drops (10+ points on math, 30+ on logic),
      revealing that LLMs process information sequentially and cannot reason flexibly
      about unordered premises.
    tags:
      - limitation
      - reasoning
      - evaluation
    timestamps:
      - '58:08'
      - '59:02'
      - '01:00:22'
      - '01:01:39'
    relations:
      - target: Irrelevant Context Distraction
        type: related_to
        note: Both reveal fundamental fragility in LLM reasoning capabilities.
      - target: LLM Self-Correction Failure
        type: related_to
        note: Both are limitations where LLMs fail at tasks trivial for humans.

  - name: LLM Self-Correction Failure
    aliases:
      - Self-Correction Limitation
    definition: >-
      The finding that LLMs cannot reliably self-correct their reasoning without oracle feedback —
      while review prompts can fix wrong answers, they equally risk corrupting correct ones,
      yielding no net improvement and sometimes degradation across benchmarks.
    tags:
      - limitation
      - reasoning
      - safety
    timestamps:
      - '53:42'
      - '54:39'
      - '55:20'
      - '57:09'
    relations:
      - target: Self-Consistency
        type: contrasts_with
        note: Self-consistency improves via sampling diversity; self-correction fails via iterative revision.
      - target: Self-Debug
        type: contrasts_with
        note: Self-debug succeeds because unit tests provide oracle feedback that general reasoning lacks.

  - name: Irrelevant Context Distraction
    aliases:
      - Context Sensitivity
    definition: >-
      An LLM limitation where adding irrelevant information to problem statements significantly
      decreases reasoning accuracy, mirroring findings from psychology about human problem-solving,
      with performance degrading as irrelevant context grows arbitrarily large.
    tags:
      - limitation
      - reasoning
      - safety
    timestamps:
      - '51:48'
      - '52:24'
      - '52:51'
      - '53:21'
    relations:
      - target: Premise Order Sensitivity
        type: related_to
        note: Both demonstrate fundamental fragility in how LLMs process input context.
      - target: RAG
        type: related_to
        note: Retrieval-augmented generation must manage context quality to avoid this distraction effect.

  - name: Self-Debug
    aliases:
      - Unit Test Self-Correction
    definition: >-
      A technique where LLMs correct their generated code by using unit test results as oracle
      feedback, naturally leveraging the availability of automated verification in coding tasks
      to achieve genuine self-improvement, unlike general reasoning self-correction.
    tags:
      - application
      - reasoning
      - code-generation
    timestamps:
      - '57:33'
      - '57:38'
    relations:
      - target: LLM Self-Correction Failure
        type: contrasts_with
        note: Succeeds where general self-correction fails because unit tests provide reliable oracle signal.
      - target: Agents for Software Development
        type: enables
        note: Self-debug is a core capability used in coding agent systems like SWE-agent.
