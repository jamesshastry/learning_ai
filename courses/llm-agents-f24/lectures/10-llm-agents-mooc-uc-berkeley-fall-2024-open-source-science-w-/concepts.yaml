concepts:
  - name: Open Source AI
    aliases: [Full Access AI]
    definition: >-
      The highest level of AI access providing full transparency into data, model architecture,
      training algorithms, and code — enabling fundamental research, reproducibility, and
      innovation that API-only or open-weights access cannot support.
    tags: [open-source, theory, infrastructure]
    timestamps: ['01:43', '05:00', '51:01']
    relations:
      - target: Three Levels of AI Access
        type: part_of
        note: Open source is the most permissive of the three access levels.
      - target: HELM
        type: enables
        note: Open access enables comprehensive, transparent benchmarking like HELM.
  - name: Generative Agents
    aliases: [Simulated Social Agents]
    definition: >-
      LLM-powered agents placed in virtual environments that exhibit emergent social behaviors
      through memory systems (episodic logs, semantic reflections) and planning, demonstrating
      information diffusion, social interactions, and community dynamics.
    tags: [agents, simulation, social]
    timestamps: ['17:56', '18:28', '18:47']
    relations:
      - target: Interview-Based Agent Creation
        type: extended_by
        note: Interview-based creation makes generative agents represent real individuals.
      - target: Long-Term Memory
        type: uses
        note: Generative agents rely on episodic and semantic long-term memory systems.
  - name: Interview-Based Agent Creation
    aliases: [Agent Simulation from Interviews]
    definition: >-
      A technique for creating AI agents that faithfully represent real individuals by using
      2-hour structured interviews as seed memory, achieving 85%+ behavioral fidelity across
      economic games, personality assessments, and social science experiments.
    tags: [agents, simulation, methodology]
    timestamps: ['19:12', '20:33', '21:01']
    relations:
      - target: Generative Agents
        type: extends
        note: Grounds generative agents in real human data rather than fictional characters.
  - name: HELM
    aliases: [Holistic Evaluation of Language Models]
    definition: >-
      Stanford's comprehensive, transparent benchmark framework for evaluating foundation
      models across multiple dimensions including accuracy, calibration, robustness, fairness,
      efficiency, and more — providing standardized comparison across models.
    tags: [benchmark, evaluation, transparency]
    timestamps: ['15:00']
    relations:
      - target: Open Source AI
        type: requires
        note: Comprehensive evaluation benefits from open access to models.
  - name: Three Levels of AI Access
    aliases: [Access Framework]
    definition: >-
      A framework categorizing AI access into API access (behavioral measurement only),
      open weights (fine-tuning and distillation possible), and open source (full reproducibility
      and innovation) — each enabling progressively deeper research capabilities.
    tags: [theory, open-source, infrastructure]
    timestamps: ['01:43', '01:55', '02:00']
    relations:
      - target: Open Source AI
        type: contains
        note: Open source is the most complete level in the three-tier framework.
