concepts:
  - name: Convolution
    aliases: [Convolutional Operation, Conv2D]
    definition: >-
      An operation that slides a small learned filter across an input image, performing element-wise
      multiplication and summation at each position to produce a feature map. Preserves spatial
      relationships and enables efficient local feature detection with far fewer parameters than
      fully connected layers.
    tags: [architecture, computer-vision]
    timestamps: ['17:00', '21:29']
    relations:
      - target: Feature Map
        type: produces
        note: Convolution produces feature maps showing where features are detected.
      - target: Convolutional Neural Network
        type: part_of
        note: Convolutions are the core operation in CNNs.
  - name: Feature Map
    aliases: [Activation Map]
    definition: >-
      The output of a convolutional layer showing the spatial locations where a particular learned
      feature (filter) was detected in the input. High positive values indicate strong matches;
      negative values indicate no match.
    tags: [computer-vision, representation]
    timestamps: ['23:41', '24:18']
    relations:
      - target: Convolution
        type: produced_by
        note: Feature maps are generated by convolution operations.
  - name: Convolutional Neural Network
    aliases: [CNN, ConvNet]
    definition: >-
      A neural network architecture designed for spatial data that uses convolutions, non-linearities,
      and pooling to learn hierarchical feature representations. Composed of a feature extraction
      backbone (conv + pool layers) and a task-specific head (dense layers for classification).
    tags: [architecture, computer-vision]
    timestamps: ['29:33', '38:18']
    relations:
      - target: Convolution
        type: contains
        note: Convolutions are the primary operation in CNNs.
      - target: Max Pooling
        type: contains
        note: Pooling layers reduce spatial dimensions between convolution layers.
  - name: Max Pooling
    aliases: [Pooling, Downsampling]
    definition: >-
      A downsampling operation that reduces the spatial dimensions of feature maps by taking the
      maximum value within non-overlapping patches (e.g., 2×2). Preserves the strongest detected
      features while increasing the relative receptive field of subsequent convolutional layers.
    tags: [architecture, computer-vision]
    timestamps: ['34:40', '35:06']
    relations:
      - target: Convolutional Neural Network
        type: part_of
        note: Max pooling is one of the three core operations in CNNs.
  - name: Receptive Field
    aliases: []
    definition: >-
      The region of the input image that influences a single neuron's activation in a convolutional
      layer. Grows larger with network depth due to pooling and stacked convolutions, enabling
      detection of increasingly large-scale features.
    tags: [architecture, computer-vision]
    timestamps: ['15:04', '33:14']
    relations:
      - target: Convolution
        type: property_of
        note: Each convolution defines the local receptive field size.
  - name: Object Detection
    aliases: [Detection, Bounding Box Prediction]
    definition: >-
      A computer vision task that identifies and localizes objects in images by predicting bounding
      boxes (x, y, width, height) and class labels for each detected object. Extends classification
      with spatial localization and variable numbers of predictions per image.
    tags: [task, computer-vision]
    timestamps: ['46:02', '47:17']
    relations:
      - target: R-CNN
        type: implemented_by
        note: R-CNN is a major approach to object detection.
  - name: Semantic Segmentation
    aliases: [Pixel-level Classification]
    definition: >-
      A computer vision task that assigns a class label to every pixel in an image, producing a
      dense classification map. Uses encoder-decoder architecture with downsampling (convolution +
      pooling) followed by upsampling to reconstruct full-resolution output.
    tags: [task, computer-vision]
    timestamps: ['51:25', '52:44']
    relations:
      - target: Convolutional Neural Network
        type: uses
        note: Semantic segmentation uses CNN encoders with added decoder networks.
  - name: R-CNN
    aliases: [Region-based CNN, Faster R-CNN]
    definition: >-
      An object detection architecture that uses a CNN to extract features from the full image,
      proposes candidate regions, then classifies each region. End-to-end differentiable, enabling
      backpropagation through the entire pipeline including region proposals.
    tags: [architecture, computer-vision]
    timestamps: ['49:41', '50:58']
    relations:
      - target: Object Detection
        type: implements
        note: R-CNN is a dominant approach to object detection.
