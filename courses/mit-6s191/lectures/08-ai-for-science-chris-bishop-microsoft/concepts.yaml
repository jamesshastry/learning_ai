concepts:
  - name: Deep Learning Emulator
    aliases: [Emulator, Neural Network Emulator, AI Emulator]
    definition: >-
      A neural network trained on synthetic data generated by physics simulators (solving differential
      equations) that produces equivalent predictions at 1000x+ speedup. Exploits the unlimited
      availability of simulation data while amortizing expensive data generation over millions of
      fast inference calls.
    tags: [architecture, ai-for-science]
    timestamps: ['07:25', '15:07']
    relations:
      - target: Bitter Lesson
        type: reconciles
        note: Emulators reconcile the bitter lesson with physics by converting equations into data.
  - name: No Free Lunch Theorem
    aliases: [NFL Theorem]
    definition: >-
      A fundamental theorem stating that learning is impossible from data alone; predictions require
      combining data with assumptions (prior knowledge, inductive bias). In science, data is scarce
      but inductive bias from known equations is extraordinarily rich.
    tags: [theory, fundamentals]
    timestamps: ['08:05', '08:15']
    relations:
      - target: Bitter Lesson
        type: tension_with
        note: The bitter lesson says data beats priors, but NFL says priors are always needed.
  - name: Bitter Lesson
    aliases: [Sutton's Bitter Lesson]
    definition: >-
      Rich Sutton's 2019 observation that throughout ML history, approaches using more data and compute
      have consistently overtaken those using clever domain-specific inductive bias. Recommends favoring
      scalable, general methods over specialized architectures.
    tags: [theory, scaling, philosophy]
    timestamps: ['12:20', '13:01']
    relations:
      - target: Deep Learning Emulator
        type: motivates
        note: Emulators follow the bitter lesson by converting physics knowledge into training data.
  - name: Density Functional Theory
    aliases: [DFT]
    definition: >-
      An exact reformulation of quantum mechanics (Schrodinger's equation) that replaces the exponentially
      expensive wave function with the electron density, a function of only 3 spatial dimensions. Reduces
      computational cost from exponential to cubic in electron count. Nobel Prize (Kohn, 1998). Accounts
      for ~1/3 of scientific supercomputer workloads.
    tags: [physics, chemistry, ai-for-science]
    timestamps: ['29:01', '31:53']
    relations:
      - target: Exchange Correlation Functional
        type: contains
        note: DFT's practical use requires the exchange correlation functional.
  - name: Exchange Correlation Functional
    aliases: [XC Functional, Scala]
    definition: >-
      A universal but analytically unknown function within density functional theory that captures
      quantum exchange and correlation effects on electron energy. One functional describes all of
      chemistry. 60+ years of handcrafted approximations exist (~800 functionals). Microsoft's
      Scala learns it via ML, achieving chemical accuracy with cubic scaling.
    tags: [physics, chemistry, ai-for-science]
    timestamps: ['34:04', '37:42']
    relations:
      - target: Density Functional Theory
        type: component_of
        note: The XC functional is the unknown component that makes DFT practical.
  - name: Chemical Accuracy
    aliases: [Kcal/mol Accuracy]
    definition: >-
      A precision threshold of approximately 1 kilocalorie per mole, representing the accuracy needed
      for computational chemistry predictions to match experimental results. Achieving this enables
      computational replacement of laboratory experiments. A very high bar due to the small energy
      differences involved in chemical reactions relative to total system energy.
    tags: [chemistry, metric]
    timestamps: ['27:42', '28:50']
    relations:
      - target: Exchange Correlation Functional
        type: target_of
        note: Chemical accuracy is the precision target for learned XC functionals.
  - name: Molecular Dynamics
    aliases: [MD, MD Simulation]
    definition: >-
      A computational method simulating atomic motion over time by integrating Newton's second law
      step-by-step. Requires quantum force calculations at each femtosecond time step, but biologically
      interesting events occur on millisecond scales, creating a curse of sequentiality requiring
      10^6 to 10^15 sequential steps.
    tags: [simulation, ai-for-science, biology]
    timestamps: ['41:40', '43:01']
    relations:
      - target: Deep Learning Emulator
        type: accelerated_by
        note: Emulators replace expensive quantum force calculations at each MD step.
  - name: Foundation Model for Science
    aliases: [Scientific Foundation Model]
    definition: >-
      A large neural network trained on diverse scientific simulation data across multiple domains,
      scales, and resolutions, then fine-tuned for specific applications. Analogous to LLM foundation
      models but for scientific prediction. Example: Earth system model trained on diverse weather data.
    tags: [architecture, ai-for-science]
    timestamps: ['21:33', '22:06']
    relations:
      - target: Deep Learning Emulator
        type: extends
        note: Foundation models generalize the emulator concept across scientific domains.
