concepts:
  - name: Deep Learning
    aliases:
      - DL
      - Representation Learning
    definition: >-
      A subset of machine learning that automatically learns hierarchical representations
      from raw unstructured data (images, text, audio) using neural networks with many layers,
      eliminating the need for manual feature engineering.
    tags:
      - theory
      - architecture
    timestamps:
      - "11:25"
      - "12:01"
    relations:
      - target: Neural Network
        type: enables
        note: Deep learning is implemented through neural networks with many layers
      - target: Feature Engineering
        type: contrasts_with
        note: Deep learning replaces manual feature engineering with automatic representation learning

  - name: Neural Network
    aliases:
      - Artificial Neural Network
      - ANN
      - DNN
    definition: >-
      A computational model consisting of layers of interconnected neurons (linear functions
      followed by non-linear activations) that repeatedly transform inputs before feeding them
      to a regression model for prediction.
    tags:
      - architecture
    timestamps:
      - "36:16"
      - "24:47"
    relations:
      - target: Deep Learning
        type: part_of
        note: Neural networks are the mechanism through which deep learning operates
      - target: Logistic Regression
        type: related_to
        note: Logistic regression is a neural network with zero hidden layers

  - name: Activation Function
    aliases:
      - Non-linearity
    definition: >-
      A function applied to a neuron's output that introduces non-linearity into the network,
      enabling it to learn complex patterns. Takes a single number in and outputs a single number.
    tags:
      - architecture
      - theory
    timestamps:
      - "34:19"
      - "41:46"
    relations:
      - target: ReLU
        type: related_to
        note: ReLU is the most commonly used activation function for hidden layers
      - target: Sigmoid
        type: related_to
        note: Sigmoid is used as the output activation for binary classification

  - name: ReLU
    aliases:
      - Rectified Linear Unit
    definition: >-
      An activation function defined as max(0, x) — passes positive values unchanged and
      squishes negative values to zero. Considered a key factor in deep learning's success
      due to its gradient-preserving properties and minimal non-linearity.
    tags:
      - architecture
      - optimization
    timestamps:
      - "43:28"
      - "45:26"
    relations:
      - target: Activation Function
        type: part_of
        note: ReLU is the default activation function for hidden layers
      - target: Vanishing Gradient Problem
        type: contrasts_with
        note: ReLU avoids vanishing gradients since its gradient is 1 for positive inputs

  - name: Feedforward Neural Network
    aliases:
      - Feed-forward Network
      - FFN
    definition: >-
      A neural network architecture where data flows strictly from input to output through
      successive layers, with no cycles or backward connections, in contrast to recurrent
      neural networks.
    tags:
      - architecture
    timestamps:
      - "55:22"
    relations:
      - target: Neural Network
        type: part_of
        note: Feedforward is the basic type of neural network architecture
      - target: Transformer
        type: related_to
        note: Transformers have largely replaced recurrent networks and use feedforward components

  - name: Weights and Biases
    aliases:
      - Parameters
      - Coefficients
    definition: >-
      The learnable parameters of a neural network. Weights are the coefficients multiplied
      with inputs in each neuron, and biases are the intercept terms. Together they define
      the network's learned function.
    tags:
      - training
      - architecture
    timestamps:
      - "29:39"
      - "29:49"
    relations:
      - target: Neural Network
        type: part_of
        note: Weights and biases are the trainable components of every neural network
      - target: Gradient Descent
        type: related_to
        note: Gradient descent is used to find optimal values for weights and biases

  - name: Polanyi's Paradox
    aliases:
      - Tacit Knowledge Problem
    definition: >-
      The observation that humans know more than they can articulate — we can perform
      cognitive tasks (like recognizing faces) but cannot fully explain the rules we use,
      making it impossible to encode such knowledge into rule-based AI systems.
    tags:
      - theory
    timestamps:
      - "03:23"
    relations:
      - target: Deep Learning
        type: enables
        note: Deep learning circumvents Polanyi's paradox by learning directly from data

  - name: Feature Engineering
    aliases:
      - Feature Extraction
      - Representation Engineering
    definition: >-
      The manual process of transforming raw unstructured data into structured numerical
      features suitable for machine learning models, historically a major bottleneck in AI.
    tags:
      - data
    timestamps:
      - "08:32"
      - "09:02"
    relations:
      - target: Deep Learning
        type: contrasts_with
        note: Deep learning eliminates the need for manual feature engineering

  - name: Generative AI
    aliases:
      - GenAI
    definition: >-
      A subset of deep learning focused on generating unstructured outputs (text, images,
      audio, video) rather than just consuming unstructured inputs. Includes LLMs,
      text-to-image models, and multimodal systems.
    tags:
      - application
    timestamps:
      - "18:32"
      - "19:00"
    relations:
      - target: Deep Learning
        type: part_of
        note: Generative AI is a specific application area within deep learning

  - name: Dense Layer
    aliases:
      - Fully Connected Layer
      - FC Layer
    definition: >-
      A neural network layer where every neuron is connected to every neuron in the
      adjacent layers, creating a complete bipartite graph of connections between layers.
    tags:
      - architecture
    timestamps:
      - "40:05"
    relations:
      - target: Neural Network
        type: part_of
        note: Dense layers are the basic building block of feedforward neural networks
