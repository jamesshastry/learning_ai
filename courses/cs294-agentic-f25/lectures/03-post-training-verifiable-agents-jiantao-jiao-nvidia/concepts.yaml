concepts:
  - name: Verifiable Agent
    aliases: [verifiable agentic model]
    definition: >-
      An agentic LLM trained to maximize verifiable correctness rewards (unit tests,
      math proofs, state comparisons) in addition to human preference, enabling reliable
      task completion in environments where wrong answers have concrete consequences.
    tags: [agents, training, verification]
    timestamps: ["00:07", "06:55"]
    relations:
      - target: Reinforcement Learning
        type: trained_via
        note: RL with verifiable rewards is the primary training method
      - target: Environment-Tool-Verifier Triad
        type: requires
        note: Training requires diverse environments, tools, and verifiers

  - name: Environment-Tool-Verifier Triad
    aliases: [agentic training data components]
    definition: >-
      The three essential components of agentic training data: environments (state
      descriptions like code repos), tools (APIs the agent can invoke), and verifiers
      (correctness checkers for agent outputs). Coverage across all three is critical.
    tags: [training, data, agents]
    timestamps: ["11:49", "16:42"]
    relations:
      - target: Verifiable Agent
        type: enables_training_of
        note: Diverse coverage across the triad produces more capable agents

  - name: Entropy Collapse
    aliases: [entropy loss collapse, mode collapse in RL]
    definition: >-
      A failure mode in RL training where the model's token generation probability
      distribution becomes increasingly peaked, destroying diversity of outputs. The
      model converges to producing a single answer per prompt, preventing further learning.
    tags: [training, failure-mode, RL]
    timestamps: ["57:13", "59:03"]
    relations:
      - target: On-Policy RL
        type: mitigated_by
        note: On-policy training helps maintain higher entropy
      - target: DAPO
        type: mitigated_by
        note: Decoupled clipping thresholds encourage exploration

  - name: GRPO
    aliases: [Group Relative Policy Optimization]
    definition: >-
      An RL algorithm for LLM training that uses relative advantages within a group of
      sampled responses to update the policy, with clipping for stability. Variants like
      DAPO decouple upper and lower clipping thresholds to encourage exploration.
    tags: [algorithm, RL, training]
    timestamps: ["01:02:43"]
    relations:
      - target: PPO
        type: variant_of
        note: GRPO extends PPO concepts with group-relative normalization
      - target: Entropy Collapse
        type: addresses
        note: DAPO variant specifically combats entropy collapse

  - name: On-Policy vs Off-Policy RL
    aliases: [on-policy learning, off-policy learning]
    definition: >-
      On-policy: train on trajectories generated by the current model version. Off-policy:
      train on trajectories from other models or older versions. On-policy produces better
      results because feedback is most useful when given on the learner's own mistakes.
    tags: [RL, training, algorithm]
    timestamps: ["01:00:07"]
    relations:
      - target: Entropy Collapse
        type: affects
        note: On-policy training better preserves entropy during RL

  - name: DAPO
    aliases: [Decoupled Alignment from Policy Optimization]
    definition: >-
      A GRPO variant that decouples the upper and lower clipping thresholds in the
      likelihood ratio, making the upper threshold larger to encourage the model to
      increase probability of rare but correct tokens, promoting exploration.
    tags: [algorithm, RL, training]
    timestamps: ["01:02:31"]
    relations:
      - target: GRPO
        type: variant_of
        note: DAPO modifies GRPO's clipping mechanism

  - name: Benchmark Separability
    aliases: [eval separability]
    definition: >-
      The property of a benchmark where stronger models consistently outperform weaker
      models. If weak and strong models produce similar scores, the benchmark has lost
      credibility and should be abandoned.
    tags: [evaluation, benchmarks]
    timestamps: ["34:48"]
    relations:
      - target: Benchmark Contamination
        type: threatens
        note: Data contamination can destroy separability
