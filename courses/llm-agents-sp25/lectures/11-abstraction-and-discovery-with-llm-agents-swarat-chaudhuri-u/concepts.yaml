concepts:
  - name: LLM-Directed Evolution
    definition: >-
      Using LLMs to propose mutations to candidate solutions (programs, formulas, proofs) in an evolutionary search
      loop, with fitness evaluation guiding selection
    importance: >-
      Combines LLM creativity with systematic search, already demonstrated useful results in symbolic regression and
      combinatorics (FunSearch)
    tags:
      - theory
    timestamps: []
    aliases: []
  - name: Concept Libraries
    definition: >-
      Collections of reusable abstractions (subroutines, lemmas, building blocks) discovered by LLMs from successful
      solutions and compressed into a shared library
    importance: Key innovation that enables compositional discovery — the whole becomes greater than the sum of parts
    tags:
      - theory
    timestamps: []
    aliases: []
  - name: Symbolic Regression with LLMs
    definition: >-
      Using LLM agents to discover mathematical formulas from data by proposing candidate expressions, evaluating
      fitness, and iteratively improving
    importance: Demonstrates LLMs can contribute to empirical science by discovering interpretable mathematical relationships
    tags:
      - theory
    timestamps: []
    aliases: []
  - name: In-Context Learning for Theorem Proving
    definition: >-
      Using pre-trained LLMs with relevant theorem-proving examples in context (no fine-tuning) to generate formal proof
      tactics
    importance: >-
      Achieves competitive results with minimal infrastructure, showing pre-trained models already encode substantial
      mathematical reasoning
    tags:
      - theory
    timestamps: []
    aliases: []
  - name: Abstraction Discovery
    definition: >-
      The ability of LLMs to identify and extract reusable abstract concepts from specific examples, creating building
      blocks for more complex reasoning
    importance: >-
      Central thesis — LLMs' unique value for scientific discovery lies in their abstraction capabilities, not just
      pattern matching
    tags:
      - theory
    timestamps: []
    aliases: []
  - name: FunSearch
    definition: >-
      DeepMind's system using LLM-directed evolution to discover new solutions to open mathematical problems by evolving
      program candidates
    importance: >-
      First demonstration of LLM agents making genuine mathematical discoveries, later extended with concept library
      ideas
    tags:
      - theory
    timestamps: []
    aliases: []
