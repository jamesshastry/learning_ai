concepts:
  - name: AlphaProof
    definition: >-
      Google DeepMind system combining autoformalization and RL self-play in Lean to prove IMO-level mathematical
      theorems, achieving silver medal at IMO 2024
    importance: >-
      First AI system to achieve medal-level performance at the International Mathematical Olympiad through formal
      reasoning
    tags:
      - theory
    timestamps: []
    aliases: []
  - name: Formal Mathematics
    definition: >-
      Mathematical proofs written in machine-verifiable languages (Lean, Coq, Isabelle) where every logical step is
      type-checked for correctness
    importance: >-
      Provides the perfect training environment for RL — deterministic, fully observable, with guaranteed correctness
      verification
    tags:
      - theory
    timestamps: []
    aliases: []
  - name: Autoformalization
    definition: >-
      Translating informal mathematical statements (natural language, LaTeX) into formal proof language representations
      that proof assistants can verify
    importance: Critical bridge between human mathematical communication and machine-verifiable formal systems
    tags:
      - theory
    timestamps: []
    aliases: []
  - name: Lean Proof Assistant
    definition: >-
      Interactive theorem prover and programming language with a growing mathematical library (Mathlib) and gamified
      proof-writing experience
    importance: Primary formal verification platform for modern AI math research, with exponentially growing community adoption
    tags:
      - theory
    timestamps: []
    aliases: []
  - name: Self-Play for Mathematics
    definition: >-
      RL training loop where the system generates proof attempts, verifies them against the formal checker, and trains
      on successful proofs to improve
    importance: Enables unlimited training data generation for theorem proving, analogous to AlphaZero's self-play in games
    tags:
      - theory
    timestamps: []
    aliases: []
  - name: Mathlib
    definition: >-
      Lean's community-maintained library of 200K+ formally verified mathematical theorems covering diverse mathematical
      domains
    importance: Largest corpus of formal mathematics, providing both training data and a foundation for building new proofs
    tags:
      - theory
    timestamps: []
    aliases: []
