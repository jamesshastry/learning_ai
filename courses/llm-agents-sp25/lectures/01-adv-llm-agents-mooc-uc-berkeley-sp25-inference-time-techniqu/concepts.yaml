concepts:
  - name: Chain-of-Thought Prompting
    definition: >-
      Technique of including intermediate reasoning steps in LLM prompts to improve problem-solving, enabling variable
      computation adapted to task difficulty
    importance: Foundational technique that unlocked LLM reasoning capabilities and inspired the entire reasoning model paradigm
    related_papers:
      - Chain-of-Thought Prompting Elicits Reasoning in Large Language Models
    tags:
      - theory
    timestamps: []
    aliases: []
  - name: Self-Consistency Decoding
    definition: >-
      Sampling multiple reasoning paths and selecting the answer with the highest frequency via majority voting,
      marginalizing over different reasoning traces
    importance: >-
      Simple yet powerful selection criterion that scales better than probability-based ranking and forms the basis for
      many inference-time techniques
    related_papers:
      - Self-Consistency Improves Chain of Thought Reasoning in Language Models
    tags:
      - theory
    timestamps: []
    aliases: []
  - name: Analogical Prompting
    definition: >-
      Instructing the LLM to self-generate relevant exemplars and background knowledge before solving a test problem,
      inspired by human analogical reasoning
    importance: >-
      Eliminates need for manual exemplar annotation while outperforming both zero-shot and few-shot chain-of-thought
      approaches
    tags:
      - theory
    timestamps: []
    aliases: []
  - name: OPRO (Optimization by PROmpting)
    definition: >-
      Using an LLM as an optimizer to iteratively improve prompts by maintaining a trajectory of prompt-score pairs and
      generating better candidates
    importance: >-
      Demonstrates that LLMs can discover effective prompts humans would not think of, automating the prompt engineering
      process
    tags:
      - theory
    timestamps: []
    aliases: []
  - name: Least-to-Most Prompting
    definition: >-
      Two-stage prompting that first decomposes a problem into simpler subproblems then solves them sequentially,
      enabling easy-to-hard generalization
    importance: >-
      First demonstration that pure prompting (no neuro-symbolic frameworks) can achieve near-perfect compositional
      generalization
    tags:
      - theory
    timestamps: []
    aliases: []
  - name: Tree-of-Thought Search
    definition: >-
      Search method that explores multiple reasoning branches at each step using BFS or DFS, with LLM-based step-level
      evaluation to prune unpromising paths
    importance: >-
      Enables more efficient use of inference compute by eliminating bad reasoning paths early rather than completing
      full solutions
    tags:
      - theory
    timestamps: []
    aliases: []
  - name: Self-Debugging
    definition: >-
      Iterative code improvement loop where the LLM generates code, receives execution feedback (unit tests, traces,
      explanations), and refines its solution
    importance: >-
      Natural application of self-improvement for code generation that mirrors human debugging workflows and underlies
      modern coding agents
    tags:
      - theory
    timestamps: []
    aliases: []
  - name: Process Reward Model
    definition: >-
      A trained verifier that evaluates the correctness of each intermediate reasoning step rather than only the final
      solution
    importance: >-
      Enables more fine-grained tree search and scales better than outcome-based reward models with increasing sample
      counts
    tags:
      - theory
    timestamps: []
    aliases: []
  - name: Inference-Time Compute Scaling
    definition: >-
      The principle of allocating more computational resources at inference time to improve model performance, through
      longer chains of thought, more samples, or deeper search
    importance: >-
      Core paradigm shift from training-time scaling to inference-time scaling that drives the reasoning model
      revolution (O1, R1, etc.)
    tags:
      - theory
    timestamps: []
    aliases: []
  - name: Self-Discover
    definition: >-
      Method where the LLM selects and composes task-specific reasoning structures from a menu of reasoning strategies
      without manually written demonstrations
    importance: >-
      Shows models can autonomously determine optimal reasoning approaches per task, removing need for task-specific
      prompt engineering
    tags:
      - theory
    timestamps: []
    aliases: []
