concepts:
  - name: SWE-bench
    definition: >-
      Benchmark for evaluating coding agents on real-world GitHub issues requiring bug localization, code understanding,
      multi-file editing, and test verification
    importance: >-
      Standard evaluation for coding agents that reveals the gap between function-level code generation and real
      software engineering tasks
    tags:
      - theory
    timestamps: []
    aliases: []
  - name: Coding Agents
    definition: >-
      LLM-based systems that navigate codebases, understand context, generate patches, and verify fixes using tools like
      search, file editors, and test runners
    importance: Represents the most commercially advanced application of LLM agents, with products like Cursor, Devin, and Copilot
    tags:
      - theory
    timestamps: []
    aliases: []
  - name: Big Sleep
    definition: >-
      Google Project Zero's LLM agent system that combines code browsing, hypothesis generation, and targeted fuzzing to
      find real zero-day vulnerabilities
    importance: >-
      First demonstration of LLM agents finding genuine security vulnerabilities in production software (SQLite) that
      traditional tools missed
    tags:
      - theory
    timestamps: []
    aliases: []
  - name: Interactive Tool-Assisted Security
    definition: >-
      Paradigm where LLM agents use external security tools (fuzzers, sanitizers, debuggers) interactively rather than
      attempting pure reasoning about vulnerabilities
    importance: >-
      Dramatically improves vulnerability detection rates — LLMs alone are insufficient but LLMs + tools exceed either
      alone
    tags:
      - theory
    timestamps: []
    aliases: []
  - name: Fuzzing with LLM Guidance
    definition: >-
      Using LLM agents to generate targeted test inputs for security fuzzing, guided by code understanding and
      hypothesis generation about potential vulnerabilities
    importance: >-
      Complements traditional coverage-guided fuzzing by adding semantic understanding of code intent and potential
      attack vectors
    tags:
      - theory
    timestamps: []
    aliases: []
