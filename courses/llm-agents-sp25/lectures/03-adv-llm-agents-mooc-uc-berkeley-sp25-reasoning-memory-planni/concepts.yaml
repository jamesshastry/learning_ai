concepts:
  - name: HippoRAG
    definition: >-
      Neurobiologically-inspired retrieval system that builds a knowledge graph index mimicking hippocampal indexing,
      using personalized PageRank for multi-hop pattern completion
    importance: >-
      Dramatically outperforms embedding-based RAG on multi-hop QA by creating associative shortcuts between disparate
      memory fragments
    tags:
      - theory
    timestamps: []
    aliases: []
  - name: Grokking
    definition: >-
      Phenomenon where transformers trained far beyond overfitting suddenly achieve generalization through a phase
      transition from rote memorization to learning generalizing circuits
    importance: >-
      Reveals that implicit reasoning capability depends on data distribution (ratio of inferred to atomic facts) rather
      than data size
    tags:
      - theory
    timestamps: []
    aliases: []
  - name: Implicit Reasoning
    definition: >-
      Reasoning performed within a single forward pass through transformer parameters without explicit chain-of-thought
      token generation
    importance: >-
      Determines the base model's capacity for structured representations and likely underlies the reasoning strategies
      that RL later activates in O1/R1-style models
    tags:
      - theory
    timestamps: []
    aliases: []
  - name: Generalizing Circuits
    definition: >-
      Internal transformer circuits discovered through mechanistic interpretation that implement reasoning rules (staged
      for composition, parallel for comparison)
    importance: >-
      Explains why different reasoning types have different generalization behavior and suggests architectural
      interventions for improvement
    tags:
      - theory
    timestamps: []
    aliases: []
  - name: Model-Based Planning
    definition: >-
      Planning paradigm where an agent uses an internal world model to simulate action outcomes before committing,
      enabling lookahead without irreversible real-world actions
    importance: >-
      Enables safe, fast planning in real-world environments where tree search with backtracking is impossible due to
      irreversible actions
    tags:
      - theory
    timestamps: []
    aliases: []
  - name: WebDreamer
    definition: >-
      System that uses LLMs as approximate world models for web navigation, simulating next-page states to evaluate
      candidate actions before execution
    importance: >-
      First demonstration of model-based planning for web agents using LLM world knowledge as the transition dynamics
      model
    tags:
      - theory
    timestamps: []
    aliases: []
  - name: Agent-First View
    definition: >-
      Perspective that language agents are the latest evolution of AI agents (studied since AI's inception), now
      upgraded with language-based reasoning and communication
    importance: >-
      Frames agent development as building on decades of agent research rather than treating it as merely adding
      scaffolding around LLMs
    tags:
      - theory
    timestamps: []
    aliases: []
  - name: Personalized PageRank
    definition: >-
      Graph algorithm that disperses probability mass from seed nodes via random walks, assigning higher weights to
      nodes at the intersection of multiple query concepts
    importance: >-
      Core retrieval algorithm in HippoRAG that enables efficient multi-hop pattern completion across knowledge graph
      associations
    tags:
      - theory
    timestamps: []
    aliases: []
  - name: Non-Parametric Memory
    definition: >-
      External memory stored outside model parameters (e.g., retrieved documents) that LLMs can access at inference
      time, avoiding catastrophic forgetting
    importance: >-
      Practical solution for continual learning in LLMs given that parametric fine-tuning causes catastrophic forgetting
      and unpredictable side effects
    tags:
      - theory
    timestamps: []
    aliases: []
