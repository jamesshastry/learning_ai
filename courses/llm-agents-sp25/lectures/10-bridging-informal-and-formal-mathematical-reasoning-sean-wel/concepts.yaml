concepts:
  - name: Lean-STaR
    definition: >-
      Method that trains models to generate informal natural language thoughts before each formal Lean tactic, improving
      theorem proving through informal intermediate reasoning
    importance: >-
      Demonstrates that informal thinking improves formal proof generation, bridging the gap between human-like and
      machine-verifiable reasoning
    tags:
      - theory
    timestamps: []
    aliases: []
  - name: Draft-Sketch-Prove
    definition: >-
      Pipeline that generates an informal proof draft, extracts a formal sketch with holes, then fills the holes using
      tactic generation
    importance: Leverages the flexibility of informal reasoning while maintaining the rigor of formal verification
    tags:
      - theory
    timestamps: []
    aliases: []
  - name: ImProver
    definition: >-
      Agent-based system that rewrites existing formal proofs to optimize for objectives like brevity, modularity, or
      alternative proof techniques
    importance: First proof optimization agent, demonstrating that proofs (like code) can be refactored and improved by AI
    tags:
      - theory
    timestamps: []
    aliases: []
  - name: miniCTX
    definition: >-
      Benchmark of 228 theorems from real Lean projects (beyond Mathlib) requiring long-context understanding of
      project-specific definitions
    importance: >-
      First benchmark reflecting the actual challenges of formalization in real projects rather than textbook-level
      mathematics
    tags:
      - theory
    timestamps: []
    aliases: []
  - name: Informal-to-Formal Bridge
    definition: >-
      General approach of using informal mathematical reasoning (natural language, sketches) as intermediate
      representations to improve formal proof generation
    importance: Central paradigm for making formal verification accessible and practical for working mathematicians
    tags:
      - theory
    timestamps: []
    aliases: []
