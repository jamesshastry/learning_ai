concepts:
  - name: OSWorld
    definition: >-
      Comprehensive OS-level benchmark with 369 real-world computer tasks spanning web, desktop, and multi-app
      workflows, evaluated through execution-based scripts
    importance: First benchmark to cover full computer use at the OS level with reliable automated evaluation
    tags:
      - theory
    timestamps: []
    aliases: []
  - name: AGUVIS
    definition: >-
      Unified vision-language-action model for GUI agents that uses only visual observations, trained in two stages
      (grounding then reasoning with inner monologue)
    importance: Demonstrates that pure vision approaches can achieve state-of-the-art across web, mobile, and desktop platforms
    tags:
      - theory
    timestamps: []
    aliases: []
  - name: Pure Vision Paradigm
    definition: >-
      Approach to GUI agents that relies entirely on visual screenshots without HTML, accessibility trees, or DOM
      information
    importance: Enables cross-platform generalization and mirrors how humans interact with computers
    tags:
      - theory
    timestamps: []
    aliases: []
  - name: Inner Monologue for Agents
    definition: >-
      Forced generation of planning text before action prediction, helping agents reason through complex multi-step
      tasks
    importance: Resolves approximately 20% of grounding errors on harder tasks by encouraging explicit planning
    tags:
      - theory
    timestamps: []
    aliases: []
  - name: Visual Grounding
    definition: >-
      The ability to identify and localize specific UI elements in screenshots for accurate coordinate-based action
      prediction
    importance: Identified as having more improvement headroom than reasoning for GUI agent performance
    tags:
      - theory
    timestamps: []
    aliases: []
