concepts:
  - name: Mind2Web
    definition: >-
      First large-scale benchmark for generalist web agents using real-world websites with diverse tasks and HTML-based
      observations
    importance: Established the foundation for web agent evaluation with realistic tasks across multiple websites
    tags:
      - theory
    timestamps: []
    aliases: []
  - name: WebArena
    definition: Self-hosted web environment with functional websites for reproducible evaluation of autonomous web agents
    importance: Enables controlled, reproducible evaluation of web agents with realistic interactions and environment dynamics
    tags:
      - theory
    timestamps: []
    aliases: []
  - name: VisualWebArena
    definition: Extension of WebArena that adds tasks requiring visual understanding of web page content beyond text/HTML
    importance: >-
      Demonstrates that multimodal perception is essential for web agents — text-only models miss critical visual
      information
    tags:
      - theory
    timestamps: []
    aliases: []
  - name: Set-of-Marks Representation
    definition: >-
      Visual representation that overlays numbered bounding boxes on clickable web elements, providing both spatial and
      semantic grounding for agent actions
    importance: >-
      Bridges visual and textual understanding for web agents, improving action accuracy over pure HTML or pure vision
      approaches
    tags:
      - theory
    timestamps: []
    aliases: []
  - name: Tree Search for Web Agents
    definition: >-
      Search algorithm that maintains a frontier of candidate states with value estimates, enabling backtracking and
      systematic exploration in web navigation
    importance: Significantly improves agent performance but reveals fundamental tension with irreversible real-world actions
    tags:
      - theory
    timestamps: []
    aliases: []
  - name: Adversarial Web Agent Attacks
    definition: >-
      Attacks that manipulate web content (e.g., image captions) to inject malicious instructions that hijack autonomous
      web agents
    importance: >-
      Highlights critical safety vulnerability — agents that browse the web can be manipulated by adversarially crafted
      content
    tags:
      - theory
    timestamps: []
    aliases: []
