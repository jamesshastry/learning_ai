concepts:
  - name: LeanDojo
    definition: >-
      Open-source toolkit for extracting proof state-tactic pairs from Lean proofs, enabling training neural theorem
      provers with next-step prediction
    importance: Democratized neural theorem proving research by providing standard data extraction and evaluation infrastructure
    tags:
      - theory
    timestamps: []
    aliases: []
  - name: Neural Theorem Proving
    definition: >-
      Using language models to generate proof tactics in formal proof assistants, guided by tree search algorithms over
      the proof state space
    importance: >-
      Core technique for AI-assisted formal mathematics, combining LLM reasoning with guaranteed correctness
      verification
    tags:
      - theory
    timestamps: []
    aliases: []
  - name: Expert Iteration for Provers
    definition: >-
      Iterative improvement loop where a prover attempts new theorems, successful proofs are added to training data, and
      the prover is retrained
    importance: >-
      Addresses data scarcity in formal mathematics by generating synthetic training data from the prover's own
      discoveries
    tags:
      - theory
    timestamps: []
    aliases: []
  - name: Autoformalization
    definition: >-
      Translating informal mathematical statements and proofs (natural language, LaTeX) into formal representations in
      proof assistants like Lean
    importance: Critical bottleneck for applying formal verification to the vast body of informal mathematical knowledge
    tags:
      - theory
    timestamps: []
    aliases: []
  - name: SMT Solver Verification
    definition: >-
      Using satisfiability modulo theories solvers to verify equivalence between formal statements or fill logical gaps
      in proofs
    importance: >-
      Provides automated checking of autoformalization correctness and handles "obvious" proof steps that LLMs leave
      implicit
    tags:
      - theory
    timestamps: []
    aliases: []
  - name: Diagrammatic Obviousness
    definition: >-
      Formal characterization (via Avigad's axioms) of what steps are "obvious" from a geometric diagram, enabling
      automated gap-filling in geometry proofs
    importance: >-
      Solves the gap-filling problem for Euclidean geometry autoformalization by providing computational meaning to
      informal reasoning
    tags:
      - theory
    timestamps: []
    aliases: []
