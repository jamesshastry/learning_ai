concepts:
  - name: Product Builder
    aliases:
      - Builder with Judgment
    definition: >-
      The emerging role merging traditional PM, design, and engineering skills into a hands-on builder who
      exercises judgment on what to build and why, replacing the siloed information-moving PM. Companies
      increasingly hire for this hybrid skill regardless of title.
    tags: [product, careers, ai-transformation]
    timestamps: ["21:02", "27:01", "33:32"]
    relations:
      - target: Information Moving
        type: contrasts_with
        note: Product builders create and decide; information movers just package and transfer.
      - target: Iteration Speed as Moat
        type: enables
        note: Product builders who can ship directly iterate faster than teams with PM intermediaries.

  - name: Information Moving
    aliases:
      - Bureaucratic PM
      - Information Packaging
    definition: >-
      The function of packaging and transferring information between stakeholders that constituted approximately
      80% of traditional product management work. Now largely automatable by AI agents that summarize customer
      calls, sales interactions, and survey data.
    tags: [product, ai-transformation, organization]
    timestamps: ["26:52", "27:01", "41:14"]
    relations:
      - target: Product Builder
        type: contrasts_with
        note: Information moving is being replaced by AI while product building judgment grows in value.
      - target: Corporate Theatrics
        type: part_of
        note: Information moving feeds the theatrics of multi-layer presentation decks.

  - name: The Skip
    aliases:
      - Skip Framework
    definition: >-
      Career strategy framework of planning the job AFTER the one you're considering, ensuring each career
      chapter maximizes optionality and learning for future chapters. Based on the observation that careers
      span 15-18 jobs over 50 years.
    tags: [careers, strategy]
    timestamps: ["19:51", "20:02", "20:08"]
    relations:
      - target: Product Builder
        type: related_to
        note: The Skip framework helps prioritize building skills over title advancement.

  - name: Corporate Theatrics
    aliases:
      - Dog and Pony Shows
    definition: >-
      The organizational pattern where multiple management layers create elaborate slide decks and formal
      presentations to convey information that originated from a single IC's experiment, adding latency
      and distortion without genuine insight.
    tags: [organization, product, culture]
    timestamps: ["41:55", "42:48", "43:01"]
    relations:
      - target: Information Moving
        type: enables
        note: Corporate theatrics are sustained by layers of information-moving roles.

  - name: Iteration Speed as Moat
    aliases:
      - Speed of Iteration
    definition: >-
      The principle that product success correlates more with iteration frequency than initial quality.
      Demonstrated by Chrome (6-week releases) beating Firefox (quarterly) beating Internet Explorer
      (annually), and Android (quarterly) vs iOS (annual).
    tags: [product, strategy, execution]
    timestamps: ["13:55", "14:06", "14:19"]
    relations:
      - target: Product Builder
        type: enables
        note: Product builders who ship directly can achieve higher iteration speed.

  - name: Product-Market Fit S-Curve
    aliases:
      - PMF Phases
    definition: >-
      The four phases companies traverse: (1) Finding product-market fit through rapid experimentation,
      (2) Post-PMF process and consistency building, (3) Hypergrowth requiring simultaneous scaling and
      expansion, (4) Big tech innovator's dilemma requiring zero-to-one innovation against inertia.
    tags: [product, startups, strategy]
    timestamps: ["04:52", "05:01", "07:36"]
    relations:
      - target: Product Builder
        type: related_to
        note: Different phases require different product builder skills.
      - target: Iteration Speed as Moat
        type: enables
        note: Startups in phase 1 have iteration speed advantages over incumbents in phase 4.

  - name: Flat Organization Model
    aliases:
      - Dense Organization
    definition: >-
      The emerging organizational structure where AI agents eliminate middle management layers, creating
      wider but shallower hierarchies. Leaders can observe ground truth directly through AI-monitored
      interactions rather than through management chains.
    tags: [organization, ai-transformation, leadership]
    timestamps: ["27:31", "01:00:05", "01:00:21"]
    relations:
      - target: Information Moving
        type: contrasts_with
        note: Flat organizations eliminate the information-moving layers that justified middle management.
      - target: Corporate Theatrics
        type: contrasts_with
        note: When leaders have AI-mediated access to ground truth, theatrics become unnecessary.
