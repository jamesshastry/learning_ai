concepts:
  - name: Context Feedback Loop
    aliases: [Context Loop, Feedback Flywheel]
    definition: >-
      The cycle where deploying an AI system generates observable data about its performance in real-world
      tasks, which is then used to improve capabilities through reinforcement learning. Creates compounding
      advantage as better models generate more usage generating more context.
    tags: [training, strategy, scaling]
    timestamps: ["23:13", "23:25", "27:17"]
    relations:
      - target: Context Loop Wars
        type: enables
        note: Context feedback loops are the resource being fought over in context loop wars.
      - target: Verifiability Thesis
        type: prerequisite_for
        note: Context feedback is most useful when task performance can be objectively verified.

  - name: Context Loop Wars
    aliases: [Context Competition, Context Leakage]
    definition: >-
      The emerging competition between AI companies and platforms for access to unique, defensible context
      data that drives model improvement. Exemplified by Anthropic shutting off API access to Windsurf
      users after OpenAI's acquisition to prevent context leakage to a competitor.
    tags: [strategy, competition, infrastructure]
    timestamps: ["27:36", "27:54", "28:39"]
    relations:
      - target: Context Feedback Loop
        type: part_of
        note: Context loop wars are fought over who controls the context feedback loops.
      - target: Sovereign AI
        type: related_to
        note: Sovereign AI is the geopolitical dimension of context loop wars.

  - name: Sovereign AI
    aliases: [Infrastructure Independence, Sovereign Context]
    definition: >-
      The principle that mission-critical AI workloads (government, defense, sensitive enterprise) require
      local infrastructure and open models rather than dependence on foreign cloud providers. Driven by
      regulations like the US Cloud Act and the need to keep sensitive context within national borders.
    tags: [policy, infrastructure, geopolitics]
    timestamps: ["31:04", "31:07", "33:08"]
    relations:
      - target: Context Loop Wars
        type: part_of
        note: Sovereign AI is the nation-state level manifestation of context loop competition.
      - target: Compute Fungibility
        type: related_to
        note: Lack of compute fungibility makes sovereign AI deployment more challenging.

  - name: Compute Fungibility
    aliases: [Compute as Commodity]
    definition: >-
      The degree to which compute resources can be substituted for each other. Currently very low — different
      GPU generations (H100/GB200/B300) and manufacturers (AMD/NVIDIA) are not interchangeable. Unlike
      electricity (megawatts are megawatts), compute lacks common units, standard interfaces, and buyer
      substitutability.
    tags: [infrastructure, compute, economics]
    timestamps: ["57:43", "57:55", "58:11"]
    relations:
      - target: Pre-Standardization Era
        type: part_of
        note: Low fungibility is the defining characteristic of the pre-standardization era.
      - target: Sovereign AI
        type: related_to
        note: Non-fungible compute makes sovereign AI infrastructure planning harder.

  - name: Pre-Standardization Era
    aliases: [Pre-Standard Compute]
    definition: >-
      The current phase of compute infrastructure analogous to railroads before gauge standardization (1886)
      or electricity before AC/DC resolution (1907). Characterized by rising prices, hoarding by large
      players, lack of common standards, and the need for institutions to enforce fungibility.
    tags: [infrastructure, economics, history]
    timestamps: ["01:03:02", "01:03:06", "01:03:37"]
    relations:
      - target: Compute Fungibility
        type: enables
        note: Standardization is the path to making compute fungible and accessible.
      - target: Infrastructure Cycles
        type: part_of
        note: Pre-standardization is one phase in the historical infrastructure cycle pattern.

  - name: Verifiability Thesis
    aliases: [Verification-Driven Progress]
    definition: >-
      The principle that AI frontier progress is fastest in domains where task performance can be objectively
      verified (code unit tests, physical experiments), and slowest in domains requiring subjective human
      judgment (aesthetics, creative writing, beauty, love).
    tags: [theory, training, research]
    timestamps: ["25:50", "38:49", "39:06"]
    relations:
      - target: Context Feedback Loop
        type: enables
        note: Verifiable domains produce clean reward signals for context feedback loops.
      - target: Compute Fungibility
        type: related_to
        note: Verifiable domains justify compute investment with predictable capability returns.

  - name: Infrastructure Cycles
    aliases: [Boom-Bust Cycles, Commodity Cycles]
    definition: >-
      The historical pattern where new general-purpose technologies create infrastructure explosions followed
      by hoarding, panics, crashes, and eventual stabilization through standards and institutions. Observed in
      steel (1867-1895), fiber optics (2000s), DRAM, uranium, and now compute. Digital cycles average ~2.8 years;
      physical ~6.3 years.
    tags: [economics, infrastructure, history]
    timestamps: ["51:36", "52:07", "55:52"]
    relations:
      - target: Pre-Standardization Era
        type: part_of
        note: The current compute situation maps to the pre-standardization phase of infrastructure cycles.
      - target: Compute Fungibility
        type: enables
        note: Historical cycles resolve through standardization that creates fungibility.

  - name: Compute-Revenue Correlation
    aliases: [Dollar In Dollar Out]
    definition: >-
      The observed pattern at Anthropic where every time new compute infrastructure was brought online,
      capabilities improved within 60-90 days followed by a predictable revenue jump. Represents a roughly
      10x value transformation from hardware asset (3-4x revenue multiple) to software revenue (30-40x multiple).
    tags: [economics, scaling, compute]
    timestamps: ["44:31", "44:36", "44:51"]
    relations:
      - target: Context Feedback Loop
        type: enables
        note: More compute enables faster context feedback processing, driving revenue.
      - target: Infrastructure Cycles
        type: related_to
        note: The compute-revenue correlation drives the hoarding behavior in current infrastructure cycles.

  - name: Recursive Self-Improvement
    aliases: [Flywheel Takeoff]
    definition: >-
      The point at which an AI system's context feedback and compute flywheels become self-sustaining — the
      system generates enough revenue to fund compute, and enough context to improve capabilities, without
      external intervention. Sometimes equated with paths to AGI/ASI, but Anjney views it at the systems
      level rather than individual model level.
    tags: [theory, scaling, strategy]
    timestamps: ["36:27", "36:33", "37:07"]
    relations:
      - target: Context Feedback Loop
        type: enables
        note: Recursive self-improvement is the asymptotic state of compounding context feedback loops.
      - target: Verifiability Thesis
        type: prerequisite_for
        note: Self-improvement requires verifiable domains to maintain reliable capability gains.
