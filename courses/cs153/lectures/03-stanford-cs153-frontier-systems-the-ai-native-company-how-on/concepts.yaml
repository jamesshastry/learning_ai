concepts:
  - name: AI-Native Company
    aliases:
      - Agentic Company
    definition: >-
      A company fundamentally built around and operating with AI agents and closed-loop systems to achieve unprecedented
      productivity and efficiency, often leading to drastically flattened organizational structures.
    tags:
      - application
      - architecture
      - infrastructure
    timestamps:
      - '00:00'
      - '30:11'
      - '31:52'
      - '33:26'
    relations:
      - target: 1000x Productivity for Founders
        type: enables
        note: AI-Native companies are designed to achieve this level of productivity.
      - target: Closed-Loop System (AI-Native Company)
        type: prerequisite_for
        note: Operating as a closed-loop system is a core principle of an AI-native company.
      - target: Agentic System
        type: part_of
        note: AI-Native companies are built upon agentic systems.
  - name: 1000x Productivity for Founders
    aliases:
      - 1000x Engineer
      - 100x Productivity
    definition: >-
      The ability for individual engineers/founders to achieve productivity equivalent to hundreds or thousands of
      people by leveraging AI coding agents and AI-native principles.
    tags:
      - application
      - optimization
    timestamps:
      - '00:00'
      - '09:01'
      - '11:35'
      - '17:15'
      - '34:45'
    relations:
      - target: AI Coding Agents
        type: enables
        note: AI coding agents are a primary enabler of this productivity gain.
      - target: AI-Native Company
        type: part_of
        note: Achieving this productivity is a core goal and outcome of an AI-native company.
      - target: Boil the Ocean (AI Era)
        type: enables
        note: This level of productivity makes it feasible to tackle large-scale projects.
  - name: AI Coding Agents
    aliases:
      - Coding Agents
      - LLM Coding Agents
    definition: >-
      AI-powered tools and systems (e.g., Claude Code, Gstack) that automate and assist in code generation, development,
      and complex workflows, drastically increasing engineering productivity.
    tags:
      - application
      - optimization
      - infrastructure
    timestamps:
      - '10:46'
      - '11:35'
      - '17:05'
      - '21:36'
    relations:
      - target: 1000x Productivity for Founders
        type: enables
        note: These agents are direct enablers of the 1000x productivity.
      - target: Agentic System
        type: part_of
        note: AI coding agents are a specific type of agent within an agentic system.
      - target: Skillify
        type: prerequisite_for
        note: Agents execute skills created through the skillify process.
  - name: Closed-Loop System (AI-Native Company)
    aliases:
      - PID Controllers (analogy)
    definition: >-
      An operational model for AI-native companies where AI agents have comprehensive read access to all company data,
      continuously learn, suggest actions, and self-heal, forming a tight feedback loop.
    tags:
      - architecture
      - optimization
      - infrastructure
    timestamps:
      - '00:00'
      - '32:03'
      - '32:33'
      - '32:45'
    relations:
      - target: AI-Native Company
        type: part_of
        note: This is the fundamental operating principle of an AI-native company.
      - target: Self-Healing Systems
        type: enables
        note: Closed-loop systems enable continuous self-healing.
      - target: Open Loop System
        type: contrasts_with
        note: Contrasts with traditional, less efficient open-loop company operations.
  - name: Skills (Agentic Systems)
    aliases:
      - Runbooks (AI)
      - Agent Skills
    definition: >-
      Modular, markdown-based runbooks often incorporating code calls, designed to enable AI agents to perform specific,
      repeatable tasks or capabilities within an agentic system.
    tags:
      - architecture
      - application
      - infrastructure
    timestamps:
      - '00:00'
      - '18:56'
      - '20:05'
      - '21:11'
      - '24:53'
      - '30:23'
    relations:
      - target: Agentic System
        type: part_of
        note: Skills are fundamental building blocks of agentic systems.
      - target: Automation
        type: enables
        note: Skills enable automation of complex workflows through agents.
      - target: Skillify
        type: prerequisite_for
        note: Skills are created and refined through the skillify process.
  - name: Resolvers (Agentic Systems)
    aliases:
      - Context Management (AI)
      - Agent Resolvers
    definition: >-
      Mechanisms in agentic systems for context management, preventing token overload by dynamically loading necessary
      instructions or knowledge (e.g., specific skills) only when required.
    tags:
      - architecture
      - optimization
      - data
    timestamps:
      - '00:00'
      - '23:26'
      - '30:27'
    relations:
      - target: Agentic System
        type: part_of
        note: Resolvers are critical components for efficient agentic operation.
      - target: Efficient Context Management
        type: enables
        note: Resolvers provide efficient context management for agents.
      - target: Scalability
        type: enables
        note: By managing token usage, resolvers contribute to the scalability of agentic systems.
  - name: Memory Systems (Agentic Systems)
    aliases:
      - G Brain
      - Knowledge Wiki
    definition: >-
      Multi-layered knowledge management architectures that store and retrieve information for AI agents, often
      combining knowledge wikis, vector search, graph databases, and an epistemology system.
    tags:
      - architecture
      - data
      - infrastructure
    timestamps:
      - '00:00'
      - '27:02'
      - '27:08'
      - '28:02'
      - '33:01'
      - '34:16'
    relations:
      - target: Agentic System
        type: part_of
        note: Memory systems provide the persistent knowledge base for agents.
      - target: Contextual Awareness (for agents)
        type: enables
        note: Memory systems provide agents with the necessary context and knowledge.
      - target: Self-Healing Systems
        type: enables
        note: Agents use memory to diagnose and implement fixes for self-healing.
  - name: Custom Evaluations (Evals)
    aliases:
      - Evals (AI)
      - LLM Evals
    definition: >-
      Rigorous, custom-built evaluation mechanisms and meta-prompting used to ensure AI agents produce high-quality,
      user-satisfying outputs, moving beyond generic benchmarks.
    tags:
      - training
      - optimization
      - application
    timestamps:
      - '00:00'
      - '26:23'
      - '38:01'
      - '39:50'
      - '40:45'
    relations:
      - target: Taste (in AI Product Development)
        type: enables
        note: Custom evals are the implementation of 'taste' in AI systems.
      - target: Agentic System
        type: part_of
        note: Evals serve as the crucial feedback and quality control loop in agentic systems.
      - target: Meta-Prompting
        type: enables
        note: Meta-prompting is used to conduct and interpret custom evaluations.
  - name: Taste (in AI Product Development)
    aliases:
      - Human Taste
      - Product Taste
    definition: >-
      The unique human discernment for what is good, valuable, and user-satisfying, which becomes the durable
      differentiator as the cost of shipping AI-generated code approaches zero.
    tags:
      - application
      - theory
    timestamps:
      - '00:00'
      - '37:31'
      - '37:50'
    relations:
      - target: Custom Evaluations (Evals)
        type: enables
        note: Human 'taste' guides the design and interpretation of custom evaluations.
      - target: AI Slop
        type: contrasts_with
        note: Taste is essential to prevent the production of low-quality, generic AI outputs.
  - name: Skillify
    aliases:
      - Process Abstraction
      - Agent Workflow Creation
    definition: >-
      The process of taking a successful agent interaction or workflow, abstracting it into a reusable skill (markdown
      runbook with code calls), and then rigorously testing it with unit tests, LLM evals, and integration tests.
    tags:
      - optimization
      - architecture
      - training
    timestamps:
      - '24:53'
      - '25:11'
      - '25:51'
      - '26:18'
      - '30:59'
    relations:
      - target: Skills (Agentic Systems)
        type: enables
        note: Skillify is the method for creating and refining agent skills.
      - target: Agentic System
        type: prerequisite_for
        note: Skillify is crucial for building robust and reliable agentic systems.
  - name: Boil the Ocean (AI Era)
    aliases:
      - Unprecedented Ambition
      - 1000x Scope
    definition: >-
      A new operational mindset in the AI era, where the vastly increased productivity of individuals using AI agents
      enables tackling extremely ambitious, large-scale projects previously considered unfeasible for small teams.
    tags:
      - application
      - optimization
      - theory
    timestamps:
      - '16:45'
      - '17:06'
      - '17:56'
    relations:
      - target: 1000x Productivity for Founders
        type: enabled_by
        note: The ability to 'boil the ocean' is a direct result of 1000x productivity.
      - target: Traditional Limitations
        type: contrasts_with
        note: Contrasts with the prior limitations on project scope for small teams.
  - name: AI Founder
    aliases:
      - Frontier Lab Founder
      - 1000x Founder
    definition: >-
      A founder who embodies and leverages cutting-edge AI tools and agentic systems to run their company fast, staying
      at the forefront of AI innovations and building AI-native organizations.
    tags:
      - application
      - theory
    timestamps:
      - '36:35'
      - '36:41'
      - '47:03'
    relations:
      - target: AI-Native Company
        type: part_of
        note: AI founders are the key drivers in creating and operating AI-native companies.
      - target: Boil the Ocean (AI Era)
        type: enables
        note: AI founders drive ambitious projects by leveraging AI capabilities.
  - name: Agentic System
    aliases:
      - AI Agent System
      - Autonomous Agents
    definition: >-
      A system composed of AI agents that can perceive their environment, reason, plan actions, and execute them, often
      in a closed-loop fashion, using primitives like skills, resolvers, and memory.
    tags:
      - architecture
      - application
    timestamps:
      - '09:59'
      - '18:39'
      - '31:11'
      - '31:40'
      - '32:50'
    relations:
      - target: AI-Native Company
        type: enables
        note: Agentic systems are the core technology enabling AI-native companies.
      - target: Closed-Loop System (AI-Native Company)
        type: part_of
        note: Agentic systems operate within a closed-loop framework.
      - target: Self-Healing Systems
        type: prerequisite_for
        note: Agentic systems, with their feedback loops, enable self-healing.
  - name: Meta-Prompting
    aliases:
      - Iterative Prompting
      - AI Self-Refinement
    definition: >-
      An iterative technique involving prompting AI models to evaluate and refine the outputs of other AI agents or even
      themselves, leading to higher quality and more precise results.
    tags:
      - training
      - optimization
    timestamps:
      - '00:00'
      - '39:59'
      - '40:07'
      - '41:34'
    relations:
      - target: Custom Evaluations (Evals)
        type: enables
        note: Meta-prompting is a key method for conducting and improving custom evaluations.
      - target: Agentic System
        type: part_of
        note: Meta-prompting is an operational technique used within agentic systems.
  - name: Self-Healing Systems
    aliases:
      - Autonomous Repair
      - AI Self-Correction
    definition: >-
      AI systems designed to automatically detect, diagnose, and resolve issues or bugs, enabling continuous operation
      and improvement without direct human intervention.
    tags:
      - application
      - optimization
      - architecture
    timestamps:
      - '34:21'
    relations:
      - target: Closed-Loop System (AI-Native Company)
        type: enabled_by
        note: Closed-loop systems provide the necessary feedback for self-healing capabilities.
      - target: Memory Systems (Agentic Systems)
        type: enabled_by
        note: Memory systems provide the knowledge for agents to diagnose and fix issues.
      - target: Agentic System
        type: enabled_by
        note: Self-healing is a core capability enabled by robust agentic systems.
