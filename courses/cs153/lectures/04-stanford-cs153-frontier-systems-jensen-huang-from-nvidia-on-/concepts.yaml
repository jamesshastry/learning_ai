concepts:
  - name: Co-Design
    aliases:
      - Code Design
      - Full-Stack Co-Design
    definition: >-
      The practice of simultaneously optimizing algorithms, software frameworks, compilers, and hardware architecture
      together rather than in isolation, yielding exponential performance gains. Originated at Stanford with RISC
      (Hennessy) and extended by NVIDIA across the entire compute stack.
    tags:
      - architecture
      - hardware
      - systems
    timestamps:
      - "01:05"
      - "08:36"
      - "11:06"
      - "39:08"
    relations:
      - target: NVLink72
        type: enables
        note: Co-design principles led to the creation of rack-scale GPU interconnects like NVLink72.
      - target: Tokens Per Watt
        type: enables
        note: Co-design across the stack is how NVIDIA achieves 50x tokens-per-watt improvements.

  - name: Agentic Computing
    aliases:
      - Agentic Systems
      - Continuous Computing
    definition: >-
      A new computing paradigm where AI systems run continuously and autonomously rather than on-demand, executing
      multi-step tasks with tool use, sub-agents, and persistent memory. Requires fundamentally different system
      architectures compared to traditional cloud computing.
    tags:
      - architecture
      - agents
      - infrastructure
    timestamps:
      - "07:09"
      - "07:44"
      - "36:02"
      - "37:43"
    relations:
      - target: Vera Rubin Architecture
        type: related_to
        note: Vera Rubin GPU generation is designed specifically for agentic computing workloads.
      - target: Co-Design
        type: prerequisite_for
        note: Agentic systems require co-design of storage, CPU latency, and GPU interconnects.

  - name: NVLink72
    aliases:
      - Grace Blackwell NVLink72
      - Rack-Scale Computer
    definition: >-
      NVIDIA's interconnect technology that gangs 72 GPUs together into a single rack-scale computer, providing
      aggregate memory bandwidth far beyond a single chip. Designed for efficient decode/inference of large language
      models, achieving 50x improvement over the previous Hopper generation.
    tags:
      - hardware
      - infrastructure
      - inference
    timestamps:
      - "30:29"
      - "34:42"
      - "35:20"
    relations:
      - target: Co-Design
        type: part_of
        note: NVLink72 is a product of full-stack co-design philosophy.
      - target: Tokens Per Watt
        type: enables
        note: NVLink72's aggregate bandwidth is the key factor for high tokens-per-watt in decode.

  - name: Tokens Per Watt
    aliases:
      - Intelligence Per Watt
    definition: >-
      A performance metric measuring AI intelligence output (generated tokens) relative to energy consumption.
      Considered more meaningful than MFU (Model FLOPs Utilization) for evaluating system efficiency, though still
      incomplete since different token types have different value.
    tags:
      - metrics
      - efficiency
      - infrastructure
    timestamps:
      - "30:08"
      - "30:12"
      - "39:01"
    relations:
      - target: MFU
        type: contrasts_with
        note: Tokens per watt captures more than raw compute utilization, which MFU measures.
      - target: Co-Design
        type: related_to
        note: Achieving high tokens per watt requires co-design across the full stack.

  - name: MFU
    aliases:
      - Model FLOPs Utilization
    definition: >-
      A metric measuring the percentage of theoretical peak FLOPs consumed during model training or inference.
      Jensen Huang argues it is misleading because low MFU can indicate smart overprovisioning to avoid Amdahl's
      Law bottlenecks, and high MFU during decode is undesirable.
    tags:
      - metrics
      - training
    timestamps:
      - "27:11"
      - "27:50"
      - "30:32"
    relations:
      - target: Tokens Per Watt
        type: contrasts_with
        note: MFU measures compute utilization; tokens per watt measures useful output per energy unit.

  - name: Vera Rubin Architecture
    aliases:
      - Vera Rubin
    definition: >-
      NVIDIA's GPU generation designed specifically for agentic AI workloads. Features storage connected directly
      to the GPU fabric for long-term agent memory and extremely low-latency CPUs optimized for single-threaded
      tool-call execution, avoiding the bottleneck of a multi-billion dollar GPU system waiting for one CPU.
    tags:
      - hardware
      - architecture
      - agents
    timestamps:
      - "35:52"
      - "36:02"
      - "37:12"
    relations:
      - target: Agentic Computing
        type: enables
        note: Vera Rubin is purpose-built for the compute patterns of agentic AI systems.
      - target: NVLink72
        type: related_to
        note: Vera Rubin builds on the rack-scale innovations introduced with Grace Blackwell NVLink72.

  - name: Nemotron
    aliases:
      - Neatron
    definition: >-
      NVIDIA's near-frontier open language model designed to be fine-tuned for any language, democratizing AI
      capabilities for underrepresented languages and societies where commercial priority would not justify
      dedicated investment.
    tags:
      - models
      - open-source
      - language
    timestamps:
      - "20:18"
      - "22:28"
      - "25:31"
    relations:
      - target: Open Models
        type: part_of
        note: Nemotron is one of NVIDIA's key open foundation models for language.
      - target: BioNemo
        type: related_to
        note: Both are domain-specific open foundation models created by NVIDIA.

  - name: Open Models
    aliases:
      - Open Source AI
    definition: >-
      AI models with publicly available weights and architectures that can be inspected, fine-tuned, and deployed
      independently. Jensen argues open models are essential for AI safety (you cannot secure a black box),
      democratization of AI across languages and domains, and enabling cybersecurity defense through swarms of
      cheap, specialized models.
    tags:
      - policy
      - safety
      - open-source
    timestamps:
      - "17:13"
      - "23:58"
      - "24:46"
    relations:
      - target: Nemotron
        type: enables
        note: Open models like Nemotron enable communities to fine-tune for their specific languages.
      - target: Co-Design
        type: related_to
        note: Open models complement proprietary frontier models in a co-designed ecosystem.

  - name: Generative vs Pre-Recorded Computing
    aliases:
      - Generative Computing
    definition: >-
      The fundamental shift in computing from serving pre-recorded, retrieval-based content (images, videos,
      compiled software) to generating contextually relevant, real-time content. This shift changes every layer
      of the computing stack and requires fundamentally different architectures and energy profiles.
    tags:
      - theory
      - architecture
      - paradigm-shift
    timestamps:
      - "02:35"
      - "02:47"
      - "39:53"
    relations:
      - target: Agentic Computing
        type: prerequisite_for
        note: Generative computing is the foundation upon which agentic, continuous computing is built.
      - target: Co-Design
        type: related_to
        note: The shift to generative computing drives the need for full-stack co-design.

  - name: Alpamo
    aliases:
      - Alpha Mayo
    definition: >-
      NVIDIA's open foundation model for autonomous vehicles that fuses a language model with a driving world
      model. By incorporating human priors and language reasoning, it dramatically reduces the training data
      needed for safe driving compared to pure experience-based approaches.
    tags:
      - models
      - autonomous-vehicles
      - robotics
    timestamps:
      - "04:06"
      - "22:59"
      - "23:23"
    relations:
      - target: Nemotron
        type: related_to
        note: Alpamo fuses Nemotron-family language models with domain-specific driving world models.
      - target: Open Models
        type: part_of
        note: Alpamo is part of NVIDIA's open foundation model portfolio.
