concepts:
  - name: Network Effect Bootstrapping
    aliases:
      - Bootstrap Problem
    definition: >-
      The challenge of initializing a network's value from zero, when the n-squared value proposition requires
      existing nodes to attract new ones. Requires asymmetric hacks, subsidies, or unconventional distribution
      strategies before the network becomes self-sustaining.
    tags:
      - strategy
      - networks
      - venture-capital
    timestamps:
      - "15:04"
      - "15:21"
      - "16:28"
    relations:
      - target: Centralized Control Shared Economics
        type: enables
        note: Centralized control allowed a16z to invest fees into network bootstrapping rather than partner salaries.
      - target: Capital as a Weapon
        type: related_to
        note: Network bootstrapping often requires capital investment before returns materialize.

  - name: Centralized Control Shared Economics
    aliases:
      - a16z Organizational Model
    definition: >-
      a16z's innovation of maintaining a single decision-maker (centralized control) while distributing financial
      returns across partners (shared economics). This enabled rapid organizational change, scaling into new
      categories, and avoiding the consensus paralysis of traditional VC partnerships.
    tags:
      - organization
      - venture-capital
      - leadership
    timestamps:
      - "07:41"
      - "08:32"
      - "08:36"
    relations:
      - target: Culture as Actions
        type: enables
        note: Centralized control enables a leader to define and enforce cultural standards.
      - target: Network Effect Bootstrapping
        type: enables
        note: Organizational flexibility from centralized control enabled aggressive network-building investments.

  - name: Capital as a Weapon
    aliases:
      - Capital Race
      - Throwing Money at the Problem
    definition: >-
      The new reality in AI where, unlike traditional software development, you can solve most problems by
      deploying sufficient compute and capital. This makes capital races a genuine competitive dimension for
      the first time in tech history.
    tags:
      - strategy
      - venture-capital
      - compute
    timestamps:
      - "21:12"
      - "21:25"
      - "25:27"
    relations:
      - target: SaaS Apocalypse
        type: related_to
        note: Capital as a weapon drives the fear that well-funded AI labs will one-shot SaaS incumbents.
      - target: Culture as Actions
        type: contrasts_with
        note: Capital alone doesn't build culture; execution and cultural discipline are orthogonal advantages.

  - name: Culture as Actions
    aliases:
      - Bushido Culture
    definition: >-
      The principle from samurai philosophy (Bushido) that organizational culture should be defined by specific,
      observable behaviors — office presence, response times, decision hierarchy — rather than aspirational beliefs
      or corporate values platitudes.
    tags:
      - culture
      - leadership
      - organization
    timestamps:
      - "36:17"
      - "36:23"
      - "45:01"
    relations:
      - target: Centralized Control Shared Economics
        type: prerequisite_for
        note: Cultural standards require a single leader to define and enforce them.
      - target: SaaS Apocalypse
        type: related_to
        note: Companies with strong execution culture are better positioned to survive disruption narratives.

  - name: SaaS Apocalypse
    aliases:
      - SaaS Collapse Narrative
    definition: >-
      The Wall Street narrative that AI will one-shot all SaaS companies, causing a broad sell-off of software
      stocks. Ben Horowitz argues this conflates companies with deep moats (global supply chains, specialized
      sales channels) with those whose only defensibility was code and UI.
    tags:
      - markets
      - strategy
      - narrative
    timestamps:
      - "27:46"
      - "58:09"
      - "01:01:13"
    relations:
      - target: Capital as a Weapon
        type: related_to
        note: The SaaS apocalypse fear is driven by the perception that AI capital can replace any software.
      - target: Network Effect Bootstrapping
        type: contrasts_with
        note: Companies with bootstrapped network effects and deep distribution are resistant to AI disruption.

  - name: Truth-Seeking Conversation
    aliases:
      - Investment Decision Making
    definition: >-
      The high-fidelity, small-group conversation format that a16z uses for investment decisions. Optimal size
      is about 7 people with good chemistry. More than that becomes a presentation, not a conversation.
    tags:
      - decision-making
      - venture-capital
      - organization
    timestamps:
      - "09:05"
      - "09:14"
      - "09:31"
    relations:
      - target: Centralized Control Shared Economics
        type: part_of
        note: Small truth-seeking groups work within the centralized control framework.

  - name: LBO vs VC Culture
    aliases:
      - Leverage Buyout Mindset
    definition: >-
      The fundamental cultural tension between venture capital (invest in entrepreneurs, focus on growth, build
      new things) and leverage buyout (entry price, efficiency, firing people). AI creates LBO-like opportunities
      but pursuing them splits VC culture and mission.
    tags:
      - venture-capital
      - culture
      - strategy
    timestamps:
      - "46:16"
      - "46:23"
      - "47:06"
    relations:
      - target: Culture as Actions
        type: related_to
        note: Choosing not to pursue LBOs is a cultural action that defines the firm's identity.
      - target: Capital as a Weapon
        type: contrasts_with
        note: LBOs use capital for efficiency; VC uses capital for growth — same weapon, opposite motions.
