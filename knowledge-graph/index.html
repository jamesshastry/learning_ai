t","definition":"An agent that orchestrates the entire evaluation pipeline for testing other agents: preparing environments, distributing test tasks, collecting results, verifying execution correctness, computing metrics, and reporting outcomes.","tags":["evaluation","agents","infrastructure"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs294-agentic-f25","lecture":"04"}]},{"id":"dynamic-benchmark","name":"Dynamic Benchmark","definition":"A benchmark with test cases that are continuously updated or periodically regenerated, preventing data contamination and maintaining relevance with real-world data shifts. Examples include LiveCodeBench and DynaBench.","tags":["evaluation","benchmarks"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs294-agentic-f25","lecture":"04"}]},{"id":"llm-as-judge","name":"LLM-as-Judge","definition":"Using a language model to evaluate the outputs of another language model, checking if responses contain prohibited information even in non-obvious forms (translations, encodings, paraphrases). More flexible than rule-based metrics but introduces its own biases.","tags":["evaluation","methodology","training","llm"],"nodeType":"concept","sourceCount":3,"sources":[{"course":"cs294-agentic-f25","lecture":"04"},{"course":"cs336","lecture":"12"},{"course":"mit-6s191","lecture":"07"}]},{"id":"swe-bench-verified","name":"SWE-bench Verified","definition":"A benchmark for evaluating coding agents on real-world software engineering tasks, consisting of 2294 GitHub issues from 12 Python repositories where agents must generate patches that pass existing test suites — the gold standard for practical coding agent evaluation.","tags":["benchmarks","software-engineering","evaluation","benchmark"],"nodeType":"concept","sourceCount":2,"sources":[{"course":"cs294-agentic-f25","lecture":"04"},{"course":"llm-agents-f24","lecture":"06"}]},{"id":"rubric-based-evaluation","name":"Rubric-Based Evaluation","definition":"Evaluation method where expert annotators create 50+ detailed, structured, scorable criteria per question. Each criterion is binary (0/1) and covers a specific aspect of answer quality. Enables reliable grading of non-verifiable tasks.","tags":["evaluation","methodology","training"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs294-agentic-f25","lecture":"05"}]},{"id":"data-synthesis","name":"Data Synthesis","definition":"The process of using LLMs to generate large-scale training data from small expert-annotated seed examples. Considered the most scalable and critical capability for improving production models.","tags":["training","data","scalability"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs294-agentic-f25","lecture":"05"}]},{"id":"environment-simulator","name":"Environment Simulator","definition":"CPU-based infrastructure for executing agent actions during training (running code, tests, tool calls). Typically requires 10x the CPU count relative to the GPU training cluster, representing a major infrastructure cost.","tags":["infrastructure","training","agents"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs294-agentic-f25","lecture":"05"}]},{"id":"multi-turn-agentic-training","name":"Multi-Turn Agentic Training","definition":"Training paradigm where the model engages in multiple rounds of communication with an environment simulator — executing actions, receiving feedback, reasoning about next steps — rather than single-shot generation.","tags":["training","agents","methodology"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs294-agentic-f25","lecture":"05"}]},{"id":"agentic-model-requirements","name":"Agentic Model Requirements","definition":"The five core capabilities needed for agentic models: goal-orientation (clear objectives), tool usage (multi-turn simulator interaction), planning (sequencing actions), reasoning (deciding next steps based on current state), and user interaction (responding to human feedback).","tags":["agents","capabilities","architecture"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs294-agentic-f25","lecture":"05"}]},{"id":"minimax-equilibrium","name":"Minimax Equilibrium","definition":"A set of strategies where no player can improve by unilaterally deviating. In two-player zero-sum games, playing minimax guarantees not losing in expectation. Opponents' mistakes become profit.","tags":["game-theory","multi-agent","strategy"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs294-agentic-f25","lecture":"06"}]},{"id":"exploitability","name":"Exploitability","definition":"A measure of how much value an agent loses against its worst-case (best response) opponent. Zero exploitability means the agent plays a perfect equilibrium strategy. Used to evaluate robustness of game-playing agents.","tags":["game-theory","evaluation","robustness"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs294-agentic-f25","lecture":"06"}]},{"id":"population-best-response","name":"Population Best Response","definition":"Strategy that maximizes performance against the actual distribution of opponents rather than against a worst-case adversary. May differ from minimax equilibrium — in poker, the most profitable player and the most robust player can be different.","tags":["game-theory","strategy","multi-agent"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs294-agentic-f25","lecture":"06"}]},{"id":"ai-debate","name":"AI Debate","definition":"A framework where two AI agents argue opposing positions while a human judge evaluates. Adversarial dynamics expose weaknesses in each side's arguments, enabling even non-expert judges to make better decisions about AI outputs.","tags":["safety","multi-agent","verification"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs294-agentic-f25","lecture":"06"}]},{"id":"counterfactual-regret-minimization","name":"Counterfactual Regret Minimization","definition":"Algorithm for finding Nash equilibria in imperfect-information games like poker. Tracks regret for not having taken each action at each decision point, converging to equilibrium over iterations. Standard RL methods fail in these settings.","tags":["algorithm","game-theory","imperfect-information"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs294-agentic-f25","lecture":"06"}]},{"id":"predictable-noise","name":"Predictable Noise","definition":"The quantifiable statistical uncertainty inherent in LLM benchmark scores due to finite sample sizes. This noise follows known statistical distributions and can be computed from the data, yet is often ignored in model comparisons.","tags":["evaluation","statistics","benchmarks"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs294-agentic-f25","lecture":"07"}]},{"id":"super-population-sampling","name":"Super-Population Sampling","definition":"The statistical perspective that benchmark questions are samples drawn from a larger population of possible questions. The benchmark score estimates the model's true capability on the full population, with uncertainty proportional to 1/sqrt(N).","tags":["statistics","evaluation","methodology"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs294-agentic-f25","lecture":"07"}]},{"id":"paired-comparison-testing","name":"Paired Comparison Testing","definition":"Statistical method comparing two models on the same set of questions, computing per-question differences before aggregating. Dramatically reduces variance because question difficulty factors cancel out, enabling detection of smaller improvements.","tags":["statistics","evaluation","methodology"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs294-agentic-f25","lecture":"07"}]},{"id":"standard-error-of-the-mean","name":"Standard Error of the Mean","definition":"Statistical measure of how precisely the sample mean estimates the true population mean. Equals sigma/sqrt(N) where sigma is standard deviation and N is sample size. For binary outcomes, maximum SEM is 1/(2*sqrt(N)).","tags":["statistics","evaluation"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs294-agentic-f25","lecture":"07"}]},{"id":"benchmark-inconsistency","name":"Benchmark Inconsistency","definition":"The phenomenon where strong models fail easy problems and weak models solve hard ones, undermining the assumption that solving harder problems demonstrates greater capability. Suggests models have probabilistic rather than deterministic competence.","tags":["evaluation","reliability","benchmarks"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs294-agentic-f25","lecture":"07"}]},{"id":"virtual-lab","name":"Virtual Lab","definition":"Open-source platform where teams of specialized AI agents collaborate on scientific research. Features a PI agent that creates sub-agents, group meetings, parallel discussions, and consensus extraction. Published Nature paper designing SARS-CoV-2 nanobodies.","tags":["agents","science","multi-agent","platform"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs294-agentic-f25","lecture":"08"}]},{"id":"ai-co-scientist","name":"AI Co-Scientist","definition":"Paradigm shift from AI as a narrow tool for well-defined problems to AI as a research collaborator that can generate hypotheses, design experiments, analyze data, and write papers across diverse scientific domains.","tags":["science","paradigm","agents"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs294-agentic-f25","lecture":"08"}]},{"id":"paper2agent","name":"Paper2Agent","definition":"System that converts research papers into interactive AI agents capable of explaining methods, assisting replication, answering questions about limitations, and facilitating knowledge dissemination beyond static text.","tags":["science","knowledge","agents"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs294-agentic-f25","lecture":"08"}]},{"id":"agent-school","name":"Agent School","definition":"Training curriculum where AI agents teach themselves domain-specific skills by fine-tuning on specialized tools (AlphaFold, molecular docking) and scientific literature, enabling effective use of tools that base models cannot operate.","tags":["training","science","agents"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs294-agentic-f25","lecture":"08"}]},{"id":"scientific-critic-agent","name":"Scientific Critic Agent","definition":"A dedicated agent role in multi-agent scientific teams that provides conservative, skeptical feedback on other agents' proposals, analogous to a critical peer reviewer. Helps identify potential issues and overly optimistic assumptions.","tags":["agents","science","evaluation"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs294-agentic-f25","lecture":"08"}]},{"id":"parallel-meeting-consensus","name":"Parallel Meeting Consensus","definition":"Technique of running multiple parallel agent meetings per scientific question (e.g., 5x), exploiting LLM randomness for idea diversity, then having the PI agent read all transcripts to extract a consensus plan.","tags":["multi-agent","methodology","science"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs294-agentic-f25","lecture":"08"}]},{"id":"outcomes-based-pricing","name":"Outcomes-Based Pricing","definition":"Business model where a company only pays for AI agent services when the agent successfully resolves a customer's problem. Deeply aligns vendor incentives with customer success, pioneered by Sierra.","tags":["business-model","deployment","enterprise"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs294-agentic-f25","lecture":"09"}]},{"id":"customer-facing-agent","name":"Customer-Facing Agent","definition":"AI agent deployed to interact directly with a company's customers across channels (chat, voice, email). Handles everything from returns and troubleshooting to upselling and subscription management. Expected to become universal.","tags":["agents","enterprise","deployment"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs294-agentic-f25","lecture":"09"}]},{"id":"channel-collapse","name":"Channel Collapse","definition":"The convergence of separate customer support channels (phone, chat, email) into a single AI agent that appears wherever customers are. Eliminates separate teams and inconsistent experiences across channels.","tags":["enterprise","deployment","architecture"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs294-agentic-f25","lecture":"09"}]},{"id":"agent-iceberg-problem","name":"Agent Iceberg Problem","definition":"The observation that building a reliable production agent has 90% hidden complexity beneath the visible \"choose model + add tools\" surface. Includes version control, observability, compliance, hallucination prevention, prompt injection defense, and more.","tags":["deployment","engineering","production"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs294-agentic-f25","lecture":"09"}]},{"id":"ai-architect","name":"AI Architect","definition":"Emerging role within companies responsible for defining and shaping AI agent behavior, replacing traditional channel-specific support management teams. Combines domain knowledge with AI system configuration.","tags":["roles","enterprise","deployment"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs294-agentic-f25","lecture":"09"}]},{"id":"population-based-training","name":"Population-Based Training","definition":"Training technique that maintains a diverse population of agent strategies/policies to prevent rock-paper-scissors-style cycling. Critical for AlphaStar's robustness — agents trained against diverse opponents develop more general strategies.","tags":["training","multi-agent","robustness"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs294-agentic-f25","lecture":"10"}]},{"id":"alphastar","name":"AlphaStar","definition":"DeepMind's AI system that achieved grandmaster level in StarCraft II using a single neural network. Combined imitation learning from human replays with self-play RL and population-based training. First DeepMind AI deployed in the wild (BlizzCon 2019).","tags":["agents","gaming","multi-agent","landmark"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs294-agentic-f25","lecture":"10"}]},{"id":"agent-harness","name":"Agent Harness","definition":"The orchestration layer that controls how LLMs are called, manages tool invocations, handles environment interactions, and coordinates multi-step agent behavior. In modern agents, the harness + environment form a more complex system than classical RL settings.","tags":["architecture","agents","infrastructure"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs294-agentic-f25","lecture":"10"}]},{"id":"partial-observability-in-agents","name":"Partial Observability in Agents","definition":"The challenge of making decisions with incomplete state information. In StarCraft, agents cannot see the full map. In LLM agents, context windows are limited and environment state may be partially hidden. Requires inference and memory strategies.","tags":["agents","challenges","decision-making"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs294-agentic-f25","lecture":"10"}]},{"id":"imitation-learning-to-rl-pipeline","name":"Imitation Learning to RL Pipeline","definition":"Two-stage training approach: first imitate expert demonstrations (human replays in games, SFT in LLMs), then improve beyond demonstration quality via RL/self-play. Used by AlphaStar, DeepSeek R1, and most modern agentic model training.","tags":["training","methodology"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs294-agentic-f25","lecture":"10"}]},{"id":"embodied-agent","name":"Embodied Agent","definition":"An autonomous agent that operates in the physical world through sensors (cameras, LIDAR) and effectors/actuators (motors, grippers). All robots are embodied agents. Adds perception and physical action challenges beyond software agents.","tags":["robotics","agents","embodiment"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs294-agentic-f25","lecture":"11"}]},{"id":"sim-to-real-transfer","name":"Sim-to-Real Transfer","definition":"The challenge and techniques for transferring skills learned in simulation to real-world physical robots, typically addressed through domain randomization of simulation parameters to make learned policies robust to real-world variations.","tags":["robotics","training","methodology","transfer-learning"],"nodeType":"concept","sourceCount":2,"sources":[{"course":"cs294-agentic-f25","lecture":"11"},{"course":"llm-agents-f24","lecture":"09"}]},{"id":"robocup","name":"RoboCup","definition":"International robotics competition with the goal of creating a team of humanoid robots that can beat the FIFA World Cup champions on a real soccer field by 2050. Tests multi-agent coordination, perception, and autonomous decision-making.","tags":["robotics","competition","multi-agent"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs294-agentic-f25","lecture":"11"}]},{"id":"intelligent-complete-agent","name":"Intelligent Complete Agent","definition":"Agent architecture with three interconnected modules: perception (sensing and modeling the world), cognition (planning, coordination, decision-making), and action (translating decisions into physical/virtual actions).","tags":["architecture","agents","theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs294-agentic-f25","lecture":"11"}]},{"id":"slac","name":"SLAC","definition":"Approach that learns latent action representations in simulation, then fine-tunes with limited real-world data for efficient sim-to-real transfer. Published by Stone's group for whole-body real-world RL.","tags":["robotics","training","sim-to-real"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs294-agentic-f25","lecture":"11"}]},{"id":"gran-turismo-ai","name":"Gran Turismo AI","definition":"Sony AI's RL agent trained to race at superhuman level in Gran Turismo, published in Nature. Demonstrates that RL can produce expert-level embodied behavior in domains requiring precise continuous control and real-time decision making.","tags":["gaming","RL","embodiment","landmark"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs294-agentic-f25","lecture":"11"}]},{"id":"hybrid-agent-system","name":"Hybrid Agent System","definition":"An agentic AI system combining traditional software (symbolic components written by programmers) with neural components (LLMs). The interaction between these two layers creates unique security challenges not present in either alone.","tags":["architecture","security","agents"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs294-agentic-f25","lecture":"12"}]},{"id":"agentic-ai-attack-surface","name":"Agentic AI Attack Surface","definition":"The complete set of vulnerability points in an agent system — model, input processing, prompt assembly, tool access, output generation, and environment interaction — vastly larger than standalone LLM attack surface as each component and interaction point introduces new security risks.","tags":["security","agents","risk","safety","architecture"],"nodeType":"concept","sourceCount":2,"sources":[{"course":"cs294-agentic-f25","lecture":"12"},{"course":"llm-agents-sp25","lecture":"12"}]},{"id":"cia-triad-for-ai","name":"CIA Triad for AI","definition":"Extension of the classic CIA security framework to agentic AI: Confidentiality (system secrets, prompts, user data, model parameters), Integrity (model parameters, data accuracy), Availability (model performance, service reliability). Also includes AI safety (preventing harm to external world).","tags":["security","framework","goals"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs294-agentic-f25","lecture":"12"}]},{"id":"prompt-injection","name":"Prompt Injection","definition":"An attack vector where malicious instructions are embedded in content that agents process (retrieved documents, tool outputs, user messages), causing the agent to execute unintended actions — the agent-safety analog of SQL injection in traditional software.","tags":["security","attacks","LLM","safety","adversarial","agents","application"],"nodeType":"concept","sourceCount":3,"sources":[{"course":"cs294-agentic-f25","lecture":"12"},{"course":"llm-agents-f24","lecture":"12"},{"course":"llm-agents-sp25","lecture":"12"}]},{"id":"model-output-attack-vectors","name":"Model Output Attack Vectors","definition":"Six pathways through which LLM outputs can serve as attack vectors: (1) user-facing content (info leakage), (2) parameters for further invocations (compounding errors), (3) branch conditions (altered control flow), (4) function call parameters (SQL injection), (5) direct code execution, (6) external-facing actions (harm to world).","tags":["security","attacks","taxonomy"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs294-agentic-f25","lecture":"12"}]},{"id":"agent-flexibility-security-tradeoff","name":"Agent Flexibility-Security Tradeoff","definition":"The fundamental tension that increasing agent flexibility along any dimension (workflow, tools, actions, autonomy, memory) simultaneously increases the system's attack surface and security risk.","tags":["security","design","tradeoff"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs294-agentic-f25","lecture":"12"}]},{"id":"ai-cyber-offense","name":"AI Cyber Offense","definition":"The dual-use capability of AI agents to autonomously discover vulnerabilities, generate exploits, and conduct cyber attacks. Defensive AI capabilities directly translate to offensive capabilities, creating escalating risk.","tags":["security","misuse","cyber"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs294-agentic-f25","lecture":"12"}]},{"id":"byte-pair-encoding","name":"Byte Pair Encoding","definition":"A data-driven tokenization algorithm that starts with byte-level tokens and iteratively merges the most frequent adjacent pair into a new token, building a vocabulary tailored to the training corpus. Common sequences become single tokens while rare sequences fragment into multiple tokens, enabling adaptive computation.","tags":["data","architecture"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"01"}]},{"id":"compression-ratio","name":"Compression Ratio","definition":"The ratio of bytes to tokens in a tokenized sequence, measuring how efficiently a tokenizer compresses raw text. Higher compression means shorter sequences, which is desirable since attention cost is quadratic in sequence length.","tags":["data","optimization"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"01"}]},{"id":"adaptive-computation","name":"Adaptive Computation","definition":"The principle that different parts of an input should receive different amounts of computational resources. In tokenization, common sequences compress into single tokens (less computation) while rare or complex parts remain as multiple tokens (more computation).","tags":["architecture","optimization"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"01"}]},{"id":"from-scratch-philosophy","name":"From Scratch Philosophy","definition":"The pedagogical approach of CS336 where students implement every component of the language model pipeline from raw code rather than using existing frameworks, in order to deeply understand how each piece works and interacts with others.","tags":["training","theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"01"}]},{"id":"speculative-decoding","name":"Speculative Decoding","definition":"An inference optimization using a small draft model to generate K candidate tokens, then verifying them in parallel with the full model. Accepted tokens provide multi- token speedup while maintaining the exact same output distribution as standard autoregressive generation.","tags":["optimization","infrastructure"],"nodeType":"concept","sourceCount":2,"sources":[{"course":"cs336","lecture":"01"},{"course":"cs336","lecture":"10"}]},{"id":"arithmetic-intensity","name":"Arithmetic Intensity","definition":"The ratio of floating point operations to bytes of memory transferred for a given computation. Determines whether an operation is memory-bound (low intensity) or compute-bound (high intensity). H100 accelerator intensity is ~295 FLOPs/byte.","tags":["hardware","optimization"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"02"}]},{"id":"roofline-analysis","name":"Roofline Analysis","definition":"A visualization that plots achieved FLOPs/s against arithmetic intensity for a given accelerator. Shows two regimes — a sloped memory-bound region (limited by bandwidth) and a flat compute-bound region (limited by peak FLOPs). Used to diagnose bottlenecks.","tags":["hardware","optimization"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"02"}]},{"id":"mixed-precision-training","name":"Mixed Precision Training","definition":"Training technique using lower precision (BF16) for parameters, activations, and gradients while keeping optimizer states in FP32 for numerical stability. Reduces memory usage and increases throughput without significant quality loss.","tags":["training","optimization"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"02"}]},{"id":"activation-checkpointing","name":"Activation Checkpointing","definition":"A memory optimization that stores activations only at periodic checkpoints (e.g., every 4th layer) and recomputes intermediate activations during the backward pass. Achieves ~4x memory reduction at ~33% extra compute cost. Widely used because GPU compute is cheaper than memory.","tags":["training","optimization","memory","distributed-training"],"nodeType":"concept","sourceCount":2,"sources":[{"course":"cs336","lecture":"02"},{"course":"mit-6s191","lecture":"09"}]},{"id":"bfloat16","name":"BFloat16","definition":"A 16-bit floating point format with 1 sign bit, 8 exponent bits, and 7 mantissa bits. Has the same dynamic range as FP32 (8 exponent bits) but lower resolution. Developed by Google Brain in 2018 specifically for deep learning workloads.","tags":["hardware","training"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"02"}]},{"id":"einops","name":"Einops","definition":"A library for tensor manipulation using named dimensions inspired by Einstein summation notation. Provides einsum (generalized matrix multiplication), reduce (aggregation), and rearrange (reshape/transpose) operations that make tensor operations explicit and less error-prone than index-based approaches.","tags":["infrastructure","training"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"02"}]},{"id":"gradient-accumulation","name":"Gradient Accumulation","definition":"Technique for simulating large batch sizes without proportional memory increase by computing gradients on smaller micro-batches and accumulating them before updating parameters. Enables use of effective batch sizes larger than what fits in GPU memory.","tags":["training","optimization"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"02"}]},{"id":"rms-norm","name":"RMS Norm","definition":"A simplified layer normalization that omits mean subtraction and bias addition, only dividing by the root mean square of activations then scaling. Achieves same model quality as layer norm but with less memory movement overhead.","tags":["architecture","optimization"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"03"}]},{"id":"swiglu","name":"SwiGLU","definition":"A gated activation function that multiplies the Swish activation (x * sigmoid(x)) of one linear projection element-wise with a second linear projection. Requires three weight matrices instead of two, so FF dimension is typically reduced by 2/3 to maintain parameter count parity.","tags":["architecture"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"03"}]},{"id":"rope","name":"RoPE","definition":"A relative position encoding method that rotates pairs of embedding dimensions by angles proportional to absolute position. Inner products between rotated vectors depend only on relative position difference, providing pure relative position information without absolute cross-terms.","tags":["architecture"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"03"}]},{"id":"grouped-query-attention","name":"Grouped Query Attention","definition":"An attention variant that uses fewer key-value heads than query heads, with groups of query heads sharing the same KV head. Provides a tunable tradeoff between full multi-head attention (best quality) and multi-query attention (best inference speed), achieving near-MHA quality with significant KV cache reduction.","tags":["architecture","optimization"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"03"}]},{"id":"qk-norm","name":"QK Norm","definition":"A stability technique that applies RMS normalization to queries and keys before computing attention scores. Ensures inputs to the attention softmax have controlled scale, preventing attention degeneracies and gradient spikes. Originally from multimodal models, now standard in large language models.","tags":["architecture","training"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"03"}]},{"id":"z-loss","name":"Z-Loss","definition":"A regularization term that penalizes the squared log-normalizer of the output softmax, encouraging it to stay near zero for numerical stability. Exploits the overparameterization of softmax (adding a constant to logits doesn't change output) to keep the normalizer well-behaved.","tags":["training","architecture"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"03"}]},{"id":"sliding-window-attention","name":"Sliding Window Attention","definition":"An attention pattern where tokens can only attend to a fixed-size local window of neighboring positions, reducing quadratic cost to linear. Modern architectures alternate sliding window layers with full attention layers to balance long-range and local information processing.","tags":["architecture","optimization"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"03"}]},{"id":"linear-attention","name":"Linear Attention","definition":"Attention mechanism that drops the softmax normalization, enabling matrix multiplication reordering via associativity: Q(K^T V) instead of (QK^T)V. Changes complexity from O(N^2 D) to O(N D^2). Has an equivalent RNN form for efficient inference with constant-size state.","tags":["architecture","optimization"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"04"}]},{"id":"gated-deltanet","name":"Gated DeltaNet","definition":"A state-space model extending linear attention with two input-dependent gates (forget gate gamma and input gate beta) plus a key-direction projection for erasing old information before writing new. Used in Qwen 3.5 in 3:1 hybrid with full attention.","tags":["architecture"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"04"}]},{"id":"expert-collapse","name":"Expert Collapse","definition":"A degenerate MoE training outcome where the rich-get-richer dynamic causes most tokens to be routed to just 1-2 experts while remaining experts receive no training signal. Without load-balancing interventions, most MoE parameters become wasted.","tags":["training"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"04"}]},{"id":"load-balancing-loss","name":"Load Balancing Loss","definition":"An auxiliary loss term that penalizes uneven token distribution across experts. Computed as the dot product of fraction-of-tokens-dispatched and probability-mass- allocated per expert. Gradient pushes down routing probability for popular experts proportional to their token fraction.","tags":["training","architecture"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"04"}]},{"id":"deepseek-sparse-attention","name":"DeepSeek Sparse Attention","definition":"An efficient attention method that uses a lightweight indexer to select top-K relevant tokens from the full context, then performs full attention only on this subset. Can be bolted on during long-context extension rather than pre-training.","tags":["architecture","optimization"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"04"}]},{"id":"shared-experts","name":"Shared Experts","definition":"A subset of MoE experts that bypass the router and process every token, handling common computation. Introduced by DeepSeek MoE, allows routed experts to specialize more. Combined with fine-grained expert segmentation for best results.","tags":["architecture"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"04"}]},{"id":"streaming-multiprocessor","name":"Streaming Multiprocessor","definition":"The fundamental compute unit of an Nvidia GPU, containing its own registers, shared memory, L1 cache, warp schedulers, and tensor cores. Modern GPUs have 100-200 SMs. Thread blocks are scheduled onto SMs for execution.","tags":["hardware"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"05"}]},{"id":"flash-attention","name":"Flash Attention","definition":"An IO-aware attention algorithm that tiles the Q, K, V computation into blocks that fit in GPU SRAM, using online softmax (log-sum-exp trick) to accumulate results without materializing the full N×N attention matrix in HBM. Achieves O(N) memory and significant wall-clock speedup.","tags":["optimization","architecture"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"05"}]},{"id":"tensor-cores","name":"Tensor Cores","definition":"Specialized GPU hardware that performs small matrix multiply-accumulate operations (e.g., 16x16x16 in BF16) at much higher throughput than general CUDA cores. All modern LLM training uses tensor cores for matmul operations.","tags":["hardware"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"05"}]},{"id":"warp","name":"Warp","definition":"A group of 32 GPU threads that execute the same instruction in lockstep (SIMT model). Warp divergence (different threads taking different branches) wastes compute. Matrix dimensions should be multiples of 32 to avoid partial warps.","tags":["hardware"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"05"}]},{"id":"memory-hierarchy","name":"Memory Hierarchy","definition":"The layered memory system in GPUs: registers (fastest, per-thread) > shared memory/L1 (programmable SRAM, per-SM) > L2 cache (chip-wide) > HBM (off-chip DRAM, highest capacity). Data movement between levels dominates runtime for memory-bound operations.","tags":["hardware","optimization"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"05"}]},{"id":"kernel-fusion","name":"Kernel Fusion","definition":"A key concept in language model optimization covered in CS336 Lecture 06 (Kernels, Triton, XLA). This concept relates to the practical implementation and optimization of large language models, connecting theoretical understanding to engineering practice.","tags":["optimization"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"06"}]},{"id":"triton","name":"Triton","definition":"A key concept in language model infrastructure covered in CS336 Lecture 06 (Kernels, Triton, XLA). This concept relates to the practical implementation and optimization of large language models, connecting theoretical understanding to engineering practice.","tags":["infrastructure"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"06"}]},{"id":"tiling","name":"Tiling","definition":"A key concept in language model optimization covered in CS336 Lecture 06 (Kernels, Triton, XLA). This concept relates to the practical implementation and optimization of large language models, connecting theoretical understanding to engineering practice.","tags":["optimization"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"06"}]},{"id":"gpu-profiling","name":"GPU Profiling","definition":"A key concept in language model infrastructure covered in CS336 Lecture 06 (Kernels, Triton, XLA). This concept relates to the practical implementation and optimization of large language models, connecting theoretical understanding to engineering practice.","tags":["infrastructure"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"06"}]},{"id":"xla-compilation","name":"XLA Compilation","definition":"A key concept in language model infrastructure covered in CS336 Lecture 06 (Kernels, Triton, XLA). This concept relates to the practical implementation and optimization of large language models, connecting theoretical understanding to engineering practice.","tags":["infrastructure"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"06"}]},{"id":"data-parallelism","name":"Data Parallelism","definition":"The simplest distributed training strategy: replicate the full model on each GPU, distribute different data batches to each replica, compute gradients independently, then synchronize via all-reduce mean. Scales linearly but limited by batch size degrading generalization.","tags":["training","distributed-training","parallelism"],"nodeType":"concept","sourceCount":2,"sources":[{"course":"cs336","lecture":"07"},{"course":"mit-6s191","lecture":"09"}]},{"id":"all-reduce","name":"All-Reduce","definition":"A key concept in language model infrastructure covered in CS336 Lecture 07 (Parallelism (Part 1)). This concept relates to the practical implementation and optimization of large language models, connecting theoretical understanding to engineering practice.","tags":["infrastructure"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"07"}]},{"id":"collective-operations","name":"Collective Operations","definition":"A key concept in language model infrastructure covered in CS336 Lecture 07 (Parallelism (Part 1)). This concept relates to the practical implementation and optimization of large language models, connecting theoretical understanding to engineering practice.","tags":["infrastructure"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"07"}]},{"id":"communication-bandwidth","name":"Communication Bandwidth","definition":"A key concept in language model hardware covered in CS336 Lecture 07 (Parallelism (Part 1)). This concept relates to the practical implementation and optimization of large language models, connecting theoretical understanding to engineering practice.","tags":["hardware"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"07"}]},{"id":"ring-all-reduce","name":"Ring All-Reduce","definition":"A key concept in language model infrastructure covered in CS336 Lecture 07 (Parallelism (Part 1)). This concept relates to the practical implementation and optimization of large language models, connecting theoretical understanding to engineering practice.","tags":["infrastructure"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"07"}]},{"id":"tensor-parallelism","name":"Tensor Parallelism","definition":"Splitting weight matrices within a single layer across GPUs using column parallelism (partition output) and row parallelism (partition input). For transformer MLPs, stacking column + row parallelism requires only one all-reduce per two-layer block. Best on high-bandwidth interconnects.","tags":["training","distributed-training","parallelism"],"nodeType":"concept","sourceCount":2,"sources":[{"course":"cs336","lecture":"08"},{"course":"mit-6s191","lecture":"09"}]},{"id":"pipeline-parallelism","name":"Pipeline Parallelism","definition":"A key concept in language model training covered in CS336 Lecture 08 (Parallelism (Part 2)). This concept relates to the practical implementation and optimization of large language models, connecting theoretical understanding to engineering practice.","tags":["training","distributed-training","parallelism"],"nodeType":"concept","sourceCount":2,"sources":[{"course":"cs336","lecture":"08"},{"course":"mit-6s191","lecture":"09"}]},{"id":"fsdpzero","name":"FSDP/ZeRO","definition":"A key concept in language model training covered in CS336 Lecture 08 (Parallelism (Part 2)). This concept relates to the practical implementation and optimization of large language models, connecting theoretical understanding to engineering practice.","tags":["training"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"08"}]},{"id":"sequence-parallelism","name":"Sequence Parallelism","definition":"A key concept in language model training covered in CS336 Lecture 08 (Parallelism (Part 2)). This concept relates to the practical implementation and optimization of large language models, connecting theoretical understanding to engineering practice.","tags":["training"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"08"}]},{"id":"expert-parallelism","name":"Expert Parallelism","definition":"A key concept in language model training covered in CS336 Lecture 08 (Parallelism (Part 2)). This concept relates to the practical implementation and optimization of large language models, connecting theoretical understanding to engineering practice.","tags":["training"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"08"}]},{"id":"pipeline-bubble","name":"Pipeline Bubble","definition":"A key concept in language model training covered in CS336 Lecture 08 (Parallelism (Part 2)). This concept relates to the practical implementation and optimization of large language models, connecting theoretical understanding to engineering practice.","tags":["training"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"08"}]},{"id":"isoflop-curves","name":"IsoFLOP Curves","definition":"Experimental methodology where, for each fixed FLOPs budget, model size is swept to find the minimum loss. The optimal points across budgets are then fit with a power law to predict the best model size for a target compute budget.","tags":["training","theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"09"}]},{"id":"scaling-recipe","name":"Scaling Recipe","definition":"A complete function mapping a FLOPs budget to all hyperparameters needed for training (model size, learning rate, batch size, etc.). Must extrapolate predictably across scales — predictability is as important as optimality for successful large-scale training.","tags":["training"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"09"}]},{"id":"hyperparameter-transfer","name":"Hyperparameter Transfer","definition":"The property that optimal hyperparameters at small scale are either identical to or predictable functions of optimal hyperparameters at large scale. Essential for scaling laws to work — without it, small experiments cannot inform large runs.","tags":["training"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"09"}]},{"id":"power-law","name":"Power Law","definition":"The mathematical form governing how loss decreases with scale — L(N) = aN^(-b) + c, where N is model size, data, or compute. The exponent b determines how quickly performance improves with scale, and c represents the irreducible error (data entropy).","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"09"}]},{"id":"kv-cache","name":"KV Cache","definition":"A memory structure that stores the key and value projections for all previously processed tokens, enabling efficient autoregressive generation without recomputing attention for past positions. Size grows linearly with context length and number of attention heads, making it a major memory bottleneck.","tags":["optimization","architecture"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"10"}]},{"id":"prefill-vs-decode","name":"Prefill vs Decode","definition":"The two distinct phases of LLM inference. Prefill processes all prompt tokens in parallel (compute-bound, like training). Decode generates tokens one at a time, reading the full KV cache and model weights each step (memory-bound). This dichotomy fundamentally shapes inference optimization strategies.","tags":["optimization"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"10"}]},{"id":"quantization","name":"Quantization","definition":"Reducing the numerical precision of model weights and/or activations (e.g., FP16 to INT8 or INT4) to decrease memory footprint and increase inference speed. Can be done post-training (PTQ) or during training (QAT). Trades precision for efficiency.","tags":["optimization"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"10"}]},{"id":"continuous-batching","name":"Continuous Batching","definition":"An inference serving technique that dynamically adds and removes requests from the batch as they arrive and complete, rather than waiting for all requests in a static batch to finish. Dramatically improves GPU utilization for serving.","tags":["infrastructure"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"10"}]},{"id":"pagedattention","name":"PagedAttention","definition":"A KV cache management technique inspired by operating system virtual memory that stores cache in non-contiguous pages. Eliminates memory fragmentation from variable- length sequences, enables sharing common prefixes across requests, and dramatically improves memory utilization in inference serving.","tags":["infrastructure","optimization"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"10"}]},{"id":"mup","name":"muP","definition":"A key concept in language model training covered in CS336 Lecture 11 (Scaling Laws (continued)). This concept relates to the practical implementation and optimization of large language models, connecting theoretical understanding to engineering practice.","tags":["training"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"11"}]},{"id":"maximal-update-parametrization","name":"Maximal Update Parametrization","definition":"A key concept in language model training covered in CS336 Lecture 11 (Scaling Laws (continued)). This concept relates to the practical implementation and optimization of large language models, connecting theoretical understanding to engineering practice.","tags":["training"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"11"}]},{"id":"inference-optimal-scaling","name":"Inference-Optimal Scaling","definition":"A key concept in language model training covered in CS336 Lecture 11 (Scaling Laws (continued)). This concept relates to the practical implementation and optimization of large language models, connecting theoretical understanding to engineering practice.","tags":["training"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"11"}]},{"id":"learning-rate-transfer","name":"Learning Rate Transfer","definition":"A key concept in language model training covered in CS336 Lecture 11 (Scaling Laws (continued)). This concept relates to the practical implementation and optimization of large language models, connecting theoretical understanding to engineering practice.","tags":["training"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"11"}]},{"id":"critical-batch-size","name":"Critical Batch Size","definition":"A key concept in language model training covered in CS336 Lecture 11 (Scaling Laws (continued)). This concept relates to the practical implementation and optimization of large language models, connecting theoretical understanding to engineering practice.","tags":["training"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"11"}]},{"id":"over-training","name":"Over-Training","definition":"A key concept in language model training covered in CS336 Lecture 11 (Scaling Laws (continued)). This concept relates to the practical implementation and optimization of large language models, connecting theoretical understanding to engineering practice.","tags":["training"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"11"}]},{"id":"perplexity","name":"Perplexity","definition":"A key concept in language model training covered in CS336 Lecture 12 (Evaluation). This concept relates to the practical implementation and optimization of large language models, connecting theoretical understanding to engineering practice.","tags":["training"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"12"}]},{"id":"bits-per-byte","name":"Bits Per Byte","definition":"A key concept in language model training covered in CS336 Lecture 12 (Evaluation). This concept relates to the practical implementation and optimization of large language models, connecting theoretical understanding to engineering practice.","tags":["training"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"12"}]},{"id":"benchmark-contamination","name":"Benchmark Contamination","definition":"A key concept in language model training covered in CS336 Lecture 12 (Evaluation). This concept relates to the practical implementation and optimization of large language models, connecting theoretical understanding to engineering practice.","tags":["training"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"12"}]},{"id":"helm","name":"HELM","definition":"Stanford's comprehensive, transparent benchmark framework for evaluating foundation models across multiple dimensions including accuracy, calibration, robustness, fairness, efficiency, and more — providing standardized comparison across models.","tags":["training","benchmark","evaluation","transparency"],"nodeType":"concept","sourceCount":2,"sources":[{"course":"cs336","lecture":"12"},{"course":"llm-agents-f24","lecture":"10"}]},{"id":"chatbot-arena","name":"Chatbot Arena","definition":"A key concept in language model training covered in CS336 Lecture 12 (Evaluation). This concept relates to the practical implementation and optimization of large language models, connecting theoretical understanding to engineering practice.","tags":["training"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"12"}]},{"id":"evaluation-taxonomy","name":"Evaluation Taxonomy","definition":"A key concept in language model training covered in CS336 Lecture 12 (Evaluation). This concept relates to the practical implementation and optimization of large language models, connecting theoretical understanding to engineering practice.","tags":["training"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"12"}]},{"id":"common-crawl","name":"Common Crawl","definition":"A key concept in language model data covered in CS336 Lecture 13 (Data: Sources and Datasets). This concept relates to the practical implementation and optimization of large language models, connecting theoretical understanding to engineering practice.","tags":["data"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"13"}]},{"id":"data-pipeline","name":"Data Pipeline","definition":"A key concept in language model data covered in CS336 Lecture 13 (Data: Sources and Datase ting theoretical understanding to engineering practice.","tags":["data"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"14"}]},{"id":"perplexity-filtering","name":"Perplexity Filtering","definition":"A key concept in language model data covered in CS336 Lecture 14 (Data: Filtering, Deduplication, Mixing, Synthetic Data). This concept relates to the practical implementation and optimization of large language models, connecting theoretical understanding to engineering practice.","tags":["data"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"14"}]},{"id":"ppo","name":"PPO","definition":"A key concept in language model training covered in CS336 Lecture 15 (Mid/Post-Training: SFT and RLHF). This concept relates to the practical implementation and optimization of large language models, connecting theoretical understanding to engineering practice.","tags":["training"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"15"}]},{"id":"dpo","name":"DPO","definition":"A key concept in language model training covered in CS336 Lecture 15 (Mid/Post-Training: SFT and RLHF). This concept relates to the practical implementation and optimization of large language models, connecting theoretical understanding to engineering practice.","tags":["training"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"15"}]},{"id":"rlvr","name":"RLVR","definition":"A key concept in language model training covered in CS336 Lecture 16 (Post-Training: RL with Verifiable Rewards). This concept relates to the practical implementation and optimization of large language models, connecting theoretical understanding to engineering practice.","tags":["training"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"16"}]},{"id":"verifiable-rewards","name":"Verifiable Rewards","definition":"A key concept in language model training covered in CS336 Lecture 16 (Post-Training: RL with Verifiable Rewards). This concept relates to the practical implementation and optimization of large language models, connecting theoretical understanding to engineering practice.","tags":["training","theory"],"nodeType":"concept","sourceCount":2,"sources":[{"course":"cs336","lecture":"16"},{"course":"llm-agents-sp25","lecture":"02"}]},{"id":"chain-of-thought","name":"Chain of Thought","definition":"A key concept in language model training covered in CS336 Lecture 16 (Post-Training: RL with Verifiable Rewards). This concept relates to the practical implementation and optimization of large language models, connecting theoretical understanding to engineering practice.","tags":["training"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"16"}]},{"id":"on-policy-vs-off-policy","name":"On-Policy vs Off-Policy","definition":"A key concept in language model training covered in CS336 Lecture 16 (Post-Training: RL with Verifiable Rewards). This concept relates to the practical implementation and optimization of large language models, connecting theoretical understanding to engineering practice.","tags":["training"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"16"}]},{"id":"alignment","name":"Alignment","definition":"A key concept in language model safety covered in CS336 Lecture 17 (Alignment and Multimodality). This concept relates to the practical implementation and optimization of large language models, connecting theoretical understanding to engineering practice.","tags":["safety"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"17"}]},{"id":"constitutional-ai","name":"Constitutional AI","definition":"A key concept in language model safety covered in CS336 Lecture 17 (Alignment and Multimodality). This concept relates to the practical implementation and optimization of large language models, connecting theoretical understanding to engineering practice.","tags":["safety"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"17"}]},{"id":"red-teaming","name":"Red-Teaming","definition":"A key concept in language model safety covered in CS336 Lecture 17 (Alignment and Multimodality). This concept relates to the practical implementation and optimization of large language models, connecting theoretical understanding to engineering practice.","tags":["safety"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"17"}]},{"id":"vision-encoder","name":"Vision Encoder","definition":"A key concept in language model architecture covered in CS336 Lecture 17 (Alignment and Multimodality). This concept relates to the practical implementation and optimization of large language models, connecting theoretical understanding to engineering practice.","tags":["architecture"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"17"}]},{"id":"vision-language-model","name":"Vision-Language Model","definition":"A key concept in language model architecture covered in CS336 Lecture 17 (Alignment and Multimodality). This concept relates to the practical implementation and optimization of large language models, connecting theoretical understanding to engineering practice.","tags":["architecture"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"17"}]},{"id":"multimodal-pre-training","name":"Multimodal Pre-Training","definition":"A key concept in language model training covered in CS336 Lecture 17 (Alignment and Multimodality). This concept relates to the practical implementation and optimization of large language models, connecting theoretical understanding to engineering practice.","tags":["training"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"17"}]},{"id":"hardware-aware-design","name":"Hardware-Aware Design","definition":"A key concept in language model architecture covered in CS336 Lecture 18 (Guest Lecture: Dan Fu). This concept relates to the practical implementation and optimization of large language models, connecting theoretical understanding to engineering practice.","tags":["architecture"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"18"}]},{"id":"systems-ml-co-design","name":"Systems-ML Co-Design","definition":"A key concept in language model architecture covered in CS336 Lecture 18 (Guest Lecture: Dan Fu). This concept relates to the practical implementation and optimization of large language models, connecting theoretical understanding to engineering practice.","tags":["architecture"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"18"}]},{"id":"efficient-architectures","name":"Efficient Architectures","definition":"A key concept in language model architecture covered in CS336 Lecture 18 (Guest Lecture: Dan Fu). This concept relates to the practical implementation and optimization of large language models, connecting theoretical understanding to engineering practice.","tags":["architecture"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"18"}]},{"id":"research-methodology","name":"Research Methodology","definition":"A key concept in language model theory covered in CS336 Lecture 18 (Guest Lecture: Dan Fu). This concept relates to the practical implementation and optimization of large language models, connecting theoretical understanding to engineering practice.","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"18"}]},{"id":"state-space-models","name":"State-Space Models","definition":"A key concept in language model architecture covered in CS336 Lecture 18 (Guest Lecture: Dan Fu). This concept relates to the practical implementation and optimization of large language models, connecting theoretical understanding to engineering practice.","tags":["architecture"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs336","lecture":"18"}]},{"id":"chain-of-thought-prompting","name":"Chain-of-Thought Prompting","definition":"A prompting technique where intermediate reasoning steps are included in few-shot examples, enabling LLMs to generate step-by-step reasoning before producing final answers, dramatically improving performance on complex tasks.","tags":["reasoning","prompting","theory"],"nodeType":"concept","sourceCount":2,"sources":[{"course":"llm-agents-f24","lecture":"01"},{"course":"llm-agents-sp25","lecture":"01"}]},{"id":"self-consistency","name":"Self-Consistency","definition":"A decoding strategy that samples multiple reasoning paths from an LLM and selects the most frequent final answer via majority vote, grounded in the machine learning principle of maximum marginal inference over latent reasoning paths.","tags":["reasoning","optimization","theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"01"}]},{"id":"least-to-most-prompting","name":"Least-to-Most Prompting","definition":"A prompting strategy inspired by Polya's problem-solving methodology that decomposes complex problems into simpler subproblems, solving them sequentially from easiest to hardest, enabling easy-to-hard generalization with minimal demonstrations.","tags":["reasoning","prompting","application","theory"],"nodeType":"concept","sourceCount":2,"sources":[{"course":"llm-agents-f24","lecture":"01"},{"course":"llm-agents-sp25","lecture":"01"}]},{"id":"analogical-reasoning","name":"Analogical Reasoning","definition":"A zero-shot reasoning approach where the LLM self-generates relevant examples and knowledge for each new problem by recalling related problems, inspired by Polya's method of solving by analogy, outperforming both zero-shot CoT and manual few-shot CoT.","tags":["reasoning","prompting","application"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"01"}]},{"id":"chain-of-thought-decoding","name":"Chain-of-Thought Decoding","definition":"A decoding technique showing that pre-trained LLMs contain chain-of-thought reasoning paths among top-k token alternatives at the first decoding step, enabling step-by-step reasoning without any prompting by exploring alternative starting tokens.","tags":["reasoning","theory","architecture"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"01"}]},{"id":"intermediate-step-generation","name":"Intermediate Step Generation","definition":"The foundational principle that LLM performance improves dramatically when models generate intermediate computational steps before final answers, whether through training, fine-tuning, or prompting — mathematically proven to allow constant-depth transformers to solve any inherently serial problem.","tags":["theory","reasoning","architecture"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"01"}]},{"id":"premise-order-sensitivity","name":"Premise Order Sensitivity","definition":"A fundamental LLM limitation where reordering the premises or sentences in reasoning problems causes significant performance drops (10+ points on math, 30+ on logic), revealing that LLMs process information sequentially and cannot reason flexibly about unordered premises.","tags":["limitation","reasoning","evaluation"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"01"}]},{"id":"llm-self-correction-failure","name":"LLM Self-Correction Failure","definition":"The finding that LLMs cannot reliably self-correct their reasoning without oracle feedback — while review prompts can fix wrong answers, they equally risk corrupting correct ones, yielding no net improvement and sometimes degradation across benchmarks.","tags":["limitation","reasoning","safety"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"01"}]},{"id":"irrelevant-context-distraction","name":"Irrelevant Context Distraction","definition":"An LLM limitation where adding irrelevant information to problem statements significantly decreases reasoning accuracy, mirroring findings from psychology about human problem-solving, with performance degrading as irrelevant context grows arbitrarily large.","tags":["limitation","reasoning","safety"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"01"}]},{"id":"self-debug","name":"Self-Debug","definition":"A technique where LLMs correct their generated code by using unit test results as oracle feedback, naturally leveraging the availability of automated verification in coding tasks to achieve genuine self-improvement, unlike general reasoning self-correction.","tags":["application","reasoning","code-generation"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"01"}]},{"id":"react","name":"ReAct","definition":"A paradigm for LLM agents that interleaves reasoning (thinking) and acting (tool use) in a single trajectory, where reasoning guides action planning and error recovery while acting provides external knowledge and feedback to improve reasoning.","tags":["agents","reasoning","framework","application"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"02"}]},{"id":"reasoning-agent","name":"Reasoning Agent","definition":"An agent that uses LLMs not just to generate actions but to reason before acting, using natural language as an infinite internal action space that changes only the agent's own context, fundamentally different from symbolic AI or deep RL agents.","tags":["agents","theory","reasoning"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"02"}]},{"id":"long-term-memory","name":"Long-Term Memory","definition":"External memory that persists across tasks and sessions, enabling agents to learn from experience without gradient updates — includes episodic memory (event logs), semantic memory (reflections), and procedural memory (learned skills as code).","tags":["agents","memory","learning"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"02"}]},{"id":"reflexion","name":"Reflexion","definition":"A learning method where agents reflect on failed task attempts, generate textual insights about what went wrong, and persist these reflections as long-term memory to improve future performance — a new form of learning through language rather than gradient descent.","tags":["agents","learning","memory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"02"}]},{"id":"webshop","name":"WebShop","definition":"The first large-scale practical web agent benchmark, built from 1M+ scraped Amazon products, where agents navigate a simulated e-commerce site to find products matching natural language instructions — pioneering realistic digital automation evaluation.","tags":["benchmark","agents","application"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"02"}]},{"id":"digital-automation","name":"Digital Automation","definition":"The application domain of using LLM agents to automate digital tasks that previously required human interaction — including web browsing, code writing, customer service, and enterprise workflows — uniquely enabled by reasoning agents' language understanding.","tags":["application","agents"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"02"}]},{"id":"koala-framework","name":"KOALA Framework","definition":"A theoretical framework showing that any agent can be expressed through three components: memory (where information is stored), action space (what the agent can do), and decision-making procedure (how to choose actions given the action space).","tags":["theory","agents","architecture"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"02"}]},{"id":"robustness-vs-capability","name":"Robustness vs Capability","definition":"The distinction between capability (can an agent solve a task at least once in k attempts, pass@k) and robustness (can an agent solve a task every time in k attempts, fail@k) — real-world deployment requires robustness, but current benchmarks mostly measure capability.","tags":["evaluation","agents","safety"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"02"}]},{"id":"autogen","name":"AutoGen","definition":"An open-source programming framework for agentic AI based on multi-agent conversation programming, where conversable agents with different backends (LLMs, tools, humans) collaborate through flexible conversation patterns to solve complex tasks.","tags":["framework","multi-agent","application"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"03"}]},{"id":"conversable-agent","name":"Conversable Agent","definition":"AutoGen's unified abstraction that can represent LLMs, tools, or humans behind a common conversational interface, enabling modular agent systems where any entity can participate in multi-agent conversations interchangeably.","tags":["framework","architecture","multi-agent"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"03"}]},{"id":"nested-chat","name":"Nested Chat","definition":"A conversation pattern in AutoGen where an agent can pause its current conversation and initiate inner conversations with other agents, then return results to the outer conversation, enabling recursive agent complexity and modular task decomposition.","tags":["framework","architecture","multi-agent"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"03"}]},{"id":"multimodal-rag","name":"Multimodal RAG","definition":"An extension of retrieval-augmented generation that handles visual data (charts, diagrams, images in documents) by extracting text summaries linked to image chunks, enabling text embedding models to index visual content that is then fed to multimodal LLMs during synthesis.","tags":["RAG","multimodal","application"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"03"}]},{"id":"agentic-rag","name":"Agentic RAG","definition":"A retrieval-augmented generation approach that adds an agent reasoning layer on top of standard RAG, enabling query decomposition, multi-step planning, tool selection, and reflection to handle complex questions that basic RAG pipelines cannot answer.","tags":["RAG","agents","application"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"03"}]},{"id":"autobuild","name":"AutoBuild","definition":"An AutoGen capability that automatically suggests and creates teams of agents with appropriate roles for a given task, with Adaptive Build extending this to dynamically select and create agents per subtask from a growing library.","tags":["framework","optimization","multi-agent"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"03"}]},{"id":"hierarchical-indexing","name":"Hierarchical Indexing","definition":"A RAG indexing strategy where multiple derived representations (summaries, sub-chunks, extracted metadata) point to source document elements, enabling more effective retrieval by matching queries against diverse representations while returning original content.","tags":["RAG","architecture","data"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"03"}]},{"id":"lora-fine-tuning","name":"LoRA Fine-Tuning","definition":"A parameter-efficient fine-tuning method that freezes base model weights and learns small low-rank adapter matrices, achieving near full-fine-tuning performance with much less compute, data, and storage — the dominant enterprise fine-tuning approach.","tags":["training","optimization","enterprise"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"04"}]},{"id":"model-distillation","name":"Model Distillation","definition":"A technique where a large teacher model generates labels (soft or hard) on training data, and a smaller student model learns to reproduce those outputs, enabling cost-effective deployment of smaller, faster models without extensive human labeling.","tags":["training","optimization","enterprise"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"04"}]},{"id":"grounding-with-search","name":"Grounding with Search","definition":"Combining LLM outputs with search engine results to address hallucination, provide up-to-date information, and enable source citations — nearly universal in enterprise applications where factuality and authority are required.","tags":["RAG","enterprise","safety"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"04"}]},{"id":"function-calling","name":"Function Calling","definition":"The ability of LLMs to recognize when they cannot fulfill a request and select the appropriate external function/API from a library to execute real-world actions like booking flights, querying databases, or accessing live data.","tags":["agents","enterprise","application"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"04"}]},{"id":"dynamic-retrieval","name":"Dynamic Retrieval","definition":"An optimization technique where the system intelligently determines when to invoke external search based on the LLM's response, rather than always searching — balancing cost and quality since search API costs remain relatively fixed.","tags":["RAG","optimization","enterprise"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"04"}]},{"id":"needle-in-a-haystack-test","name":"Needle in a Haystack Test","definition":"An evaluation methodology that inserts a specific piece of information (the needle) into a large context of irrelevant text (the haystack) to test whether LLMs or retrieval systems can accurately locate and return the target information.","tags":["evaluation","benchmark"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"04"}]},{"id":"dspy","name":"DSPy","definition":"A programming framework for building compound AI systems where developers declare module behavior through natural language signatures and automated optimizers learn the prompts, demonstrations, and weights needed to maximize a given metric.","tags":["framework","optimization","programming"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"05"}]},{"id":"compound-ai-systems","name":"Compound AI Systems","definition":"Modular programs where LLMs serve specialized roles inside a larger architecture rather than acting as monolithic end-to-end systems, enabling better quality, control, transparency, and inference-time scaling.","tags":["architecture","theory","framework"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"05"}]},{"id":"signatures","name":"Signatures","definition":"One-liner natural language declarations in DSPy that specify what a module should do (its inputs and outputs) without specifying how — separating the developer's intent from model-specific prompt engineering.","tags":["framework","programming","abstraction"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"05"}]},{"id":"prompt-optimization","name":"Prompt Optimization","definition":"Automated techniques for finding effective prompts (instructions and demonstrations) for LLM modules by exploring the space of possible prompt configurations and evaluating them against a metric, replacing manual prompt engineering.","tags":["optimization","prompting","theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"05"}]},{"id":"mepro-optimizer","name":"MePro Optimizer","definition":"A DSPy optimizer that jointly optimizes instructions and few-shot demonstrations across multi-module programs using Bayesian surrogate models for credit assignment, grounded instruction proposals from program-aware language models, and bootstrapped demonstrations.","tags":["optimization","algorithm"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"05"}]},{"id":"bootstrap-few-shot","name":"Bootstrap Few-Shot","definition":"A technique that runs a basic version of a program on training inputs, traces module inputs and outputs from successful trajectories, and uses those as few-shot demonstrations in module prompts — a form of automated example generation.","tags":["optimization","prompting"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"05"}]},{"id":"agent-computer-interface","name":"Agent-Computer Interface","definition":"The design of commands, feedback mechanisms, and information presentation that agents use to interact with computing environments — research shows this can matter as much as model capability, with agent-optimized interfaces differing from human-optimized ones.","tags":["architecture","software-engineering","agents"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"06"}]},{"id":"openhands","name":"OpenHands","definition":"An open-source coding agent platform that integrates web browsing, code execution, and file editing in a sandboxed Docker environment, supporting multiple LLM backends and community-driven development of software engineering agents.","tags":["framework","software-engineering","open-source"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"06"}]},{"id":"codeact","name":"CodeAct","definition":"An action representation paradigm where agent actions are expressed as executable Python code rather than JSON tool calls, enabling composability through loops, conditionals, variable reuse, and access to the full Python ecosystem.","tags":["architecture","agents","software-engineering"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"06"}]},{"id":"swe-agent","name":"SWE-agent","definition":"A coding agent that demonstrated the importance of Agent-Computer Interface design by creating custom commands for file search, editing with linting feedback, and context navigation — showing that interface design can matter more than model improvements.","tags":["agents","software-engineering","architecture"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"06"}]},{"id":"tapeagents","name":"TapeAgents","definition":"An agent framework that records all agent interactions (thoughts, actions, observations) in structured execution tapes, enabling systematic debugging, optimization, and distillation of agents from expensive frontier models to cost-effective deployment models.","tags":["framework","enterprise","optimization"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"07"}]},{"id":"workarena","name":"WorkArena","definition":"An enterprise agent benchmark built on the actual ServiceNow platform, featuring 33 task types across three complexity levels (L1-L3), from simple navigation to complex multi-step knowledge work requiring database interactions and business logic.","tags":["benchmark","enterprise","evaluation"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"07"}]},{"id":"browsergym","name":"BrowserGym","definition":"A standardized Gymnasium-compatible environment for web agent evaluation that provides a unified interface across different web benchmarks, enabling fair comparison of web agents and reproducible research.","tags":["benchmark","framework","web-agents"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"07"}]},{"id":"greadth","name":"GREADTH","definition":"A set of quality attributes for evaluating conversational enter
