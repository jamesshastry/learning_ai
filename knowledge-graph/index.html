prise agents: Groundedness, Recall, Efficiency, Appropriateness, Depth, Timeliness, and Honesty — providing comprehensive coverage of production agent quality requirements.","tags":["evaluation","enterprise","quality"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"07"}]},{"id":"enterprise-agent-workflows","name":"Enterprise Agent Workflows","definition":"AI agents deployed in enterprise environments to automate complex business processes on real platforms like ServiceNow, requiring multi-step reasoning, database interactions, form filling, and integration with existing enterprise software systems.","tags":["enterprise","application","agents"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"07"}]},{"id":"searchformer","name":"Searchformer","definition":"A model trained to output A* search traces before final solutions for planning tasks, achieving 10x better sample efficiency and working with 10x smaller models compared to solution-only approaches, demonstrating that learning search processes improves reasoning.","tags":["reasoning","planning","architecture"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"08"}]},{"id":"dualformer","name":"Dualformer","definition":"A transformer architecture that learns to dynamically switch between fast thinking (direct solution prediction) and slow thinking (full search trace generation) within a single model, trained by randomly dropping search trace tokens during training.","tags":["architecture","reasoning","planning"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"08"}]},{"id":"surco","name":"SurCo","definition":"A technique that uses neural networks as differentiable continuous surrogates for discrete combinatorial optimization problems, enabling gradient-based optimization of problems that traditionally require specialized symbolic solvers.","tags":["optimization","neural-symbolic","theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"08"}]},{"id":"neural-symbolic-reasoning","name":"Neural-Symbolic Reasoning","definition":"The research direction of unifying neural network approaches with symbolic/algorithmic methods, showing that trained neural networks can converge to solutions equivalent to known symbolic algorithms, suggesting deep connections between the two paradigms.","tags":["theory","reasoning","planning"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"08"}]},{"id":"search-augmented-training","name":"Search-Augmented Training","definition":"A training methodology where models learn to generate the search/reasoning trace of an algorithm before outputting the final solution, resulting in dramatically better scaling laws and sample efficiency for planning and reasoning tasks.","tags":["training","reasoning","optimization"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"08"}]},{"id":"voyager","name":"Voyager","definition":"The first LLM-powered open-ended embodied agent in Minecraft that continuously explores, acquires diverse skills by writing executable code, stores them in a retrievable skill library, and composes learned skills for increasingly complex tasks.","tags":["agents","robotics","exploration","code-generation"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"09"}]},{"id":"eureka","name":"Eureka","definition":"A system that uses LLMs to generate reward functions for reinforcement learning, combined with evolutionary search to iteratively improve them, achieving superhuman dexterity (pen-spinning) that surpasses expert human-designed rewards.","tags":["reinforcement-learning","robotics","optimization"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"09"}]},{"id":"dreureka","name":"DrEureka","definition":"An extension of Eureka that uses LLMs to automatically generate domain randomization configurations for sim-to-real transfer, eliminating the need for human engineering of simulation-to-reality parameter bridges.","tags":["reinforcement-learning","robotics","sim-to-real"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"09"}]},{"id":"foundation-agent","name":"Foundation Agent","definition":"A vision for AI agents that are generalist (many tasks), multi-embodiment (many robot bodies), and emergent (improve with scale) — a single foundation model that can be deployed across diverse robotic platforms and tasks.","tags":["robotics","architecture","theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"09"}]},{"id":"project-gr00t","name":"Project GR00T","definition":"NVIDIA's blueprint for building generalist robot foundation models, based on three principles (foundation agent, parallel simulation, skill transfer) and three computers (DGX for training, OVX for simulation, Jetson for deployment).","tags":["robotics","architecture","platform"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"09"}]},{"id":"generative-agents","name":"Generative Agents","definition":"LLM-powered agents placed in virtual environments that exhibit emergent social behaviors through memory systems (episodic logs, semantic reflections) and planning, demonstrating information diffusion, social interactions, and community dynamics.","tags":["agents","simulation","social"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"10"}]},{"id":"interview-based-agent-creation","name":"Interview-Based Agent Creation","definition":"A technique for creating AI agents that faithfully represent real individuals by using 2-hour structured interviews as seed memory, achieving 85%+ behavioral fidelity across economic games, personality assessments, and social science experiments.","tags":["agents","simulation","methodology"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"10"}]},{"id":"three-levels-of-ai-access","name":"Three Levels of AI Access","definition":"A framework categorizing AI access into API access (behavioral measurement only), open weights (fine-tuning and distillation possible), and open source (full reproducibility and innovation) — each enabling progressively deeper research capabilities.","tags":["theory","open-source","infrastructure"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"10"}]},{"id":"responsible-scaling-policy","name":"Responsible Scaling Policy","definition":"Anthropic's framework for tying AI deployment decisions to empirically measured capability thresholds, using mandatory if-then commitments that specify required safety measures before models at each capability level can be deployed.","tags":["safety","governance","policy"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"11"}]},{"id":"asl-levels","name":"ASL Levels","definition":"A tiered classification system (ASL-1 through ASL-4+) defining escalating AI capability levels with corresponding safety requirements — from no meaningful risk (ASL-1) to expert-level capabilities across domains requiring nation-state-level containment (ASL-4).","tags":["safety","evaluation","governance"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"11"}]},{"id":"computer-use-agent","name":"Computer Use Agent","definition":"An AI agent that interacts with desktop computing environments by observing screenshots and generating mouse/keyboard actions, enabling general-purpose computer operation without application-specific APIs — demonstrated by Anthropic's Claude.","tags":["agents","application","architecture"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"11"}]},{"id":"capability-evaluation","name":"Capability Evaluation","definition":"Systematic evaluation of AI models for dangerous capabilities across four categories: CBRN (weapons), cyber attacks, autonomous replication, and model autonomy — using specialized elicitation techniques to test for latent capabilities.","tags":["safety","evaluation","methodology"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"11"}]},{"id":"long-term-benefit-trust","name":"Long-Term Benefit Trust","definition":"Anthropic's novel governance structure that progressively cedes corporate control to elected board members with no financial interest in Anthropic, ensuring safety and public benefit interests govern decisions as AI becomes more powerful.","tags":["governance","safety","organization"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"11"}]},{"id":"agent-safety","name":"Agent Safety","definition":"The study of safety challenges specific to LLM agents, which face an expanded attack surface compared to standalone models due to tool access, credential handling, real-world action capabilities, and complex multi-component architectures.","tags":["safety","agents","theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"12"}]},{"id":"jailbreak-attacks","name":"Jailbreak Attacks","definition":"Techniques for bypassing LLM safety constraints through creative prompting strategies such as reframing context, requesting translations, claiming information is no longer secret, or using indirect queries. Different models show vastly different vulnerability levels.","tags":["safety","adversarial","attacks","security","llm","limitation"],"nodeType":"concept","sourceCount":2,"sources":[{"course":"llm-agents-f24","lecture":"12"},{"course":"mit-6s191","lecture":"07"}]},{"id":"decodingtrust","name":"DecodingTrust","definition":"A comprehensive benchmark for evaluating LLM trustworthiness across multiple dimensions including toxicity, stereotypes, adversarial robustness, out-of-distribution performance, privacy, machine ethics, and fairness.","tags":["benchmark","safety","evaluation"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"12"}]},{"id":"evidence-based-ai-policy","name":"Evidence-Based AI Policy","definition":"An approach to AI governance that relies on empirical measurement and multi-stakeholder consensus building rather than precautionary bans or unrestricted deployment, with the goal of creating adaptive policy blueprints tied to measurable AI conditions.","tags":["policy","governance","safety"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-f24","lecture":"12"}]},{"id":"self-consistency-decoding","name":"Self-Consistency Decoding","definition":"Sampling multiple reasoning paths and selecting the answer with the highest frequency via majority voting, marginalizing over different reasoning traces","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"01"}]},{"id":"analogical-prompting","name":"Analogical Prompting","definition":"Instructing the LLM to self-generate relevant exemplars and background knowledge before solving a test problem, inspired by human analogical reasoning","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"01"}]},{"id":"opro-optimization-by-prompting","name":"OPRO (Optimization by PROmpting)","definition":"Using an LLM as an optimizer to iteratively improve prompts by maintaining a trajectory of prompt-score pairs and generating better candidates","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"01"}]},{"id":"tree-of-thought-search","name":"Tree-of-Thought Search","definition":"Search method that explores multiple reasoning branches at each step using BFS or DFS, with LLM-based step-level evaluation to prune unpromising paths","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"01"}]},{"id":"self-debugging","name":"Self-Debugging","definition":"Iterative code improvement loop where the LLM generates code, receives execution feedback (unit tests, traces, explanations), and refines its solution","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"01"}]},{"id":"process-reward-model","name":"Process Reward Model","definition":"A trained verifier that evaluates the correctness of each intermediate reasoning step rather than only the final solution","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"01"}]},{"id":"inference-time-compute-scaling","name":"Inference-Time Compute Scaling","definition":"The principle of allocating more computational resources at inference time to improve model performance, through longer chains of thought, more samples, or deeper search","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"01"}]},{"id":"self-discover","name":"Self-Discover","definition":"Method where the LLM selects and composes task-specific reasoning structures from a menu of reasoning strategies without manually written demonstrations","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"01"}]},{"id":"self-rewarding-language-models","name":"Self-Rewarding Language Models","definition":"Training paradigm where the LLM serves as its own reward model, generating tasks, responses, and preference judgments in an iterative self-improvement loop","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"02"}]},{"id":"llm-as-a-judge","name":"LLM-as-a-Judge","definition":"Using a language model to evaluate and score responses to instructions, replacing human annotators for preference data collection","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"02"}]},{"id":"iterative-reasoning-preference-optimization","name":"Iterative Reasoning Preference Optimization","definition":"Training chain-of-thought reasoning by generating CoT + answer, checking answer correctness with verifiable rewards, creating DPO pairs, and iterating","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"02"}]},{"id":"meta-rewarding","name":"Meta-Rewarding","definition":"Having the LLM judge its own judgments (meta-judge) to create preference pairs over evaluations, improving the model's ability to assess quality","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"02"}]},{"id":"chain-of-verification","name":"Chain-of-Verification","definition":"System 2 reasoning technique where the model drafts a response, generates verification questions about its claims, answers them independently, then cross-checks for inconsistencies","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"02"}]},{"id":"system-2-attention","name":"System 2 Attention","definition":"Prompting technique that rewrites biased or sycophancy-inducing instructions to remove irrelevant context before answering","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"02"}]},{"id":"thought-preference-optimization","name":"Thought Preference Optimization","definition":"Extension of self-rewarding to non-verifiable tasks by training models to generate chain-of-thought before responses, using LLM-as-a-Judge rewards","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"02"}]},{"id":"coconut","name":"COCONUT","definition":"Method replacing text-based chain-of-thought with continuous vector representations in the hidden states, enabling non-verbal reasoning","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"02"}]},{"id":"branch-solve-merge","name":"Branch-Solve-Merge","definition":"Evaluation framework that decomposes assessment into independent criteria branches, evaluates each separately, then merges judgments","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"02"}]},{"id":"hipporag","name":"HippoRAG","definition":"Neurobiologically-inspired retrieval system that builds a knowledge graph index mimicking hippocampal indexing, using personalized PageRank for multi-hop pattern completion","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"03"}]},{"id":"grokking","name":"Grokking","definition":"Phenomenon where transformers trained far beyond overfitting suddenly achieve generalization through a phase transition from rote memorization to learning generalizing circuits","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"03"}]},{"id":"implicit-reasoning","name":"Implicit Reasoning","definition":"Reasoning performed within a single forward pass through transformer parameters without explicit chain-of-thought token generation","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"03"}]},{"id":"generalizing-circuits","name":"Generalizing Circuits","definition":"Internal transformer circuits discovered through mechanistic interpretation that implement reasoning rules (staged for composition, parallel for comparison)","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"03"}]},{"id":"model-based-planning","name":"Model-Based Planning","definition":"Planning paradigm where an agent uses an internal world model to simulate action outcomes before committing, enabling lookahead without irreversible real-world actions","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"03"}]},{"id":"webdreamer","name":"WebDreamer","definition":"System that uses LLMs as approximate world models for web navigation, simulating next-page states to evaluate candidate actions before execution","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"03"}]},{"id":"agent-first-view","name":"Agent-First View","definition":"Perspective that language agents are the latest evolution of AI agents (studied since AI's inception), now upgraded with language-based reasoning and communication","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"03"}]},{"id":"personalized-pagerank","name":"Personalized PageRank","definition":"Graph algorithm that disperses probability mass from seed nodes via random walks, assigning higher weights to nodes at the intersection of multiple query concepts","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"03"}]},{"id":"non-parametric-memory","name":"Non-Parametric Memory","definition":"External memory stored outside model parameters (e.g., retrieved documents) that LLMs can access at inference time, avoiding catastrophic forgetting","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"03"}]},{"id":"rlvr-rl-with-verifiable-rewards","name":"RLVR (RL with Verifiable Rewards)","definition":"A training technique where models are placed in constrained environments with deterministic reward signals — the model attempts a task hundreds or thousands of times, and a verifier (compiler, unit tests, mathematical proof checker) provides a binary or scalar reward. Uses only ~5% of pre-training compute but delivers massive capability gains. Key innovation behind reasoning models like o1 and R1.","tags":["theory","training","architecture","optimization"],"nodeType":"concept","sourceCount":2,"sources":[{"course":"llm-agents-sp25","lecture":"04"},{"course":"mse435","lecture":"06"}]},{"id":"persona-driven-synthetic-data","name":"Persona-Driven Synthetic Data","definition":"Generating diverse training problems by specifying different personas (chemist, musician, child) to control the domain and difficulty of synthetic examples","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"04"}]},{"id":"budget-forcing","name":"Budget Forcing","definition":"Test-time scaling technique that injects \"wait\" tokens when a model tries to stop before reaching a token budget, forcing it to think longer","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"04"}]},{"id":"tulu-3-post-training-recipe","name":"Tulu 3 Post-Training Recipe","definition":"Three-stage fully open post-training pipeline (SFT → Preference Tuning → RLVR) with detailed data curation, applicable to any open-weight base model","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"04"}]},{"id":"self-rag","name":"Self-RAG","definition":"RAG model where the language model generates special critic tokens to evaluate whether retrieval is needed and whether generated content is supported by evidence","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"04"}]},{"id":"data-mixing-for-post-training","name":"Data Mixing for Post-Training","definition":"The process of balancing training data across capabilities (chat, math, coding, safety) to maintain performance across all dimensions simultaneously","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"04"}]},{"id":"on-policy-preference-data","name":"On-Policy Preference Data","definition":"Preference data generated using the current model's own outputs as candidates, rather than outputs from other models","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"04"}]},{"id":"swe-bench","name":"SWE-bench","definition":"Benchmark for evaluating coding agents on real-world GitHub issues requiring bug localization, code understanding, multi-file editing, and test verification","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"05"}]},{"id":"big-sleep","name":"Big Sleep","definition":"Google Project Zero's LLM agent system that combines code browsing, hypothesis generation, and targeted fuzzing to find real zero-day vulnerabilities","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"05"}]},{"id":"interactive-tool-assisted-security","name":"Interactive Tool-Assisted Security","definition":"Paradigm where LLM agents use external security tools (fuzzers, sanitizers, debuggers) interactively rather than attempting pure reasoning about vulnerabilities","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"05"}]},{"id":"fuzzing-with-llm-guidance","name":"Fuzzing with LLM Guidance","definition":"Using LLM agents to generate targeted test inputs for security fuzzing, guided by code understanding and hypothesis generation about potential vulnerabilities","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"05"}]},{"id":"mind2web","name":"Mind2Web","definition":"First large-scale benchmark for generalist web agents using real-world websites with diverse tasks and HTML-based observations","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"06"}]},{"id":"webarena","name":"WebArena","definition":"Self-hosted web environment with functional websites for reproducible evaluation of autonomous web agents","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"06"}]},{"id":"visualwebarena","name":"VisualWebArena","definition":"Extension of WebArena that adds tasks requiring visual understanding of web page content beyond text/HTML","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"06"}]},{"id":"set-of-marks-representation","name":"Set-of-Marks Representation","definition":"Visual representation that overlays numbered bounding boxes on clickable web elements, providing both spatial and semantic grounding for agent actions","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"06"}]},{"id":"tree-search-for-web-agents","name":"Tree Search for Web Agents","definition":"Search algorithm that maintains a frontier of candidate states with value estimates, enabling backtracking and systematic exploration in web navigation","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"06"}]},{"id":"adversarial-web-agent-attacks","name":"Adversarial Web Agent Attacks","definition":"Attacks that manipulate web content (e.g., image captions) to inject malicious instructions that hijack autonomous web agents","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"06"}]},{"id":"osworld","name":"OSWorld","definition":"Comprehensive OS-level benchmark with 369 real-world computer tasks spanning web, desktop, and multi-app workflows, evaluated through execution-based scripts","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"07"}]},{"id":"aguvis","name":"AGUVIS","definition":"Unified vision-language-action model for GUI agents that uses only visual observations, trained in two stages (grounding then reasoning with inner monologue)","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"07"}]},{"id":"pure-vision-paradigm","name":"Pure Vision Paradigm","definition":"Approach to GUI agents that relies entirely on visual screenshots without HTML, accessibility trees, or DOM information","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"07"}]},{"id":"inner-monologue-for-agents","name":"Inner Monologue for Agents","definition":"Forced generation of planning text before action prediction, helping agents reason through complex multi-step tasks","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"07"}]},{"id":"visual-grounding","name":"Visual Grounding","definition":"The ability to identify and localize specific UI elements in screenshots for accurate coordinate-based action prediction","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"07"}]},{"id":"alphaproof","name":"AlphaProof","definition":"Google DeepMind system combining autoformalization and RL self-play in Lean to prove IMO-level mathematical theorems, achieving silver medal at IMO 2024","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"08"}]},{"id":"formal-mathematics","name":"Formal Mathematics","definition":"Mathematical proofs written in machine-verifiable languages (Lean, Coq, Isabelle) where every logical step is type-checked for correctness","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"08"}]},{"id":"autoformalization","name":"Autoformalization","definition":"Translating informal mathematical statements (natural language, LaTeX) into formal proof language representations that proof assistants can verify","tags":["theory"],"nodeType":"concept","sourceCount":2,"sources":[{"course":"llm-agents-sp25","lecture":"08"},{"course":"llm-agents-sp25","lecture":"09"}]},{"id":"lean-proof-assistant","name":"Lean Proof Assistant","definition":"Interactive theorem prover and programming language with a growing mathematical library (Mathlib) and gamified proof-writing experience","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"08"}]},{"id":"self-play-for-mathematics","name":"Self-Play for Mathematics","definition":"RL training loop where the system generates proof attempts, verifies them against the formal checker, and trains on successful proofs to improve","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"08"}]},{"id":"mathlib","name":"Mathlib","definition":"Lean's community-maintained library of 200K+ formally verified mathematical theorems covering diverse mathematical domains","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"08"}]},{"id":"leandojo","name":"LeanDojo","definition":"Open-source toolkit for extracting proof state-tactic pairs from Lean proofs, enabling training neural theorem provers with next-step prediction","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"09"}]},{"id":"neural-theorem-proving","name":"Neural Theorem Proving","definition":"Using language models to generate proof tactics in formal proof assistants, guided by tree search algorithms over the proof state space","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"09"}]},{"id":"expert-iteration-for-provers","name":"Expert Iteration for Provers","definition":"Iterative improvement loop where a prover attempts new theorems, successful proofs are added to training data, and the prover is retrained","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"09"}]},{"id":"smt-solver-verification","name":"SMT Solver Verification","definition":"Using satisfiability modulo theories solvers to verify equivalence between formal statements or fill logical gaps in proofs","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"09"}]},{"id":"diagrammatic-obviousness","name":"Diagrammatic Obviousness","definition":"Formal characterization (via Avigad's axioms) of what steps are \"obvious\" from a geometric diagram, enabling automated gap-filling in geometry proofs","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"09"}]},{"id":"lean-star","name":"Lean-STaR","definition":"Method that trains models to generate informal natural language thoughts before each formal Lean tactic, improving theorem proving through informal intermediate reasoning","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"10"}]},{"id":"draft-sketch-prove","name":"Draft-Sketch-Prove","definition":"Pipeline that generates an informal proof draft, extracts a formal sketch with holes, then fills the holes using tactic generation","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"10"}]},{"id":"improver","name":"ImProver","definition":"Agent-based system that rewrites existing formal proofs to optimize for objectives like brevity, modularity, or alternative proof techniques","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"10"}]},{"id":"minictx","name":"miniCTX","definition":"Benchmark of 228 theorems from real Lean projects (beyond Mathlib) requiring long-context understanding of project-specific definitions","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"10"}]},{"id":"informal-to-formal-bridge","name":"Informal-to-Formal Bridge","definition":"General approach of using informal mathematical reasoning (natural language, sketches) as intermediate representations to improve formal proof generation","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"10"}]},{"id":"llm-directed-evolution","name":"LLM-Directed Evolution","definition":"Using LLMs to propose mutations to candidate solutions (programs, formulas, proofs) in an evolutionary search loop, with fitness evaluation guiding selection","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"11"}]},{"id":"concept-libraries","name":"Concept Libraries","definition":"Collections of reusable abstractions (subroutines, lemmas, building blocks) discovered by LLMs from successful solutions and compressed into a shared library","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"11"}]},{"id":"symbolic-regression-with-llms","name":"Symbolic Regression with LLMs","definition":"Using LLM agents to discover mathematical formulas from data by proposing candidate expressions, evaluating fitness, and iteratively improving","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"11"}]},{"id":"in-context-learning-for-theorem-proving","name":"In-Context Learning for Theorem Proving","definition":"Using pre-trained LLMs with relevant theorem-proving examples in context (no fine-tuning) to generate formal proof tactics","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"11"}]},{"id":"abstraction-discovery","name":"Abstraction Discovery","definition":"The ability of LLMs to identify and extract reusable abstract concepts from specific examples, creating building blocks for more complex reasoning","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"11"}]},{"id":"funsearch","name":"FunSearch","definition":"DeepMind's system using LLM-directed evolution to discover new solutions to open mathematical problems by evolving program candidates","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"11"}]},{"id":"ai-safety-vs-ai-security","name":"AI Safety vs AI Security","definition":"AI safety prevents harm a system inflicts on its environment; AI security protects the system from exploitation by external malicious actors — both are interrelated and essential for trustworthy agentic AI.","tags":["safety","theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"12"}]},{"id":"agentpoison","name":"AgentPoison","definition":"Attack that poisons an agent's RAG knowledge base with optimized adversarial strings that trigger targeted malicious behavior on specific queries, demonstrating that agent memory systems are a critical attack vector beyond direct prompt injection.","tags":["safety","data"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"12"}]},{"id":"progent","name":"Progent","definition":"Programming-language-inspired privilege separation framework for agent systems that restricts each component's access to tools and data based on least-privilege principles, adapting proven OS security concepts to LLM-based agents.","tags":["safety","architecture"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"12"}]},{"id":"datasentinel","name":"DataSentinel","definition":"Fine-tuned detector using game-theoretic approach for detecting prompt injection attacks in LLM inputs, providing a practical defense layer at the model input level.","tags":["safety","application"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"12"}]},{"id":"supply-chain-attacks-on-ai","name":"Supply Chain Attacks on AI","definition":"Attacks that compromise AI models through malicious code, backdoors, or poisoned weights introduced during model development, training, or distribution — a growing threat as models are shared via open-source platforms without comprehensive security auditing.","tags":["safety","infrastructure"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"12"}]},{"id":"information-flow-tracking-for-agents","name":"Information Flow Tracking for Agents","definition":"Monitoring how data moves through agentic systems to detect unauthorized access, privacy leakage, and injection attacks via taint propagation — enables runtime detection of data-based attacks in complex multi-component agent systems.","tags":["safety","data"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"llm-agents-sp25","lecture":"12"}]},{"id":"perceptron","name":"Perceptron","definition":"The fundamental building block of neural networks that takes m inputs, multiplies each by a weight, sums them with a bias term, and passes through a non-linear activation function: Y = g(X·W + b).","tags":["architecture","fundamentals"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mit-6s191","lecture":"01"}]},{"id":"dropout","name":"Dropout","definition":"A stochastic regularization technique that randomly sets a fraction of neuron activations to zero during each training iteration, forcing the network to learn robust features that don't depend on any single pathway. Activations reset each mini-batch.","tags":["regularization","architecture"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mit-6s191","lecture":"01"}]},{"id":"recurrent-neural-network","name":"Recurrent Neural Network","definition":"A class of neural networks that maintain an internal hidden state h(t) updated at each time step via a recurrence relation, enabling processing of sequential data by linking computations across time. Uses shared weight matrices at every time step.","tags":["architecture","sequence-modeling"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mit-6s191","lecture":"02"}]},{"id":"hidden-state","name":"Hidden State","definition":"An internal variable maintained by an RNN that captures information from past time steps. Updated at each step as h(t) = f(W_hh * h(t-1) + W_xh * x(t)), it serves as the network's memory of previous inputs in the sequence.","tags":["architecture","sequence-modeling"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mit-6s191","lecture":"02"}]},{"id":"backpropagation-through-time","name":"Backpropagation Through Time","definition":"The training algorithm for RNNs that extends standard backpropagation across sequential time steps, computing gradients from the current position back to the beginning of the sequence. Involves repeated multiplication by weight matrices, leading to vanishing or exploding gradient problems.","tags":["training","optimization"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mit-6s191","lecture":"02"}]},{"id":"vanishing-gradient-problem","name":"Vanishing Gradient Problem","definition":"A training difficulty where gradients shrink exponentially as they propagate through many time steps or layers, resulting in negligible learning signal for early parts of the sequence. Biases the model toward capturing only short-term dependencies.","tags":["training","limitation"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mit-6s191","lecture":"02"}]},{"id":"lstm","name":"LSTM","definition":"A specialized RNN architecture introduced by Schmidhuber et al. that uses gating mechanisms to better control the flow of information in state updates, mitigating the vanishing gradient problem and enabling learning of longer-term dependencies.","tags":["architecture","sequence-modeling"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mit-6s191","lecture":"02"}]},{"id":"attention-mechanism","name":"Attention Mechanism","definition":"A mechanism that enables neural networks to learn which parts of an input sequence are most important by computing similarity scores between query and key representations, then extracting relevant features via weighted combination with value representations. Eliminates the need for sequential recurrence and enables parallel processing.","tags":["architecture","sequence-modeling","transformer"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mit-6s191","lecture":"02"}]},{"id":"self-attention","name":"Self-Attention","definition":"A form of attention where the query, key, and value are all derived from the same input sequence, allowing the model to identify relationships between different positions within that sequence. Computed as softmax(Q·K^T / sqrt(d_k)) × V.","tags":["architecture","transformer"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mit-6s191","lecture":"02"}]},{"id":"transformer","name":"Transformer","definition":"A neural network architecture built entirely on attention mechanisms (no recurrence), using stacked self-attention heads with positional encodings. Powers modern language models (GPT, BERT) and extends to vision and biology. Highly parallelizable compared to RNNs.","tags":["architecture","sequence-modeling"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mit-6s191","lecture":"02"}]},{"id":"positional-encoding","name":"Positional Encoding","definition":"A mathematical encoding added to input embeddings to preserve information about the position/order of tokens in a sequence, necessary because attention mechanisms process all positions simultaneously and would otherwise lose sequential order information.","tags":["architecture","transformer"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mit-6s191","lecture":"02"}]},{"id":"convolution","name":"Convolution","definition":"An operation that slides a small learned filter across an input image, performing element-wise multiplication and summation at each position to produce a feature map. Preserves spatial relationships and enables efficient local feature detection with far fewer parameters than fully connected layers.","tags":["architecture","computer-vision"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mit-6s191","lecture":"03"}]},{"id":"feature-map","name":"Feature Map","definition":"The output of a convolutional layer showing the spatial locations where a particular learned feature (filter) was detected in the input. High positive values indicate strong matches; negative values indicate no match.","tags":["computer-vision","representation"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mit-6s191","lecture":"03"}]},{"id":"receptive-field","name":"Receptive Field","definition":"The region of the input image that influences a single neuron's activation in a convolutional layer. Grows larger with network depth due to pooling and stacked convolutions, enabling detection of increasingly large-scale features.","tags":["architecture","computer-vision"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mit-6s191","lecture":"03"}]},{"id":"object-detection","name":"Object Detection","definition":"A computer vision task that identifies and localizes objects in images by predicting bounding boxes (x, y, width, height) and class labels for each detected object. Extends classification with spatial localization and variable numbers of predictions per image.","tags":["task","computer-vision"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mit-6s191","lecture":"03"}]},{"id":"semantic-segmentation","name":"Semantic Segmentation","definition":"A computer vision task that assigns a class label to every pixel in an image, producing a dense classification map. Uses encoder-decoder architecture with downsampling (convolution + pooling) followed by upsampling to reconstruct full-resolution output.","tags":["task","computer-vision"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mit-6s191","lecture":"03"}]},{"id":"r-cnn","name":"R-CNN","definition":"An object detection architecture that uses a CNN to extract features from the full image, proposes candidate regions, then classifies each region. End-to-end differentiable, enabling backpropagation through the entire pipeline including region proposals.","tags":["architecture","computer-vision"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mit-6s191","lecture":"03"}]},{"id":"autoencoder","name":"Autoencoder","definition":"A neural network that learns compressed representations by encoding input data into a low-dimensional latent space Z and decoding back to reconstruct the original input. Trained with reconstruction loss (no labels), enabling unsupervised feature learning.","tags":["architecture","generative-models","unsupervised"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mit-6s191","lecture":"04"}]},{"id":"variational-autoencoder","name":"Variational Autoencoder","definition":"A probabilistic extension of autoencoders that learns mean and variance parameters for each latent variable, enabling sampling from the latent space. Trained with reconstruction loss plus KL divergence regularization against a normal prior. Uses the reparameterization trick for end-to-end differentiability.","tags":["architecture","generative-models"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mit-6s191","lecture":"04"}]},{"id":"latent-space","name":"Latent Space","definition":"A low-dimensional representation space learned by autoencoders/VAEs that captures the core axes of variability in the data. A well-trained latent space is continuous (nearby points decode similarly) and complete (all regions produce meaningful outputs).","tags":["representation","generative-models"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mit-6s191","lecture":"04"}]},{"id":"reparameterization-trick","name":"Reparameterization Trick","definition":"A technique that makes VAE training differentiable by expressing latent variables as Z = mu + sigma * epsilon, where epsilon is drawn from a fixed distribution. This offsets the stochasticity to a non-learned random variable, enabling gradient flow through the sampling operation.","tags":["training","generative-models"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mit-6s191","lecture":"04"}]},{"id":"kl-divergence","name":"KL Divergence","definition":"A measure of how one probability distribution differs from a reference distribution. In VAEs, used to regularize learned latent distributions toward a normal prior, encouraging continuous and complete latent spaces.","tags":["loss","generative-models","probability"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mit-6s191","lecture":"04"}]},{"id":"generative-adversarial-network","name":"Generative Adversarial Network","definition":"A generative modeling framework consisting of two competing neural networks: a generator that maps random noise to synthetic data instances, and a discriminator that classifies inputs as real or fake. Trained via an adversarial minimax objective where the generator tries to fool the discriminator.","tags":["architecture","generative-models"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mit-6s191","lecture":"04"}]},{"id":"cyclegan","name":"CycleGAN","definition":"A GAN variant for unpaired image-to-image translation using two generators and two discriminators connected by a cyclic consistency loss. Enables transformation between domains (e.g., voice conversion, style transfer) without requiring paired training examples.","tags":["architecture","generative-models"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mit-6s191","lecture":"04"}]},{"id":"density-estimation","name":"Density Estimation","definition":"The task of learning the underlying probability distribution from which observed data samples were generated. The foundational goal of all generative models, enabling both understanding of data structure and generation of new samples.","tags":["task","generative-models","probability"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mit-6s191","lecture":"04"}]},{"id":"q-function","name":"Q-Function","definition":"A function mapping state-action pairs to expected total discounted return. Q(s,a) tells the agent how good it is to take action a in state s, considering all future rewards. The optimal policy selects the action maximizing Q at each state.","tags":["reinforcement-learning","value-learning"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mit-6s191","lecture":"05"}]},{"id":"deep-q-network","name":"Deep Q-Network","definition":"A neural network that approximates the Q-function, taking a state as input and outputting Q-values for all possible actions. Trained by minimizing the difference between predicted Q-values and target values computed from observed rewards and future Q estimates.","tags":["architecture","reinforcement-learning"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mit-6s191","lecture":"05"}]},{"id":"policy-gradient","name":"Policy Gradient","definition":"An RL method that directly learns a policy pi(a|s) as a probability distribution over actions, rather than learning value functions. Enables stochastic policies and continuous action spaces. Trained by maximizing expected reward via gradient of log-probability weighted by returns.","tags":["reinforcement-learning","optimization"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mit-6s191","lecture":"05"}]},{"id":"reward-signal","name":"Reward Signal","definition":"A scalar value received by an RL agent after taking an action, indicating the quality of that action. Can be positive, negative, or zero; may be sparse (only at episode end) or dense (every step). The agent's objective is to maximize cumulative discounted reward.","tags":["reinforcement-learning","fundamentals"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mit-6s191","lecture":"05"}]},{"id":"discount-factor","name":"Discount Factor","definition":"A parameter gamma (0 \u003c gamma \u003c 1) that reduces the weight of future rewards in the total return calculation. Reflects preference for immediate rewards over delayed ones, with R(t) = sum of gamma^k * r(t+k) for k = 0,1,2,...","tags":["reinforcement-learning","hyperparameter"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mit-6s191","lecture":"05"}]},{"id":"exploration-vs-exploitation","name":"Exploration vs Exploitation","definition":"The fundamental RL dilemma between exploiting known high-reward actions (exploitation) and trying potentially better but uncertain actions (exploration). Without exploration, the agent may miss globally optimal strategies; without exploitation, it fails to leverage learned knowledge.","tags":["reinforcement-learning","fundamentals"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mit-6s191","lecture":"05"}]},{"id":"universal-approximation-theorem","name":"Universal Approximation Theorem","definition":"A theorem stating that a feed-forward neural network with a single hidden layer containing a finite number of neurons can approximate any continuous function on compact subsets of R^n to arbitrary precision. Provides no guarantees on layer size or generalization capacity.","tags":["theory","fundamentals"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mit-6s191","lecture":"06"}]},{"id":"diffusion-model","name":"Diffusion Model","definition":"A generative model that creates samples by iteratively removing noise, decomposing generation into many small denoising steps. Trained by adding progressive Gaussian noise to data (forward process) then learning to reverse this process. Produces diverse, high-quality samples with stable training.","tags":["architecture","generative-models"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mit-6s191","lecture":"06"}]},{"id":"adversarial-attack","name":"Adversarial Attack","definition":"A technique that creates inputs with imperceptible perturbations designed to fool neural network models. Computed by taking the gradient of the loss function with respect to the input (rather than weights) and adding noise that maximizes the loss. Extends to physical 3D objects.","tags":["security","limitation"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mit-6s191","lecture":"06"}]},{"id":"emergent-abilities","name":"Emergent Abilities","definition":"Capabilities that appear in language models only after crossing certain thresholds of model scale (parameters, data, compute). These abilities show step-change improvements rather than gradual scaling, suggesting qualitative phase transitions in model capability.","tags":["scaling","llm","theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mit-6s191","lecture":"06"}]},{"id":"next-token-prediction","name":"Next-Token Prediction","definition":"The core training objective of modern LLMs: given a sequence of tokens, predict the probability distribution over the next token. Trained using cross-entropy loss comparing predicted probabilities to the true next token. No external labels needed.","tags":["training","llm"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mit-6s191","lecture":"06"}]},{"id":"hallucination","name":"Hallucination","definition":"The phenomenon where language models generate outputs that appear plausible and coherent but are factually incorrect. Recent research suggests that well-calibrated language models will necessarily produce hallucinations as a consequence of their probabilistic nature.","tags":["limitation","llm"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mit-6s191","lecture":"06"}]},{"id":"algorithmic-bias","name":"Algorithmic Bias","definition":"Systematic and unfair discrimination in neural network predictions arising from biases present in training data distributions. Manifests as underperformance on underrepresented groups and reinforcement of existing societal inequities.","tags":["ethics","limitation","fairness"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mit-6s191","lecture":"06"}]},{"id":"llm-evaluation","name":"LLM Evaluation","definition":"The systematic process of testing language model behavior using curated datasets of test prompts, automated metrics for scoring outputs, and structured experiments comparing performance across models and prompt configurations.","tags":["evaluation","llm","deployment"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mit-6s191","lecture":"07"}]},{"id":"agentic-ai","name":"Agentic AI","definition":"An AI system where an LLM is augmented with tools (functions, APIs) that enable it to take real-world actions on behalf of users, such as sending emails, scheduling appointments, or querying external data sources. Amplifies both capabilities and safety risks.","tags":["architecture","deployment","llm"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mit-6s191","lecture":"07"}]},{"id":"safety-drift","name":"Safety Drift","definition":"The gradual erosion of LLM safety constraints over extended multi-turn conversations, where the model begins mimicking user language patterns and progressively deviates from its safety guidelines. Identified as a contributing factor in real-world harm cases.","tags":["safety","llm","limitation"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mit-6s191","lecture":"07"}]},{"id":"deep-learning-emulator","name":"Deep Learning Emulator","definition":"A neural network trained on synthetic data generated by physics simulators (solving differential equations) that produces equivalent predictions at 1000x+ speedup. Exploits the unlimited availability of simulation data while amortizing expensive data generation over millions of fast inference calls.","tags":["architecture","ai-for-science"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mit-6s191","lecture":"08"}]},{"id":"no-free-lunch-theorem","name":"No Free Lunch Theorem","definition":"A fundamental theorem stating that learning is impossible from data alone; predictions require combining data with assumptions (prior knowledge, inductive bias). In science, data is scarce but inductive bias from known equations is extraordinarily rich.","tags":["theory","fundamentals"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mit-6s191","lecture":"08"}]},{"id":"density-functional-theory","name":"Density Functional Theory","definition":"An exact reformulation of quantum mechanics (Schrodinger's equation) that replaces the exponentially expensive wave function with the electron density, a function of only 3 spatial dimensions. Reduces computational cost from exponential to cubic in electron count. Nobel Prize (Kohn, 1998). Accounts for ~1/3 of scientific supercomputer workloads.","tags":["physics","chemistry","ai-for-science"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mit-6s191","lecture":"08"}]},{"id":"exchange-correlation-functional","name":"Exchange Correlation Functional","definition":"A universal but analytically unknown function within density functional theory that captures quantum exchange and correlation effects on electron energy. One functional describes all of chemistry. 60+ years of handcrafted approximations exist (~800 functionals). Microsoft's Scala learns it via ML, achieving chemical accuracy with cubic scaling.","tags":["physics","chemistry","ai-for-science"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mit-6s191","lecture":"08"}]},{"id":"chemical-accuracy","name":"Chemical Accuracy","definition":"A precision threshold of approximately 1 kilocalorie per mole, representing the accuracy needed for computational chemistry predictions to match experimental results. Achieving this enables computational replacement of laboratory experiments. A very high bar due to the small energy differences involved in chemical reactions relative to total system energy.","tags":["chemistry","metric"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mit-6s191","lecture":"08"}]},{"id":"molecular-dynamics","name":"Molecular Dynamics","definition":"A computational method simulating atomic motion over time by integrating Newton's second law step-by-step. Requires quantum force calculations at each femtosecond time step, but biologically interesting events occur on millisecond scales, creating a curse of sequentiality requiring 10^6 to 10^15 sequential steps.","tags":["simulation","ai-for-science","biology"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mit-6s191","lecture":"08"}]},{"id":"foundation-model-for-science","name":"Foundation Model for Science","definition":"A large neural network trained on diverse scientific simulation data across multiple domains, scales, and resolutions, then fine-tuned for specific applications. Analogous to LLM foundation models but for scientific prediction. Example: Earth system model trained on diverse weather data.","tags":["architecture","ai-for-science"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mit-6s191","lecture":"08"}]},{"id":"fsdp","name":"FSDP","definition":"A distributed training strategy that shards model parameters, gradients, and optimizer states across GPUs, gathering them on-demand during forward/backward passes. PyTorch-native implementation wraps nn.Modules; DeepSpeed Zero provides equivalent functionality with config-file approach. Stages: Zero-1 (optimizer), Zero-2 (+gradients), Zero-3/FSDP (+parameters).","tags":["distributed-training","memory","framework"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mit-6s191","lecture":"09"}]},{"id":"5d-parallelism","name":"5D Parallelism","definition":"The practice of composing multiple parallelism strategies simultaneously for large-scale training: data parallel (across groups), tensor parallel (within nodes), pipeline parallel (across nodes), expert parallel (for MoE), and sequence/context parallel (for long sequences). Strategy selection depends on model size, cluster topology, and communication bandwidth hierarchy.","tags":["distributed-training","parallelism","systems"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mit-6s191","lecture":"09"}]},{"id":"ai-value-chain-triangle","name":"AI Value Chain Triangle","definition":"The distribution of revenue across the AI ecosystem layers (semis, infrastructure, models, apps), currently shaped as an inverted triangle with semis capturing ~75% of revenue — opposite to the mature cloud ecosystem where apps/SaaS dominate.","tags":["economics","theory","infrastructure"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mse435","lecture":"01"}]},{"id":"marginal-cost-of-intelligence","name":"Marginal Cost of Intelligence","definition":"Unlike traditional software with near-zero marginal distribution costs, each incremental AI user requires significant GPU compute for inference, making AI businesses fundamentally more expensive to scale and challenging the 80-90% gross margins typical of SaaS.","tags":["economics","infrastructure","business"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mse435","lecture":"01"}]},{"id":"supercycle-comparison","name":"Supercycle Comparison","definition":"Framework comparing AI to prior technology revolutions (internet ~25 years ago, mobile ~20 years ago, cloud ~10 years ago) in terms of value chain evolution, timing, and how long it took for the revenue distribution to shift from infrastructure-heavy to application-heavy.","tags":["theory","economics","history"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mse435","lecture":"01"}]},{"id":"capex-cycle-dynamics","name":"CapEx Cycle Dynamics","definition":"The timing mismatch between massive upfront capital investment in AI infrastructure (chips, data centers) built for 5-6 year periods and the application revenue that is generated in real-time, creating cyclical phases of inflated infrastructure valuations.","tags":["economics","infrastructure","business"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mse435","lecture":"01"}]},{"id":"consumer-ai-monetization","name":"Consumer AI Monetization","definition":"The challenge of monetizing consumer AI applications, where ChatGPT monetizes at ~$10/user/year compared to Google's $100/user/year and Meta's $70/user/year. Subscription models may be insufficient; advertising with superior intent understanding could be the key unlock.","tags":["economics","business","application"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mse435","lecture":"01"}]},{"id":"consumer-ai-scale-categories","name":"Consumer AI Scale Categories","definition":"Three tiers of consumer app scale: mandatory utilities (3B+ users, e.g., WhatsApp, Chrome), social platforms (1.5-2B users, e.g., Instagram, TikTok), and niche apps (500M-1B users, e.g., Spotify, Twitter). ChatGPT currently sits at niche app scale, heading toward social.","tags":["economics","application"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mse435","lecture":"01"}]},{"id":"training-vs-inference-split","name":"Training vs Inference Split","definition":"The allocation of GPU compute between model training (~60%) and inference serving (~40%) as reported by Nvidia, with expectations that inference will grow over time as AI products scale. Training workloads are predictable and sustained; inference is bursty and follows human usage patterns.","tags":["infrastructure","economics","compute"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mse435","lecture":"01"}]},{"id":"vertical-integration-advantage","name":"Vertical Integration Advantage","definition":"Historical pattern where the biggest winners of each technology supercycle were vertically integrated players: Google (internet, ~$3T), Apple (mobile, ~$2.5T), Meta (social, ~$2T). This suggests the biggest AI winner may also be vertically integrated across the stack.","tags":["theory","business","economics"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mse435","lecture":"01"}]},{"id":"asic-competition","name":"ASIC Competition","definition":"The competitive landscape of custom AI chips (Google TPU, Meta MTIA, Amazon Trainium, etc.) that could challenge Nvidia's GPU dominance. A breakout ASIC success would be the biggest repricing event in the semis layer and could accelerate the triangle flip.","tags":["infrastructure","economics","compute"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mse435","lecture":"01"}]},{"id":"nvlink-fusion","name":"NVLink Fusion","definition":"A protocol enabling Groq's SRAM-based chips to communicate directly with Nvidia GPUs via NVLink, allowing disaggregated inference where memory-bandwidth-intensive decode operations run on Groq while compute-intensive operations run on GPUs, producing 2.5x more tokens for the same power footprint.","tags":["infrastructure","compute","architecture"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mse435","lecture":"02"}]},{"id":"deterministic-chip-architecture","name":"Deterministic Chip Architecture","definition":"Groq's chip design philosophy where a compiler predetermines where all calculations happen, unlike GPUs which dynamically schedule work. Uses SRAM (>10x faster bandwidth than HBM) instead of external memory, enabling predictable and efficient inference execution.","tags":["infrastructure","architecture","compute"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mse435","lecture":"02"}]},{"id":"prefill-decode-disaggregation","name":"Prefill-Decode Disaggregation","definition":"The technique of separating AI inference into distinct phases — prefill (processing the input context, compute-intensive) and decode (generating output tokens, memory-bandwidth-intensive) — and running each on optimized hardware, yielding significant efficiency gains.","tags":["architecture","optimization","compute"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mse435","lecture":"02"}]},{"id":"inference-cost-deflation","name":"Inference Cost Deflation","definition":"The ~99% decline in inference cost over 2.5 years driven by three factors: supply chain improvements (TSMC lithography, packaging), engineering innovation (quantization, chip design), and power efficiency. Described as the most deflationary technology ever observed, though model size growth partially offsets gains.","tags":["economics","compute","infrastructure"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mse435","lecture":"02"}]},{"id":"agent-token-multiplier","name":"Agent Token Multiplier","definition":"The phenomenon where agentic AI workloads (doing tasks vs answering questions) consume 10x+ more tokens than chat-based interactions, but deliver 100x+ more value. This drives demand for inference compute exponentially and is the primary reason token consumption curves have gone parabolic.","tags":["economics","application","compute"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mse435","lecture":"02"}]},{"id":"willingness-to-pay-curve","name":"Willingness to Pay Curve","definition":"The economic dynamic where AI providers initially sold tokens at a loss (negative gross margins), betting that inference costs would drop while intelligence and willingness to pay would increase. This crossover has now occurred — labs like Anthropic and OpenAI have gone from negative to positive gross margins as capabilities crossed a threshold of usefulness.","tags":["economics","business"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mse435","lecture":"02"}]},{"id":"revenue-exponential","name":"Revenue Exponential","definition":"Anthropic's revenue trajectory of $3.5B (Jan) → $8B (Feb) → $10.5B (Mar) annualized in 2026, driven entirely by product quality crossing a capability threshold rather than salesforce expansion. Described as an \"Oppenheimer moment\" proving that revenue can scale on the same exponential as intelligence.","tags":["economics","business"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mse435","lecture":"02"}]},{"id":"iq-commoditization","name":"IQ Commoditization","definition":"Brad Gerstner's thesis that raw cognitive intelligence (IQ) becomes commoditized as AI systems surpass human-level reasoning, while emotional intelligence (EQ) — networking, persuasion, leadership, team formation — becomes the differentiating and increasingly valuable human capability.","tags":["theory","economics","society"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mse435","lecture":"02"}]},{"id":"digital-labor","name":"Digital Labor","definition":"The concept that AI agents represent a new form of labor that can be scaled digitally through investment in compute infrastructure, fundamentally changing the Cobb-Douglas production function by allowing delta-L (change in labor) to be achieved through capital investment rather than birth rates.","tags":["economics","theory","application"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mse435","lecture":"02"}]},{"id":"electrons-to-tokens","name":"Electrons to Tokens","definition":"The complete value chain from raw electricity generation through data center infrastructure, GPU compute, and model serving to deliver AI tokens to end users. Represents the fundamental transformation of energy into intelligence.","tags":["infrastructure","economics","compute"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mse435","lecture":"03"}]},{"id":"energy-first-data-center-strategy","name":"Energy-First Data Center Strategy","definition":"Crusoe's approach of building data centers where abundant, low-cost energy already exists (e.g., West Texas with negative renewable power prices) rather than in traditional data center markets. Moves data to energy instead of energy to data.","tags":["infrastructure","economics","energy"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mse435","lecture":"03"}]},{"id":"across-the-meter-power","name":"Across-the-Meter Power","definition":"Crusoe's energy strategy of building on-site power generation (wind, solar, gas, batteries) that can sell surplus to the grid when not needed and draw from the grid when on-site generation is insufficient, creating a mutually beneficial relationship with the local power system.","tags":["infrastructure","energy","economics"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mse435","lecture":"03"}]},{"id":"data-center-cost-stack","name":"Data Center Cost Stack","definition":"The full cost structure of an AI data center: ~$20M/MW for building and power plant (labor $4.7M, gas plant $2-3M, electrical/mechanical equipment, materials, soft costs) plus ~$40M/MW for IT infrastructure (GPUs $30M, networking $4M, CPUs/storage $3M, fit-out $3M) = ~$60M/MW total, or $60B per gigawatt.","tags":["economics","infrastructure"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mse435","lecture":"03"}]},{"id":"gpu-spot-price-dynamics","name":"GPU Spot Price Dynamics","definition":"The counterintuitive trend where H100 GPU spot prices have risen above their original launch price (3 years later) due to explosive agent-driven demand, with Blackwell following the same trajectory. This challenges the assumption that older compute quickly loses value and supports longer depreciation periods beyond the standard 6 years.","tags":["economics","compute","infrastructure"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mse435","lecture":"03"}]},{"id":"modular-data-centers","name":"Modular Data Centers","definition":"Self-contained, factory-manufactured AI data center units (500 kW air-cooled or 2 MW liquid-cooled) that can be deployed in fleets at diverse power sites. Reduces construction costs 30-50% through centralized manufacturing, standardization, and lower labor requirements.","tags":["infrastructure","architecture","economics"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mse435","lecture":"03"}]},{"id":"labor-as-ai-bottleneck","name":"Labor as AI Bottleneck","definition":"The acute shortage of electricians, welders, plumbers, and construction workers needed to build AI data centers at scale. Labor is the largest single cost item at $4.7M/MW, costs are rising due to competition between projects, and there are not enough tradespeople to staff multiple gigawatt-scale builds simultaneously.","tags":["economics","infrastructure"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mse435","lecture":"03"}]},{"id":"coherent-cluster-architecture","name":"Coherent Cluster Architecture","definition":"Data center design where all GPUs across multiple buildings are interconnected on the same high-performance backend network, enabling one training job to run on all chips across the entire campus. This is the architecture used for Project Stargate in Abilene.","tags":["infrastructure","architecture","compute"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mse435","lecture":"03"}]},{"id":"the-context-problem","name":"The Context Problem","definition":"The thesis that AI failures in enterprises are not due to insufficient model intelligence (AGI already exists) but because models lack the institutional knowledge that key employees hold in their heads — organizational processes, domain-specific procedures, tribal knowledge accumulated over decades.","tags":["enterprise","application","theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mse435","lecture":"04"}]},{"id":"dynamo-to-computer-parallel","name":"Dynamo-to-Computer Parallel","definition":"Historical pattern from a 1990 Stanford research paper showing that the electric motor took 40 years (1880-1920) to impact factory productivity because organizations simply swapped steam engines for electric ones without redesigning processes. The same pattern repeated with PCs (used as typewriters) and is now repeating with AI.","tags":["theory","history","economics"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mse435","lecture":"04"}]},{"id":"process-rewiring","name":"Process Rewiring","definition":"The practice of redesigning organizational processes from first principles to leverage AI, rather than simply overlaying AI on existing workflows. Illustrated by Databricks reducing connector development from 9 months (1 connector) to 1 quarter (7 connectors) not through AI alone but through process changes in requirements gathering, testing, and team structure.","tags":["application","enterprise","optimization"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mse435","lecture":"04"}]},{"id":"jagged-frontier","name":"Jagged Frontier","definition":"Ethan Mollick's concept that AI capability is not uniformly distributed across tasks — AI is excellent at some skills (e.g., coding, certain analysis) but terrible at others (e.g., complex support, nuanced judgment), creating an uneven \"jagged\" capability frontier rather than a smooth improvement curve.","tags":["theory","application"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mse435","lecture":"04"}]},{"id":"seven-powers-framework","name":"Seven Powers Framework","definition":"Hamilton Helmer's framework identifying seven durable competitive advantages (economies of scale, brand, switching costs, network effects, cornered resource, counter-positioning, process power). In the AI era, while barriers to entry and switching costs decrease, moats from data, scale, brand, and trust remain powerful differentiators.","tags":["theory","business","economics"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mse435","lecture":"04"}]},{"id":"token-factory-economics","name":"Token Factory Economics","definition":"Ali Ghodsi's prediction that frontier model providers will operate like Amazon.com's book-selling business — high volume, economies of scale, but tiny gross margins and small operating margins. Very few companies will sustain this model, and the business will consolidate to an oligopoly.","tags":["economics","business"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mse435","lecture":"04"}]},{"id":"open-source-convergence","name":"Open Source Convergence","definition":"The rapidly shrinking gap between open-source and proprietary frontier models, now down to approximately one month (from 3-4 months previously). Illustrated by Moonshot's Kimi 2.6 release, which would have been the best model in history if released just 5 months earlier.","tags":["economics","compute","application"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mse435","lecture":"04"}]},{"id":"multicast-problem-fallacy","name":"Multicast Problem Fallacy","definition":"Ali Ghodsi's cautionary analogy from his PhD: the \"multicast problem\" was the hottest networking challenge of 2000 that no one has heard of today because bandwidth costs collapsed. Lesson: the currently-hyped technical problems (chips, AGI race) may turn out to be irrelevant, while unexpected applications (like Airbnb, 9 years after the internet) will create real value.","tags":["theory","history"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mse435","lecture":"04"}]},{"id":"saas-disruption-gradient","name":"SaaS Disruption Gradient","definition":"The spectrum of vulnerability for existing software companies: (1) companies with data moats and core-loop positioning (cybersecurity) are most robust; (2) workflow software that hasn't innovated in 10 years is most vulnerable; (3) any company can survive if it innovates, leverages existing data/customers/scale, and adapts its pricing/cost structure.","tags":["economics","business","application"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mse435","lecture":"04"}]},{"id":"agentic-compute-dag","name":"Agentic Compute DAG","definition":"The directed acyclic graph describing modern agentic AI workloads: an inference call leads to tool calls, database queries, VM spin-ups for testing, observation of results, reasoning about output, and iteration — far more complex than simple chatbot (one node) or reasoning (multi-node inference) architectures.","tags":["architecture","compute","application"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mse435","lecture":"05"}]},{"id":"heterogeneous-compute","name":"Heterogeneous Compute","definition":"The architectural principle that agentic AI workloads cannot be served economically on GPUs alone and require a mix of hardware: GPUs for training and complex inference, Cerebras for fast inference, memory- optimized chips for long-context workloads, and CPUs for orchestrating agentic workflows and tool calls.","tags":["architecture","infrastructure","compute"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mse435","lecture":"05"}]},{"id":"human-as-bottleneck","name":"Human as Bottleneck","definition":"OpenAI's design target where AI infrastructure is fast enough that the human becomes the rate-limiting factor — agents complete tasks so quickly that users are constantly being asked for next steps, creating a flow state of human-AI collaboration rather than waiting for AI to finish.","tags":["application","architecture","theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mse435","lecture":"05"}]},{"id":"compute-supply-chain-resilience","name":"Compute Supply Chain Resilience","definition":"The strategic imperative for the AI compute supply chain to avoid single-threading on any one vendor or component. TSMC's wafer allocation policy structurally ensures multiple chip vendors exist. The deepest choke point is ASML, the sole manufacturer of extreme ultraviolet lithography machines.","tags":["infrastructure","economics"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mse435","lecture":"05"}]},{"id":"recursive-chip-design","name":"Recursive Chip Design","definition":"The emerging practice of using current AI models to design the next generation of chips, systems, and low-level software needed to run the next models — creating a recursive improvement loop. Current ch
