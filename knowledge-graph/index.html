  <script>
    const data = {"nodes":[{"id":"deep-learning","name":"Deep Learning","definition":"A subset of machine learning that automatically learns hierarchical representations from raw unstructured data (images, text, audio) using neural networks with many layers, eliminating the need for manual feature engineering.","tags":["theory","architecture"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"MIT15.773","lecture":"01"}]},{"id":"neural-network","name":"Neural Network","definition":"A computational model consisting of layers of interconnected neurons (linear functions followed by non-linear activations) that repeatedly transform inputs before feeding them to a regression model for prediction.","tags":["architecture"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"MIT15.773","lecture":"01"}]},{"id":"activation-function","name":"Activation Function","definition":"A non-linear transformation applied to the weighted sum of inputs in a neuron, enabling neural networks to learn non-linear decision boundaries. Common examples include sigmoid, ReLU, and tanh.","tags":["architecture","theory","fundamentals"],"nodeType":"concept","sourceCount":2,"sources":[{"course":"MIT15.773","lecture":"01"},{"course":"mit-6s191","lecture":"01"}]},{"id":"relu","name":"ReLU","definition":"An activation function defined as max(0, x) — passes positive values unchanged and squishes negative values to zero. Considered a key factor in deep learning's success due to its gradient-preserving properties and minimal non-linearity.","tags":["architecture","optimization"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"MIT15.773","lecture":"01"}]},{"id":"feedforward-neural-network","name":"Feedforward Neural Network","definition":"A neural network architecture where data flows strictly from input to output through successive layers, with no cycles or backward connections, in contrast to recurrent neural networks.","tags":["architecture"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"MIT15.773","lecture":"01"}]},{"id":"weights-and-biases","name":"Weights and Biases","definition":"The learnable parameters of a neural network. Weights are the coefficients multiplied with inputs in each neuron, and biases are the intercept terms. Together they define the network's learned function.","tags":["training","architecture"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"MIT15.773","lecture":"01"}]},{"id":"polanyis-paradox","name":"Polanyi's Paradox","definition":"The observation that humans know more than they can articulate — we can perform cognitive tasks (like recognizing faces) but cannot fully explain the rules we use, making it impossible to encode such knowledge into rule-based AI systems.","tags":["theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"MIT15.773","lecture":"01"}]},{"id":"representation-engineering","name":"Representation Engineering","definition":"A technique for controlling model behavior by directly reading and manipulating internal neural representations associated with concepts like honesty, harmlessness, and safety, offering a mechanistic alternative to RLHF-based alignment.","tags":["data","safety","architecture","theory"],"nodeType":"concept","sourceCount":2,"sources":[{"course":"MIT15.773","lecture":"01"},{"course":"llm-agents-f24","lecture":"12"}]},{"id":"generative-ai","name":"Generative AI","definition":"A subset of deep learning focused on generating unstructured outputs (text, images, audio, video) rather than just consuming unstructured inputs. Includes LLMs, text-to-image models, and multimodal systems.","tags":["application"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"MIT15.773","lecture":"01"}]},{"id":"dense-layer","name":"Dense Layer","definition":"A neural network layer where every neuron is connected to every neuron in the adjacent layers, creating a complete bipartite graph of connections between layers.","tags":["architecture"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"MIT15.773","lecture":"01"}]},{"id":"loss-function","name":"Loss Function","definition":"A function that quantifies the deviation between a model's predictions and ground truth labels. Cross-entropy loss is used for classification; mean squared error for regression. Training minimizes the empirical average loss across the dataset.","tags":["training","theory","optimization"],"nodeType":"concept","sourceCount":2,"sources":[{"course":"MIT15.773","lecture":"02"},{"course":"mit-6s191","lecture":"01"}]},{"id":"binary-cross-entropy","name":"Binary Cross-Entropy","definition":"A loss function for binary classification that uses -[y·log(p) + (1-y)·log(1-p)], penalizing confident wrong predictions exponentially harder than uncertain ones.","tags":["training","theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"MIT15.773","lecture":"02"}]},{"id":"gradient-descent","name":"Gradient Descent","definition":"An iterative optimization algorithm that updates neural network weights by computing the gradient of the loss with respect to weights and stepping in the negative gradient direction. Converges to a local minimum of the loss landscape.","tags":["optimization","training"],"nodeType":"concept","sourceCount":2,"sources":[{"course":"MIT15.773","lecture":"02"},{"course":"mit-6s191","lecture":"01"}]},{"id":"stochastic-gradient-descent","name":"Stochastic Gradient Descent","definition":"A variant of gradient descent that computes gradients over a small random subset (mini-batch) of the training data rather than the entire dataset, balancing computational efficiency with gradient accuracy. Typical batch sizes range from 32 to hundreds of samples.","tags":["optimization","training"],"nodeType":"concept","sourceCount":2,"sources":[{"course":"MIT15.773","lecture":"02"},{"course":"mit-6s191","lecture":"01"}]},{"id":"backpropagation","name":"Backpropagation","definition":"An efficient algorithm for computing the gradient of the loss function with respect to all network weights by applying the chain rule backward through the network layers, reducing computation to a sequence of matrix multiplications suitable for GPU acceleration.","tags":["training","optimization","fundamentals"],"nodeType":"concept","sourceCount":2,"sources":[{"course":"MIT15.773","lecture":"02"},{"course":"mit-6s191","lecture":"01"}]},{"id":"learning-rate","name":"Learning Rate","definition":"A hyperparameter (eta) that controls the size of weight updates during gradient descent. Too small leads to getting stuck in local minima; too large causes overshooting and divergence. Adaptive methods like Adam adjust the learning rate automatically.","tags":["optimization","training","hyperparameter"],"nodeType":"concept","sourceCount":2,"sources":[{"course":"MIT15.773","lecture":"02"},{"course":"mit-6s191","lecture":"01"}]},{"id":"adam-optimizer","name":"Adam Optimizer","definition":"A popular variant of SGD that maintains adaptive per-parameter learning rates using estimates of first and second moments of the gradients. The default optimizer choice for most deep learning tasks.","tags":["optimization","training"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"MIT15.773","lecture":"02"}]},{"id":"gpu","name":"GPU","definition":"Parallel computing hardware originally designed for video game rendering that accelerates neural network training by performing matrix multiplications efficiently. The availability of GPUs was one of three forces enabling the deep learning revolution.","tags":["hardware","infrastructure"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"MIT15.773","lecture":"02"}]},{"id":"weight-initialization","name":"Weight Initialization","definition":"Careful schemes for setting initial random values of network weights to prevent exploding or vanishing gradients during training. Common schemes include He initialization (for ReLU networks) and Xavier/Glorot initialization.","tags":["training","optimization"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"MIT15.773","lecture":"02"}]},{"id":"epoch","name":"Epoch","definition":"One complete pass through the entire training dataset. In SGD, each epoch contains multiple mini-batch iterations, each updating weights. Models are typically trained for 10-300 epochs depending on convergence.","tags":["training"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"MIT15.773","lecture":"03"}]},{"id":"tensor","name":"Tensor","definition":"A generalization of scalars (rank-0), vectors (rank-1), matrices (rank-2) to arbitrary dimensions. Color images are rank-3 tensors (height × width × channels), videos are rank-4 tensors. Any rank-N tensor is a list of rank-(N-1) tensors.","tags":["data","theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"MIT15.773","lecture":"03"}]},{"id":"softmax","name":"Softmax","definition":"An activation function that converts K arbitrary real numbers into K probabilities summing to 1, via P(i) = exp(a_i) / Σ exp(a_j). Used as the output layer for multi-class classification. GPT-4 uses a 52,000-way softmax.","tags":["architecture","theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"MIT15.773","lecture":"03"}]},{"id":"early-stopping","name":"Early Stopping","definition":"A regularization technique that monitors training and validation loss curves during training, saving model checkpoints and selecting the checkpoint where validation loss begins to increase, indicating the onset of overfitting. Architecture-agnostic and widely applicable.","tags":["training","optimization","regularization"],"nodeType":"concept","sourceCount":2,"sources":[{"course":"MIT15.773","lecture":"03"},{"course":"mit-6s191","lecture":"01"}]},{"id":"overfitting","name":"Overfitting","definition":"The phenomenon where a model learns the specific details and noise of the training data too closely, resulting in excellent training performance but poor generalization to unseen test data. The model has effectively memorized rather than learned generalizable patterns.","tags":["training","theory","generalization"],"nodeType":"concept","sourceCount":2,"sources":[{"course":"MIT15.773","lecture":"03"},{"course":"mit-6s191","lecture":"01"}]},{"id":"tensorflow","name":"TensorFlow","definition":"An open-source deep learning library that provides automatic gradient computation, optimizer implementations (SGD, Adam), distributed computing, and GPU/TPU acceleration. Named for tensors flowing through computational graphs.","tags":["infrastructure","training"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"MIT15.773","lecture":"03"}]},{"id":"categorical-cross-entropy","name":"Categorical Cross-Entropy","definition":"A loss function for multi-class classification that generalizes binary cross-entropy. Sparse variant accepts integer labels; categorical variant expects one-hot encoded labels. Used with softmax output layers.","tags":["training","theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"MIT15.773","lecture":"03"}]},{"id":"convolutional-filter","name":"Convolutional Filter","definition":"A small matrix of learnable weights (e.g., 3x3) that is slid across an image to detect spatial features like edges, lines, and textures via element-wise multiplication and summation followed by a ReLU activation.","tags":["architecture"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"MIT15.773","lecture":"04"}]},{"id":"convolutional-neural-network","name":"Convolutional Neural Network","definition":"A neural network architecture designed for spatial data that uses convolutions, non-linearities, and pooling to learn hierarchical feature representations. Composed of a feature extraction backbone (conv + pool layers) and a task-specific head (dense layers for classification).","tags":["architecture","computer-vision"],"nodeType":"concept","sourceCount":2,"sources":[{"course":"MIT15.773","lecture":"04"},{"course":"mit-6s191","lecture":"03"}]},{"id":"max-pooling","name":"Max Pooling","definition":"A downsampling operation that reduces the spatial dimensions of feature maps by taking the maximum value within non-overlapping patches (e.g., 2×2). Preserves the strongest detected features while increasing the relative receptive field of subsequent convolutional layers.","tags":["architecture","computer-vision"],"nodeType":"concept","sourceCount":2,"sources":[{"course":"MIT15.773","lecture":"04"},{"course":"mit-6s191","lecture":"03"}]},{"id":"transfer-learning","name":"Transfer Learning","definition":"The practice of taking a neural network pretrained on a large dataset (e.g., ImageNet) and adapting it for a new, specific task by freezing learned feature layers and retraining only the classification head, dramatically reducing data requirements.","tags":["training","application"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"MIT15.773","lecture":"04"}]},{"id":"data-augmentation","name":"Data Augmentation","definition":"A technique that artificially expands training data by applying semantic-preserving transformations (random flips, rotations, zooms, crops) to existing images, providing a \"free lunch\" for improving model generalization with limited data.","tags":["data","training"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"MIT15.773","lecture":"04"}]},{"id":"translation-invariance","name":"Translation Invariance","definition":"The property of detecting a feature (e.g., a vertical line) regardless of its spatial position in the image, achieved by CNNs through weight sharing across all positions via the sliding filter operation.","tags":["theory","architecture"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"MIT15.773","lecture":"04"}]},{"id":"resnet","name":"ResNet","definition":"A deep convolutional neural network architecture that introduced residual (skip) connections, enabling training of very deep networks (50-152+ layers). First architecture to surpass human-level performance on ImageNet image classification.","tags":["architecture"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"MIT15.773","lecture":"04"}]},{"id":"imagenet","name":"ImageNet","definition":"A large-scale dataset containing millions of labeled images across 1,000 everyday object categories, used as a standard benchmark for image classification and a source of pretrained models for transfer learning.","tags":["data"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"MIT15.773","lecture":"04"}]},{"id":"tokenization","name":"Tokenization","definition":"The process of converting raw data (text, audio, etc.) into numerical representations suitable for neural network processing. Ideally captures semantic relationships so that similar concepts map to nearby points in the embedding space.","tags":["data","data-processing","nlp"],"nodeType":"concept","sourceCount":2,"sources":[{"course":"MIT15.773","lecture":"05"},{"course":"mit-6s191","lecture":"02"}]},{"id":"bag-of-words","name":"Bag-of-Words","definition":"A text representation method that converts text into a fixed-length vector of word counts or frequencies, ignoring word order. Simple but effective baseline for many classification tasks.","tags":["data","theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"MIT15.773","lecture":"05"}]},{"id":"text-vectorization","name":"Text Vectorization","definition":"The process of converting text strings into numerical tensors suitable for neural network input, encompassing tokenization, vocabulary mapping, and encoding schemes like multi-hot, count, or TF-IDF.","tags":["data"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"MIT15.773","lecture":"05"}]},{"id":"vocabulary","name":"Vocabulary","definition":"The fixed set of all unique tokens known to the model, built from the training data, with each token mapped to a unique integer index. Words not in the vocabulary become out-of-vocabulary (OOV/UNK) tokens.","tags":["data"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"MIT15.773","lecture":"05"}]},{"id":"out-of-vocabulary","name":"Out-of-Vocabulary","definition":"Tokens encountered at inference time that were not present in the training vocabulary, collapsed into a single special token (UNK), causing loss of distinguishing information between different unknown words.","tags":["data"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"MIT15.773","lecture":"05"}]},{"id":"tf-idf","name":"TF-IDF","definition":"A text weighting scheme that multiplies term frequency (how often a word appears in a document) by inverse document frequency (how rare the word is across all documents), giving higher weight to distinctive words.","tags":["data","theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"MIT15.773","lecture":"05"}]},{"id":"resilience","name":"Resilience","definition":"The ability of individuals and organizations to adapt to and recover from unexpected challenges, crises, or 'punches in the face,' emerging stronger from adversity.","tags":["theory","safety","infrastructure"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"01"}]},{"id":"transparency-in-crisis-management","name":"Transparency in Crisis Management","definition":"The practice of open and honest communication, especially during security incidents and outages, which builds trust with customers and the public and can mitigate negative perception.","tags":["application","safety","infrastructure","data"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"01"}]},{"id":"cybersecurity-landscape-evolution","name":"Cybersecurity Landscape Evolution","definition":"The ongoing and rapid transformation of cybersecurity threats and challenges, shifting from primarily focusing on data exfiltration to also include ransomware, operational disruption, and risks posed by emerging AI technologies.","tags":["theory","safety","infrastructure","data"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"01"}]},{"id":"ransomware","name":"Ransomware","definition":"A type of malicious cyberattack that encrypts a victim's data or locks them out of their systems, demanding a ransom payment for restoration of access, often leading to significant operational disruption and economic damage.","tags":["safety","application","data","infrastructure"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"01"}]},{"id":"responsible-disclosure-policies","name":"Responsible Disclosure Policies","definition":"A set of guidelines published by companies that encourages security researchers to privately report vulnerabilities they find, promising not to pursue legal action if guidelines are followed, thereby fostering collaboration with the hacker community.","tags":["safety","application","data","infrastructure"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"01"}]},{"id":"bug-bounty-programs","name":"Bug Bounty Programs","definition":"Programs that offer financial rewards to security researchers for discovering and reporting vulnerabilities or 'bugs' in a company's systems, incentivizing external collaboration to enhance security.","tags":["safety","optimization","data","infrastructure"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"01"}]},{"id":"cybersecurity-leadership","name":"Cybersecurity Leadership","definition":"The role of security executives (like CISOs) in guiding an organization's security posture, which includes not only managing technical security teams but also educating other executives, preparing for crises, and building trust across the company.","tags":["training","architecture","safety","infrastructure"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"01"}]},{"id":"government-technology-interaction","name":"Government-Technology Interaction","definition":"The complex and often evolving relationship between government entities (e.g., law enforcement, regulators) and technology companies, concerning issues such as cybercrime prosecution, data privacy, national security, and technology regulation.","tags":["application","theory","safety","infrastructure"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"01"}]},{"id":"ai-in-cybersecurity","name":"AI in Cybersecurity","definition":"The application and implications of Artificial Intelligence and advanced models (like LLMs) for both enhancing cybersecurity defenses and creating new attack vectors, posing urgent challenges for government and industry in managing their release and impact.","tags":["architecture","application","safety","optimization","data","infrastructure"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"01"}]},{"id":"operational-resilience","name":"Operational Resilience","definition":"The ability of an organization to withstand and quickly recover from disruptive events, such as cyberattacks (e.g., ransomware), ensuring the continuity of critical business functions, which has become a primary cybersecurity concern beyond just data theft.","tags":["architecture","safety","infrastructure"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"01"}]},{"id":"computer-hacking-and-fraud-act-cfaa","name":"Computer Hacking and Fraud Act (CFAA)","definition":"A U.S. federal law (18 U.S. Code § 1030) that prohibits unauthorized access to protected computers, creating legal complexities and ambiguities regarding what constitutes 'authorization' for security researchers and bug bounty participants.","tags":["theory","safety","legal"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"01"}]},{"id":"value-per-gigawatt","name":"Value per Gigawatt","definition":"The critical metric for infrastructure success, focusing on the actual utility, capability, or revenue generated for users per unit of compute capacity or cost, rather than just raw gigawatts deployed.","tags":["application","optimization","infrastructure"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"02"}]},{"id":"extreme-reliability-for-ai-workloads","name":"Extreme Reliability (for AI Workloads)","definition":"The paramount importance of robust systems that minimize failures and enable rapid recovery, especially for large-scale synchronous AI computations where a single node failure can halt the entire process.","tags":["architecture","optimization","infrastructure","training","hardware"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"02"}]},{"id":"system-balance-amdahls-law-at-scale","name":"System Balance (Amdahl's Law at Scale)","definition":"The critical need to balance all components of a large-scale compute system (flops, HBM, SRAM, network bandwidth, storage, CPU) according to application needs, to avoid bottlenecks and wasted investment, extending Amdahl's Law to modern distributed AI infrastructure.","tags":["architecture","hardware","optimization","infrastructure","theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"02"}]},{"id":"ai-workload-reliability-shift","name":"AI Workload Reliability Shift","definition":"A recent phenomenon where modern AI training workloads prioritize raw compute capacity and throughput over traditional \"five-nines\" (99.999%) availability, accepting more downtime in exchange for significantly increased access to compute.","tags":["training","application","infrastructure","optimization"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"02"}]},{"id":"energy-abundance-and-affordability","name":"Energy Abundance and Affordability","definition":"The biggest long-term bottleneck for scaling AI infrastructure, characterized by long lead times (years) for procuring large-scale, affordable, and sustainable energy for data centers, requiring complex community-level solutions.","tags":["infrastructure","hardware","data","optimization"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"02"}]},{"id":"optical-circuit-switching-ocs","name":"Optical Circuit Switching (OCS)","definition":"A networking technology utilized by Google to provide programmable network topology in data centers, enabling rapid reconfiguration (e.g., in seconds) to maintain network coherence, recover from failures, and create direct high-bandwidth connections for specific jobs without human intervention.","tags":["architecture","hardware","infrastructure","optimization"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"02"}]},{"id":"hardware-specialization-tpus","name":"Hardware Specialization (TPUs)","definition":"The strategic development of specialized hardware (e.g., Google's TPU-i for inference and TPU-t for training) to achieve significant performance and efficiency gains for specific, large workloads, as general-purpose CPUs have slowed their improvement rate.","tags":["hardware","architecture","optimization","training","application"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"02"}]},{"id":"infrastructure-planning-under-uncertainty","name":"Infrastructure Planning Under Uncertainty","definition":"The complex challenge of forecasting and provisioning compute capacity (e.g., gigawatts of power, chips, buildings) years in advance due to long lead times, leading to risks of under- or over-prediction and requiring dynamic, daily replanning based on new information and changing demands.","tags":["infrastructure","data","optimization"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"02"}]},{"id":"demand-response-data-centers","name":"Demand Response (Data Centers)","definition":"A practice where data centers act as assets to the power grid by agreeing to temporarily reduce their power consumption during peak demand (e.g., extreme weather), allowing utilities to provision less capacity overall and ensuring homes have necessary power.","tags":["infrastructure","optimization","safety","application"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"02"}]},{"id":"goodput","name":"Goodput","definition":"A measure of the useful output or effective utilization of a system, focusing on the work that directly contributes to value rather than just raw throughput or capacity that might be idle or wasted due to inefficiencies.","tags":["optimization","application","infrastructure"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"02"}]},{"id":"torus-topology","name":"Torus Topology","definition":"A specific network topology, often three-dimensional, used for ML training clusters where nodes are connected in a grid-like fashion with wrap-around connections, particularly efficient for all-reduce collective operations.","tags":["architecture","network","training"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"02"}]},{"id":"the-bitter-lesson-ai-scaling","name":"The Bitter Lesson (AI Scaling)","definition":"Rich Sutton's observation that, historically in AI, simply throwing more compute at problems, combined with general-purpose methods, has consistently yielded better results than sophisticated, human-engineered solutions, leading to a continuous demand for more computational power.","tags":["theory","training","application"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"02"}]},{"id":"pue-power-usage-effectiveness","name":"PUE (Power Usage Effectiveness)","definition":"A metric used to measure the energy efficiency of a data center, calculated as the ratio of total facility power to IT equipment power. A lower PUE indicates greater energy efficiency.","tags":["infrastructure","optimization"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"02"}]},{"id":"societal-responsibility-in-ai-infrastructure","name":"Societal Responsibility in AI Infrastructure","definition":"The obligation of technologists and infrastructure builders to ensure that the deployment of AI infrastructure provides uplift to local communities and the environment, considering factors like noise, water usage, power grid impact, job creation, and the ethical implications of AI's societal transformation.","tags":["safety","application","infrastructure"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"02"}]},{"id":"amdahls-law","name":"Amdahl's Law","definition":"A fundamental principle stating that the speedup of a program due to parallelization is limited by the sequential portion of the program. It emphasizes the importance of balancing computational power with the ability to feed it data (IO) to achieve maximum performance.","tags":["theory","architecture"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"02"}]},{"id":"ai-native-company","name":"AI-Native Company","definition":"A company fundamentally built around and operating with AI agents and closed-loop systems to achieve unprecedented productivity and efficiency, often leading to drastically flattened organizational structures.","tags":["application","architecture","infrastructure"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"03"}]},{"id":"1000x-productivity-for-founders","name":"1000x Productivity for Founders","definition":"The ability for individual engineers/founders to achieve productivity equivalent to hundreds or thousands of people by leveraging AI coding agents and AI-native principles.","tags":["application","optimization"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"03"}]},{"id":"ai-coding-agents","name":"AI Coding Agents","definition":"AI-powered tools and systems (e.g., Claude Code, Gstack) that automate and assist in code generation, development, and complex workflows, drastically increasing engineering productivity.","tags":["application","optimization","infrastructure","theory"],"nodeType":"concept","sourceCount":2,"sources":[{"course":"cs153","lecture":"03"},{"course":"llm-agents-sp25","lecture":"05"}]},{"id":"closed-loop-system-ai-native-company","name":"Closed-Loop System (AI-Native Company)","definition":"An operational model for AI-native companies where AI agents have comprehensive read access to all company data, continuously learn, suggest actions, and self-heal, forming a tight feedback loop.","tags":["architecture","optimization","infrastructure"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"03"}]},{"id":"skills-agentic-systems","name":"Skills (Agentic Systems)","definition":"Modular, markdown-based runbooks often incorporating code calls, designed to enable AI agents to perform specific, repeatable tasks or capabilities within an agentic system.","tags":["architecture","application","infrastructure"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"03"}]},{"id":"resolvers-agentic-systems","name":"Resolvers (Agentic Systems)","definition":"Mechanisms in agentic systems for context management, preventing token overload by dynamically loading necessary instructions or knowledge (e.g., specific skills) only when required.","tags":["architecture","optimization","data"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"03"}]},{"id":"memory-systems-agentic-systems","name":"Memory Systems (Agentic Systems)","definition":"Multi-layered knowledge management architectures that store and retrieve information for AI agents, often combining knowledge wikis, vector search, graph databases, and an epistemology system.","tags":["architecture","data","infrastructure"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"03"}]},{"id":"custom-evaluations-evals","name":"Custom Evaluations (Evals)","definition":"Rigorous, custom-built evaluation mechanisms and meta-prompting used to ensure AI agents produce high-quality, user-satisfying outputs, moving beyond generic benchmarks.","tags":["training","optimization","application"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"03"}]},{"id":"taste-in-ai-product-development","name":"Taste (in AI Product Development)","definition":"The unique human discernment for what is good, valuable, and user-satisfying, which becomes the durable differentiator as the cost of shipping AI-generated code approaches zero.","tags":["application","theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"03"}]},{"id":"skillify","name":"Skillify","definition":"The process of taking a successful agent interaction or workflow, abstracting it into a reusable skill (markdown runbook with code calls), and then rigorously testing it with unit tests, LLM evals, and integration tests.","tags":["optimization","architecture","training"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"03"}]},{"id":"boil-the-ocean-ai-era","name":"Boil the Ocean (AI Era)","definition":"A new operational mindset in the AI era, where the vastly increased productivity of individuals using AI agents enables tackling extremely ambitious, large-scale projects previously considered unfeasible for small teams.","tags":["application","optimization","theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"03"}]},{"id":"ai-founder","name":"AI Founder","definition":"A founder who embodies and leverages cutting-edge AI tools and agentic systems to run their company fast, staying at the forefront of AI innovations and building AI-native organizations.","tags":["application","theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"03"}]},{"id":"agentic-system","name":"Agentic System","definition":"A system composed of AI agents that can perceive their environment, reason, plan actions, and execute them, often in a closed-loop fashion, using primitives like skills, resolvers, and memory.","tags":["architecture","application"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"03"}]},{"id":"meta-prompting","name":"Meta-Prompting","definition":"An iterative technique involving prompting AI models to evaluate and refine the outputs of other AI agents or even themselves, leading to higher quality and more precise results.","tags":["training","optimization"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"03"}]},{"id":"self-healing-systems","name":"Self-Healing Systems","definition":"AI systems designed to automatically detect, diagnose, and resolve issues or bugs, enabling continuous operation and improvement without direct human intervention.","tags":["application","optimization","architecture"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"03"}]},{"id":"co-design","name":"Co-Design","definition":"The practice of simultaneously optimizing algorithms, software frameworks, compilers, and hardware architecture together rather than in isolation, yielding exponential performance gains. Originated at Stanford with RISC (Hennessy) and extended by NVIDIA across the entire compute stack.","tags":["architecture","hardware","systems"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"04"}]},{"id":"agentic-computing","name":"Agentic Computing","definition":"A new computing paradigm where AI systems run continuously and autonomously rather than on-demand, executing multi-step tasks with tool use, sub-agents, and persistent memory. Requires fundamentally different system architectures compared to traditional cloud computing.","tags":["architecture","agents","infrastructure"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"04"}]},{"id":"nvlink72","name":"NVLink72","definition":"NVIDIA's interconnect technology that gangs 72 GPUs together into a single rack-scale computer, providing aggregate memory bandwidth far beyond a single chip. Designed for efficient decode/inference of large language models, achieving 50x improvement over the previous Hopper generation.","tags":["hardware","infrastructure","inference"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"04"}]},{"id":"tokens-per-watt","name":"Tokens Per Watt","definition":"A performance metric measuring AI intelligence output (generated tokens) relative to energy consumption. Considered more meaningful than MFU (Model FLOPs Utilization) for evaluating system efficiency, though still incomplete since different token types have different value.","tags":["metrics","efficiency","infrastructure"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"04"}]},{"id":"model-flops-utilization","name":"Model FLOPs Utilization","definition":"A metric measuring the percentage of theoretical peak FLOPs consumed during model training or inference. Jensen Huang argues it is misleading because low MFU can indicate smart overprovisioning to avoid Amdahl's Law bottlenecks, and high MFU during decode is undesirable.","tags":["metrics","training","hardware","optimization"],"nodeType":"concept","sourceCount":2,"sources":[{"course":"cs153","lecture":"04"},{"course":"cs336","lecture":"02"}]},{"id":"vera-rubin-architecture","name":"Vera Rubin Architecture","definition":"NVIDIA's GPU generation designed specifically for agentic AI workloads. Features storage connected directly to the GPU fabric for long-term agent memory and extremely low-latency CPUs optimized for single-threaded tool-call execution, avoiding the bottleneck of a multi-billion dollar GPU system waiting for one CPU.","tags":["hardware","architecture","agents"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"04"}]},{"id":"nemotron","name":"Nemotron","definition":"NVIDIA's near-frontier open language model designed to be fine-tuned for any language, democratizing AI capabilities for underrepresented languages and societies where commercial priority would not justify dedicated investment.","tags":["models","open-source","language"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"04"}]},{"id":"open-source-ai","name":"Open Source AI","definition":"AI models with publicly available weights and architectures that can be inspected, fine-tuned, and deployed independently. Jensen argues open models are essential for AI safety (you cannot secure a black box), democratization of AI across languages and domains, and enabling cybersecurity defense through swarms of cheap, specialized models.","tags":["policy","safety","open-source","theory","infrastructure"],"nodeType":"concept","sourceCount":2,"sources":[{"course":"cs153","lecture":"04"},{"course":"llm-agents-f24","lecture":"10"}]},{"id":"generative-vs-pre-recorded-computing","name":"Generative vs Pre-Recorded Computing","definition":"The fundamental shift in computing from serving pre-recorded, retrieval-based content (images, videos, compiled software) to generating contextually relevant, real-time content. This shift changes every layer of the computing stack and requires fundamentally different architectures and energy profiles.","tags":["theory","architecture","paradigm-shift"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"04"}]},{"id":"alpamo","name":"Alpamo","definition":"NVIDIA's open foundation model for autonomous vehicles that fuses a language model with a driving world model. By incorporating human priors and language reasoning, it dramatically reduces the training data needed for safe driving compared to pure experience-based approaches.","tags":["models","autonomous-vehicles","robotics"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"04"}]},{"id":"energy-as-primary-ai-bottleneck","name":"Energy as Primary AI Bottleneck","definition":"The rapidly escalating demand for power to operate AI data centers is becoming the most significant upstream constraint, surpassing compute itself, as acknowledged by industry leaders.","tags":["infrastructure","hardware","application"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"05"}]},{"id":"ai-factory","name":"AI Factory","definition":"An organizing mental model or metaphor for the entire pipeline of intelligence manufacturing, encompassing pre-training, mid-training, post-training, and deployment to agents.","tags":["architecture","theory","infrastructure"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"05"}]},{"id":"stranded-energy","name":"Stranded Energy","definition":"Energy generated from sources (e.g., remote hydro, flared natural gas, wind) that lack nearby demand or transmission infrastructure, which was initially leveraged by industries like Bitcoin mining.","tags":["infrastructure","application","optimization"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"05"}]},{"id":"net-new-power-production","name":"Net New Power Production","definition":"The necessity to build entirely new power generation capacity rather than just utilizing existing 'stranded' sources, driven by the unprecedented scale of AI energy demand.","tags":["infrastructure","hardware","optimization"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"05"}]},{"id":"nuclear-energy","name":"Nuclear Energy","definition":"A power generation method identified as the optimal long-term solution for AI's energy needs due to its base load capabilities, lowest carbon emissions, and excellent safety record.","tags":["hardware","infrastructure","application"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"05"}]},{"id":"uranium-enrichment","name":"Uranium Enrichment","definition":"A critical intermediate step in the nuclear fuel supply chain, where uranium hexafluoride gas is processed to increase the concentration of the fissile U-235 isotope, making it suitable for reactor fuel.","tags":["hardware","infrastructure","optimization"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"05"}]},{"id":"nuclear-fuel-supply-chain","name":"Nuclear Fuel Supply Chain","definition":"The five-step process for producing nuclear fuel, starting from mining uranium ore, converting it to a gas, enriching it, converting it back to a solid, and fabricating fuel pellets.","tags":["infrastructure","hardware"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"05"}]},{"id":"public-perception-of-nuclear-power","name":"Public Perception of Nuclear Power","definition":"The historical and evolving societal views and political obstacles that have impacted the adoption and expansion of nuclear energy, despite its safety and cleanliness records.","tags":["societal","infrastructure","theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"05"}]},{"id":"ai-as-a-catalyst-for-new-jobs","name":"AI as a Catalyst for New Jobs","definition":"The phenomenon where the rapidly growing demand for AI infrastructure, particularly energy, is creating thousands of new jobs across various sectors, from engineering to construction.","tags":["societal","infrastructure","application"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"05"}]},{"id":"base-load-power","name":"Base Load Power","definition":"A consistent and reliable source of electricity required to meet the continuous, high-uptime demand of AI data centers, which intermittent sources like solar and wind struggle to provide without extensive storage.","tags":["infrastructure","hardware"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"05"}]},{"id":"us-grid-expansion-stagnation","name":"US Grid Expansion Stagnation","definition":"The decades-long slowdown in building new power generation and transmission infrastructure in the United States, which has created a severe deficit in energy supply relative to the accelerating demand from AI.","tags":["infrastructure","optimization"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"05"}]},{"id":"megatons-to-megawatts-program","name":"Megatons to Megawatts Program","definition":"A post-Cold War program where the US acquired highly enriched uranium from Russian nuclear warheads, downblended it, and used it as fuel for commercial power reactors, impacting the domestic nuclear fuel supply chain.","tags":["societal","infrastructure","application"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"05"}]},{"id":"network-effect-bootstrapping","name":"Network Effect Bootstrapping","definition":"The challenge of initializing a network's value from zero, when the n-squared value proposition requires existing nodes to attract new ones. Requires asymmetric hacks, subsidies, or unconventional distribution strategies before the network becomes self-sustaining.","tags":["strategy","networks","venture-capital"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"06"}]},{"id":"centralized-control-shared-economics","name":"Centralized Control Shared Economics","definition":"a16z's innovation of maintaining a single decision-maker (centralized control) while distributing financial returns across partners (shared economics). This enabled rapid organizational change, scaling into new categories, and avoiding the consensus paralysis of traditional VC partnerships.","tags":["organization","venture-capital","leadership"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"06"}]},{"id":"capital-as-a-weapon","name":"Capital as a Weapon","definition":"The new reality in AI where, unlike traditional software development, you can solve most problems by deploying sufficient compute and capital. This makes capital races a genuine competitive dimension for the first time in tech history.","tags":["strategy","venture-capital","compute"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"06"}]},{"id":"culture-as-actions","name":"Culture as Actions","definition":"The principle from samurai philosophy (Bushido) that organizational culture should be defined by specific, observable behaviors — office presence, response times, decision hierarchy — rather than aspirational beliefs or corporate values platitudes.","tags":["culture","leadership","organization"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"06"}]},{"id":"saas-apocalypse","name":"SaaS Apocalypse","definition":"The Wall Street narrative that AI will one-shot all SaaS companies, causing a broad sell-off of software stocks. Ben Horowitz argues this conflates companies with deep moats (global supply chains, specialized sales channels) with those whose only defensibility was code and UI.","tags":["markets","strategy","narrative"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"06"}]},{"id":"truth-seeking-conversation","name":"Truth-Seeking Conversation","definition":"The high-fidelity, small-group conversation format that a16z uses for investment decisions. Optimal size is about 7 people with good chemistry. More than that becomes a presentation, not a conversation.","tags":["decision-making","venture-capital","organization"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"06"}]},{"id":"lbo-vs-vc-culture","name":"LBO vs VC Culture","definition":"The fundamental cultural tension between venture capital (invest in entrepreneurs, focus on growth, build new things) and leverage buyout (entry price, efficiency, firing people). AI creates LBO-like opportunities but pursuing them splits VC culture and mission.","tags":["venture-capital","culture","strategy"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"06"}]},{"id":"product-builder","name":"Product Builder","definition":"The emerging role merging traditional PM, design, and engineering skills into a hands-on builder who exercises judgment on what to build and why, replacing the siloed information-moving PM. Companies increasingly hire for this hybrid skill regardless of title.","tags":["product","careers","ai-transformation"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"07"}]},{"id":"information-moving","name":"Information Moving","definition":"The function of packaging and transferring information between stakeholders that constituted approximately 80% of traditional product management work. Now largely automatable by AI agents that summarize customer calls, sales interactions, and survey data.","tags":["product","ai-transformation","organization"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"07"}]},{"id":"the-skip","name":"The Skip","definition":"Career strategy framework of planning the job AFTER the one you're considering, ensuring each career chapter maximizes optionality and learning for future chapters. Based on the observation that careers span 15-18 jobs over 50 years.","tags":["careers","strategy"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"07"}]},{"id":"corporate-theatrics","name":"Corporate Theatrics","definition":"The organizational pattern where multiple management layers create elaborate slide decks and formal presentations to convey information that originated from a single IC's experiment, adding latency and distortion without genuine insight.","tags":["organization","product","culture"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"07"}]},{"id":"iteration-speed-as-moat","name":"Iteration Speed as Moat","definition":"The principle that product success correlates more with iteration frequency than initial quality. Demonstrated by Chrome (6-week releases) beating Firefox (quarterly) beating Internet Explorer (annually), and Android (quarterly) vs iOS (annual).","tags":["product","strategy","execution"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"07"}]},{"id":"product-market-fit-s-curve","name":"Product-Market Fit S-Curve","definition":"The four phases companies traverse: (1) Finding product-market fit through rapid experimentation, (2) Post-PMF process and consistency building, (3) Hypergrowth requiring simultaneous scaling and expansion, (4) Big tech innovator's dilemma requiring zero-to-one innovation against inertia.","tags":["product","startups","strategy"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"07"}]},{"id":"flat-organization-model","name":"Flat Organization Model","definition":"The emerging organizational structure where AI agents eliminate middle management layers, creating wider but shallower hierarchies. Leaders can observe ground truth directly through AI-monitored interactions rather than through management chains.","tags":["organization","ai-transformation","leadership"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"07"}]},{"id":"unified-model-architecture","name":"Unified Model Architecture","definition":"A single transformer backbone that processes text, image, video, and audio in a shared representation space with modality-specific encoders/decoders. Unlike fused architectures with separate towers and thin bridges, unified models reason across all modalities in one backbone, analogous to the neocortex.","tags":["architecture","multimodal","models"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"08"}]},{"id":"differentiable-world-learning","name":"Differentiable World Learning","definition":"The principle that if physical world data (3D, video, audio) can be made differentiable — put through a training loop with gradient descent — deep learning can learn its structure, understand it, and generate it. Compute and gradient descent are the fundamental tools of this era.","tags":["theory","training","models"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"08"}]},{"id":"skills-layer","name":"Skills Layer","definition":"Domain-specific context documents created by human experts that sit above the tool harness and model in the agent architecture. Not baked into model weights or tools — provided as context that teaches the system what \"good\" looks like. Enables artists and domain experts to have programmer-like leverage.","tags":["agents","architecture","creative-tools"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"08"}]},{"id":"pe-mindset","name":"PE Mindset","definition":"The private equity approach of creating franchised assets and extracting maximum value through sequels, crossovers, and efficiency optimization rather than investing in diverse new creative works. Applied to Hollywood, it has led to sequel fatigue and production exodus.","tags":["business","creative-industry","strategy"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"08"}]},{"id":"data-scale-dictates-architecture","name":"Data Scale Dictates Architecture","definition":"The principle that algorithm and system design must follow where data exists at internet scale. Creating a pristine algorithm without matching data is moot. This drove Luma's pivot from 3D capture (limited app-based data) to video (abundant internet data).","tags":["theory","data","architecture"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"08"}]},{"id":"preference-feedback-flywheel","name":"Preference Feedback Flywheel","definition":"The system where user interactions with generated content (downloads, likes, multi-turn edits) provide preference signals that improve subsequent model versions. Requires filtering for quality (some users download bad outputs to mock AI) and careful product design to capture meaningful signals.","tags":["training","product","data","strategy","scaling"],"nodeType":"concept","sourceCount":2,"sources":[{"course":"cs153","lecture":"08"},{"course":"cs153","lecture":"11"}]},{"id":"end-to-end-work","name":"End-to-End Work","definition":"The goal of AI systems doing complete tasks rather than generating isolated artifacts. Analogous to the REPL loop (read-eval-print) in computing. Requires unified models that can plan, execute, judge their own output, and iterate — not just produce 5-second video clips.","tags":["agents","product","architecture"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"08"}]},{"id":"natural-vs-unnatural-representations","name":"Natural vs Unnatural Representations","definition":"Natural representations (video, audio) originate from physical phenomena with high redundancy and dimensional richness. Unnatural representations (text) are human-engineered for efficient communication with minimal redundancy. AI should learn from natural representations first, as human babies do, to build foundational intelligence.","tags":["theory","multimodal","training"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"09"}]},{"id":"latent-diffusion","name":"Latent Diffusion","definition":"Training generative models in a compressed latent space rather than raw pixel space. A compression model (like a learned JPEG codec) finds perceptually equivalent but lower-dimensional representations, enabling orders-of-magnitude compute savings while matching quality of pixel-space training.","tags":["architecture","training","efficiency"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"09"}]},{"id":"adversarial-diffusion-distillation","name":"Adversarial Diffusion Distillation","definition":"Technique for reducing diffusion model inference steps from 50 to 2-4 while preserving quality. Uses adversarial training to teach a student model to produce high-quality outputs in fewer denoising steps. Enables product tiering from a single base model (fast/cheap vs. slow/high-quality).","tags":["inference","efficiency","architecture"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"09"}]},{"id":"self-flow","name":"Self-Flow","definition":"BFL's technique for aligning generative model internal representations with multimodal representation learning models. Extends single-modality alignment (e.g., DINO for images) to cross-modal alignment, enabling compounding effects where correlations between modalities improve understanding.","tags":["training","multimodal","research"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"09"}]},{"id":"physical-verification","name":"Physical Verification","definition":"The principle that AI progress is fastest in domains where task performance can be physically verified. Physical world interaction naturally applies boundary conditions (robot joints, object physics) that serve as inherent verification, unlike aesthetic/creative domains requiring subjective human judgment.","tags":["training","robotics","verification"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"09"}]},{"id":"open-weight-business-model","name":"Open Weight Business Model","definition":"BFL's commercial model of releasing open-weight models at multiple tiers: fully open Apache 2.0 (Schnell), open weights with commercial license (Dev), and API-only (Pro). Works especially well when aesthetic preferences vary widely by audience, enabling customer customization of the last mile.","tags":["business","open-source","strategy"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"09"}]},{"id":"context-driven-capability-discovery","name":"Context-Driven Capability Discovery","definition":"The process of discovering new model capabilities through deployment feedback. Flux 1's open-weight release revealed that users were training LoRAs for character consistency, revealing latent demand for image editing that wasn't in the original product plan. Led to Flux Context within 60 days.","tags":["product","training","feedback"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"09"}]},{"id":"cascaded-audio-architecture","name":"Cascaded Audio Architecture","definition":"Audio agent architecture using three separate models in sequence: speech-to-text transcription, LLM reasoning/response generation, and text-to-speech synthesis. Provides enterprise reliability, debuggability, and tool-calling at each stage, but with higher latency than fused approaches.","tags":["architecture","audio","agents"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"10"}]},{"id":"fused-audio-architecture","name":"Fused Audio Architecture","definition":"Single end-to-end model that processes input speech directly to output speech without text intermediary. Achieves ~300ms response latency with emergent emotional understanding, but sacrifices the reliability, debuggability, and tool-calling control of cascaded approaches.","tags":["architecture","audio","agents"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"10"}]},{"id":"voice-cloning","name":"Voice Cloning","definition":"AI capability to replicate a person's voice characteristics (timbre, accent, cadence) from audio samples, enabling dubbing, voiceover, and personalization. Requires safety measures including traceability, watermarking, and content moderation to prevent identity fraud.","tags":["audio","safety","product"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"10"}]},{"id":"emotional-expressivity-control","name":"Emotional Expressivity Control","definition":"The ability to detect emotional context from input speech (stress, excitement, sadness) and control the emotional delivery of generated speech accordingly. Requires specialized labeled training data mapping text content and delivery style to emotional categories.","tags":["audio","training","product"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"10"}]},{"id":"plg-motion","name":"PLG Motion","definition":"Growth strategy where community and developer adoption drives distribution and context feedback before enterprise sales. ElevenLabs launched as a Discord bot, used community usage patterns to discover use cases, and built voice marketplace for user-contributed voices.","tags":["business","product","strategy"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"10"}]},{"id":"ai-dubbing-pipeline","name":"AI Dubbing Pipeline","definition":"End-to-end system for translating audio/video content across languages while preserving the original speaker's voice, emotion, and delivery. Requires orchestrating transcription, translation, and voice synthesis models. First became viable in 2024 with improvements across all three components.","tags":["audio","product","localization"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"10"}]},{"id":"forward-deployed-revenue-model","name":"Forward-Deployed Revenue Model","definition":"Business model where revenue scales predictably with the size and capability of the deployment/forward- deployed engineering team rather than with compute or model capability alone. Each team member brings applied AI into specific enterprise workflows, creating predictable revenue per deployment.","tags":["business","strategy","scaling"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"10"}]},{"id":"context-loop-wars","name":"Context Loop Wars","definition":"The emerging competition between AI companies and platforms for access to unique, defensible context data that drives model improvement. Exemplified by Anthropic shutting off API access to Windsurf users after OpenAI's acquisition to prevent context leakage to a competitor.","tags":["strategy","competition","infrastructure"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"11"}]},{"id":"sovereign-ai","name":"Sovereign AI","definition":"The principle that mission-critical AI workloads (government, defense, sensitive enterprise) require local infrastructure and open models rather than dependence on foreign cloud providers. Driven by regulations like the US Cloud Act and the need to keep sensitive context within national borders.","tags":["policy","infrastructure","geopolitics"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"11"}]},{"id":"compute-fungibility","name":"Compute Fungibility","definition":"The degree to which compute resources can be substituted for each other. Currently very low — different GPU generations (H100/GB200/B300) and manufacturers (AMD/NVIDIA) are not interchangeable. Unlike electricity (megawatts are megawatts), compute lacks common units, standard interfaces, and buyer substitutability.","tags":["infrastructure","compute","economics"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"11"}]},{"id":"pre-standardization-era","name":"Pre-Standardization Era","definition":"The current phase of compute infrastructure analogous to railroads before gauge standardization (1886) or electricity before AC/DC resolution (1907). Characterized by rising prices, hoarding by large players, lack of common standards, and the need for institutions to enforce fungibility.","tags":["infrastructure","economics","history"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"11"}]},{"id":"verifiability-thesis","name":"Verifiability Thesis","definition":"The principle that AI frontier progress is fastest in domains where task performance can be objectively verified (code unit tests, physical experiments), and slowest in domains requiring subjective human judgment (aesthetics, creative writing, beauty, love).","tags":["theory","training","research"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"11"}]},{"id":"infrastructure-cycles","name":"Infrastructure Cycles","definition":"The historical pattern where new general-purpose technologies create infrastructure explosions followed by hoarding, panics, crashes, and eventual stabilization through standards and institutions. Observed in steel (1867-1895), fiber optics (2000s), DRAM, uranium, and now compute. Digital cycles average ~2.8 years; physical ~6.3 years.","tags":["economics","infrastructure","history"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs153","lecture":"11"}]},{"id":"compute-revenue-correlation","name":"Compute-Revenue Correlation","definition":"The observed pattern at Anthropic where every time new compute infrastructure was brought online, capabilities improved within 60-90 days followed by a predictable revenue jump. Represents a roughly 10x value transformation from hardware asset (3-4x revenue multiple) to software revenue (30-40x multiple).","tags":["economics","scaling","compute","business"],"nodeType":"concept","sourceCount":2,"sources":[{"course":"cs153","lecture":"11"},{"course":"mse435","lecture":"05"}]},{"id":"recursive-self-improvement","name":"Recursive Self-Improvement","definition":"The point at which an AI system's context feedback and compute flywheels become self-sustaining — the system generates enough revenue to fund compute, and enough context to improve capabilities, without external intervention. Sometimes equated with paths to AGI/ASI, but Anjney views it at the systems level rather than individual model level.","tags":["theory","scaling","strategy","training","game-theory","multi-agent"],"nodeType":"concept","sourceCount":2,"sources":[{"course":"cs153","lecture":"11"},{"course":"cs294-agentic-f25","lecture":"06"}]},{"id":"pre-training","name":"Pre-training","definition":"The first stage of LLM training where the model learns to predict the next token on internet-scale data (10-40 trillion tokens), acquiring broad world knowledge through self-supervised learning.","tags":["training","foundation"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs294-agentic-f25","lecture":"01"}]},{"id":"scaling-laws","name":"Scaling Laws","definition":"Empirically observed power-law relationships between model size, training data volume, and model performance (loss). More parameters and more data independently improve performance, but inference cost considerations often drive smaller models trained on more data in practice.","tags":["training","theory","compute","scaling"],"nodeType":"concept","sourceCount":3,"sources":[{"course":"cs294-agentic-f25","lecture":"01"},{"course":"cs336","lecture":"01"},{"course":"mit-6s191","lecture":"09"}]},{"id":"compute-optimal-training","name":"Compute-Optimal Training","definition":"Scaling laws from Hoffmann et al. (2022) showing that compute-optimal training balances model size and data roughly equally, with a rule of thumb of ~20 tokens per parameter. Corrected earlier Kaplan (OpenAI) scaling laws that recommended allocating most compute to model size.","tags":["training","compute","optimization","theory"],"nodeType":"concept","sourceCount":3,"sources":[{"course":"cs294-agentic-f25","lecture":"01"},{"course":"cs336","lecture":"09"},{"course":"cs336","lecture":"09"}]},{"id":"bitter-lesson","name":"Bitter Lesson","definition":"The observation (often misinterpreted) that algorithms which scale with compute are what matter most in AI progress. The correct interpretation is not that \"only scale matters\" but that algorithmic efficiency multiplied by resources produces the best results.","tags":["philosophy","compute","strategy","theory","training","scaling"],"nodeType":"concept","sourceCount":3,"sources":[{"course":"cs294-agentic-f25","lecture":"01"},{"course":"cs336","lecture":"01"},{"course":"mit-6s191","lecture":"08"}]},{"id":"supervised-fine-tuning","name":"Supervised Fine-Tuning","definition":"A key concept in language model training covered in CS336 Lecture 15 (Mid/Post-Training: SFT and RLHF). This concept relates to the practical implementation and optimization of large language models, connecting theoretical understanding to engineering practice.","tags":["training","post-training","alignment"],"nodeType":"concept","sourceCount":3,"sources":[{"course":"cs294-agentic-f25","lecture":"01"},{"course":"cs336","lecture":"15"},{"course":"cs336","lecture":"15"}]},{"id":"reinforcement-learning-from-human-feedback","name":"Reinforcement Learning from Human Feedback","definition":"A technique for aligning language models with human preferences by training a reward model from human feedback (thumbs up/down) and using it to fine-tune the LLM via reinforcement learning. Enables optimization beyond simple next-token prediction toward human-preferred outputs.","tags":["training","alignment","post-training","reinforcement-learning","llm"],"nodeType":"concept","sourceCount":3,"sources":[{"course":"cs294-agentic-f25","lecture":"01"},{"course":"cs336","lecture":"15"},{"course":"mit-6s191","lecture":"05"}]},{"id":"rejection-sampling","name":"Rejection Sampling","definition":"Technique for generating SFT training data by sampling many candidate answers from an LLM and keeping only those that pass verification (test cases, math checkers, etc.). Used by DeepSeek R1 to bootstrap training data without a stronger teacher model.","tags":["training","data-generation","technique"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs294-agentic-f25","lecture":"01"}]},{"id":"test-time-compute","name":"Test-Time Compute","definition":"A key concept in language model optimization covered in CS336 Lecture 16 (Post-Training: RL with Verifiable Rewards). This concept relates to the practical implementation and optimization of large language models, connecting theoretical understanding to engineering practice.","tags":["inference","reasoning","scaling","optimization"],"nodeType":"concept","sourceCount":2,"sources":[{"course":"cs294-agentic-f25","lecture":"01"},{"course":"cs336","lecture":"16"}]},{"id":"mid-training","name":"Mid-training","definition":"A key concept in language model training covered in CS336 Lecture 15 (Mid/Post-Training: SFT and RLHF). This concept relates to the practical implementation and optimization of large language models, connecting theoretical understanding to engineering practice.","tags":["training","data-curation","theory"],"nodeType":"concept","sourceCount":3,"sources":[{"course":"cs294-agentic-f25","lecture":"01"},{"course":"cs336","lecture":"15"},{"course":"llm-agents-sp25","lecture":"04"}]},{"id":"reward-model","name":"Reward Model","definition":"A key concept in language model training covered in CS336 Lecture 15 (Mid/Post-Training: SFT and RLHF). This concept relates to the practical implementation and optimization of large language models, connecting theoretical understanding to engineering practice.","tags":["training","evaluation","alignment"],"nodeType":"concept","sourceCount":2,"sources":[{"course":"cs294-agentic-f25","lecture":"01"},{"course":"cs336","lecture":"15"}]},{"id":"neocloud","name":"Neocloud","definition":"Cloud providers specialized for AI workloads (CoreWeave, Lambda, Nebius) that focus on GPU aggregation and AI-centric compute rather than traditional web services like databases. Term coined by SemiAnalysis.","tags":["infrastructure","cloud","industry"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs294-agentic-f25","lecture":"02"}]},{"id":"ai-infrastructure-third-pillar","name":"AI Infrastructure Third Pillar","definition":"The concept that AI compute has become a distinct infrastructure category alongside web cloud (microservices) and data cloud (analytics/SQL), with fundamentally different compute-to-IO ratios and workload patterns requiring specialized orchestration.","tags":["infrastructure","architecture","industry"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs294-agentic-f25","lecture":"02"}]},{"id":"nvl72","name":"NVL72","definition":"NVIDIA's rack-level GPU integration system where multiple GPU servers share memory through high-bandwidth NVLink switches, enabling mainframe-like unified memory access across an entire rack. Eliminates need to manually partition models across machines.","tags":["hardware","infrastructure","gpu"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs294-agentic-f25","lecture":"02"}]},{"id":"mixture-of-experts","name":"Mixture of Experts","definition":"A neural network architecture that scales model capacity without proportional compute increase by splitting weight matrices into multiple \"experts\" with a learned router that activates only a subset per input. Expert parallelism places different experts on different GPUs. Load balancing is critical for both training stability and GPU utilization.","tags":["architecture","efficiency","optimization","distributed-training"],"nodeType":"concept","sourceCount":3,"sources":[{"course":"cs294-agentic-f25","lecture":"02"},{"course":"cs336","lecture":"04"},{"course":"mit-6s191","lecture":"09"}]},{"id":"rag","name":"RAG","definition":"Technique combining information retrieval with LLM generation, where relevant documents are retrieved and provided as context for the model. Despite being considered \"past peak\" in hype cycles, remains fundamental for accurate information.","tags":["architecture","retrieval","applications"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs294-agentic-f25","lecture":"02"}]},{"id":"prosumer-ai-applications","name":"Prosumer AI Applications","definition":"AI applications targeting users who embed AI into their daily professional work (coding, content creation, consulting), showing high willingness to pay ($20-50/month) compared to pure consumer entertainment use cases.","tags":["applications","business","industry"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs294-agentic-f25","lecture":"02"}]},{"id":"verifiable-agent","name":"Verifiable Agent","definition":"An agentic LLM trained to maximize verifiable correctness rewards (unit tests, math proofs, state comparisons) in addition to human preference, enabling reliable task completion in environments where wrong answers have concrete consequences.","tags":["agents","training","verification"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs294-agentic-f25","lecture":"03"}]},{"id":"environment-tool-verifier-triad","name":"Environment-Tool-Verifier Triad","definition":"The three essential components of agentic training data: environments (state descriptions like code repos), tools (APIs the agent can invoke), and verifiers (correctness checkers for agent outputs). Coverage across all three is critical.","tags":["training","data","agents"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs294-agentic-f25","lecture":"03"}]},{"id":"entropy-collapse","name":"Entropy Collapse","definition":"A failure mode in RL training where the model's token generation probability distribution becomes increasingly peaked, destroying diversity of outputs. The model converges to producing a single answer per prompt, preventing further learning.","tags":["training","failure-mode","RL"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs294-agentic-f25","lecture":"03"}]},{"id":"grpo","name":"GRPO","definition":"A key concept in language model training covered in CS336 Lecture 16 (Post-Training: RL with Verifiable Rewards). This concept relates to the practical implementation and optimization of large language models, connecting theoretical understanding to engineering practice.","tags":["algorithm","RL","training"],"nodeType":"concept","sourceCount":2,"sources":[{"course":"cs294-agentic-f25","lecture":"03"},{"course":"cs336","lecture":"16"}]},{"id":"on-policy-vs-off-policy-rl","name":"On-Policy vs Off-Policy RL","definition":"On-policy: train on trajectories generated by the current model version. Off-policy: train on trajectories from other models or older versions. On-policy produces better results because feedback is most useful when given on the learner's own mistakes.","tags":["RL","training","algorithm"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs294-agentic-f25","lecture":"03"}]},{"id":"dapo","name":"DAPO","definition":"A GRPO variant that decouples the upper and lower clipping thresholds in the likelihood ratio, making the upper threshold larger to encourage the model to increase probability of rare but correct tokens, promoting exploration.","tags":["algorithm","RL","training"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs294-agentic-f25","lecture":"03"}]},{"id":"benchmark-separability","name":"Benchmark Separability","definition":"The property of a benchmark where stronger models consistently outperform weaker models. If weak and strong models produce similar scores, the benchmark has lost credibility and should be abandoned.","tags":["evaluation","benchmarks"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs294-agentic-f25","lecture":"03"}]},{"id":"task-validity","name":"Task Validity","definition":"The property that successful completion of a benchmark task actually reflects the target capability being measured. Ensures that what you test is what you intend to evaluate.","tags":["evaluation","benchmarks","methodology"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs294-agentic-f25","lecture":"04"}]},{"id":"outcome-validity","name":"Outcome Validity","definition":"The property that evaluation metrics faithfully capture whether the agent actually succeeded at the task. Includes considerations like semantic equivalence, negation handling, and robustness to adversarial outputs.","tags":["evaluation","benchmarks","methodology"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"cs294-agentic-f25","lecture":"04"}]},{"id":"green-agent","name":"Green Agen
