ip design takes 3 years from ideation to production; AI-assisted design is the only feasible way to compress this cycle and keep pace with model advancement.","tags":["architecture","compute","infrastructure"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mse435","lecture":"05"}]},{"id":"prefill-latency-dominance","name":"Prefill Latency Dominance","definition":"The 400-500ms delay before the first output token is generated, caused by computing the full input context (potentially 400K tokens) through the attention mechanism. This \"prefill\" phase dominates total latency, making network proximity (edge compute) irrelevant for now. When Cerebras accelerated token generation, it exposed all other system latencies, forcing end-to-end API optimization.","tags":["architecture","compute","optimization"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mse435","lecture":"05"}]},{"id":"inference-lifecycle-expansion","name":"Inference Lifecycle Expansion","definition":"The insight that inference compute is not just for serving products to end users — it also powers RL post-training, synthetic data generation, and model evaluation. This means 80%+ of total compute will be inference, fundamentally changing the training-vs-inference framing.","tags":["compute","architecture","economics"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mse435","lecture":"05"}]},{"id":"memory-architecture-evolution","name":"Memory Architecture Evolution","definition":"The prediction that AI compute systems will evolve from simple compute-unit-plus-HBM configurations to multi-layer memory hierarchies similar to CPU evolution (L1/L2/L3 cache, flash, storage), enabling more efficient handling of variable context lengths and workload characteristics.","tags":["architecture","compute","infrastructure"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mse435","lecture":"05"}]},{"id":"post-training-scaling","name":"Post-Training Scaling","definition":"The emerging paradigm of investing significantly more compute in post-training (RL, preference tuning) relative to pre-training. DeepSeek R1 used ~5% of V3 pre-training compute for RL, but this ratio is rapidly increasing as labs run data-center-wide RL runs. One of Jensen's \"three scaling laws\" alongside pre-training and test-time scaling.","tags":["training","compute","economics"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mse435","lecture":"06"}]},{"id":"emergent-chain-of-thought","name":"Emergent Chain-of-Thought","definition":"The discovery that model reasoning (thinking step-by-step, self-correcting, exploring multiple approaches) emerges spontaneously from RL training in constrained environments without being explicitly taught. Chain-of-thought was not designed or programmed; it appeared as models were optimized against verifiable rewards.","tags":["theory","training","architecture"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mse435","lecture":"06"}]},{"id":"code-as-agi-complete-domain","name":"Code as AGI-Complete Domain","definition":"The thesis held by many AI researchers that coding models represent general intelligence because every task can ultimately be reduced to writing and executing code. This explains why Claude and other models increasingly write code to accomplish non-coding tasks (slide generation, data analysis) rather than using specialized tool calls.","tags":["theory","application","training"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mse435","lecture":"06"}]},{"id":"enterprise-model-specialization","name":"Enterprise Model Specialization","definition":"The practice of taking frontier foundation models and training specialized versions optimized for specific enterprise tasks using proprietary data and enterprise-specific evaluations. General models set the floor; specialized models set the ceiling for competitive differentiation. Examples: DoorDash menu extraction, Cognition/Windsurf bug detection, Ramp spreadsheet search.","tags":["application","enterprise","training"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mse435","lecture":"06"}]},{"id":"continual-learning","name":"Continual Learning","definition":"The emerging capability for AI models to learn from production interactions with sparse, implicit reward signals — such as whether a user accepted or reverted a code suggestion. Represented by Cursor's composer model (online training from user behavior) and Applied Compute's context basing (offline agents extracting learnings from traces). The \"holy grail\" and next major bottleneck in AI development.","tags":["training","application","theory"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mse435","lecture":"06"}]},{"id":"pareto-frontier-optimization","name":"Pareto Frontier Optimization","definition":"The practice of training small, specialized models that match large frontier model performance on specific tasks at a fraction of the cost and latency. By aggressively post-training a small model on a narrow domain, enterprises can achieve the performance benefits of large models with the economics of small ones.","tags":["optimization","economics","application"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mse435","lecture":"06"}]},{"id":"eval-driven-development","name":"Eval-Driven Development","definition":"The practice at AI labs where evaluation benchmarks define the training roadmap — you first define the hill to climb (the eval), then use RL as an \"eval-maxing machine\" to climb it. Evals are the most guarded asset at labs. SWE-bench sparked the coding model race. Enterprise evals differ from lab evals and define the specialization opportunity.","tags":["training","application"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mse435","lecture":"06"}]},{"id":"pre-training-data-wall","name":"Pre-Training Data Wall","definition":"The challenge that pre-training models have consumed nearly all available internet-scale data. Labs are resorting to buying old libraries to scan books, investing in synthetic data generation, and developing architectural advances to extract more learning from existing data. This data wall is a primary driver of the shift toward post-training scaling.","tags":["training","data","economics"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mse435","lecture":"06"}]},{"id":"synthetic-data-flywheel","name":"Synthetic Data Flywheel","definition":"The use of AI models to generate training data for the next generation of models, exploiting the generator-verifier gap (e.g., generating code problems and verifying solutions via unit tests). As models improve, synthetic data quality improves, creating a flywheel. This is increasingly replacing human data labeling for RL training.","tags":["training","data","optimization"],"nodeType":"concept","sourceCount":1,"sources":[{"course":"mse435","lecture":"06"}]},{"id":"chain-of-thought-prompting-elicits-reasoning-in-large-language-models","name":"Chain-of-Thought Prompting Elicits Reasoning in Large Language Models","definition":"Chain-of-Thought Prompting Elicits Reasoning in Large Language Models (2022, NeurIPS 2022). Seminal paper in agents.","tags":["paper","prompting","reasoning","chain-of-thought","in-context-learning","agents"],"nodeType":"paper","sourceCount":1,"sources":[{"course":"papers","lecture":"agents"}]},{"id":"retrieval-augmented-generation-for-knowledge-intensive-nlp-tasks","name":"Retrieval-Augmented Generation for Knowledge-Intensive NLP Tasks","definition":"Retrieval-Augmented Generation for Knowledge-Intensive NLP Tasks (2020, NeurIPS 2020). Seminal paper in agents.","tags":["paper","retrieval","generation","knowledge","nlp","agents"],"nodeType":"paper","sourceCount":1,"sources":[{"course":"papers","lecture":"agents"}]},{"id":"react-synergizing-reasoning-and-acting-in-language-models","name":"ReAct: Synergizing Reasoning and Acting in Language Models","definition":"ReAct: S caling"},{"source":"the-bitter-lesson","target":"training-vs-inference-split","type":"related_to","note":"shared tags: compute"},{"source":"the-bitter-lesson","target":"asic-competition","type":"related_to","note":"shared tags: compute"},{"source":"the-bitter-lesson","target":"nvlink-fusion","type":"related_to","note":"shared tags: compute"},{"source":"the-bitter-lesson","target":"deterministic-chip-architecture","type":"related_to","note":"shared tags: compute"},{"source":"the-bitter-lesson","target":"prefill-decode-disaggregation","type":"related_to","note":"shared tags: compute"},{"source":"the-bitter-lesson","target":"inference-cost-deflation","type":"related_to","note":"shared tags: compute"},{"source":"the-bitter-lesson","target":"agent-token-multiplier","type":"related_to","note":"shared tags: compute"},{"source":"the-bitter-lesson","target":"electrons-to-tokens","type":"related_to","note":"shared tags: compute"},{"source":"the-bitter-lesson","target":"gpu-spot-price-dynamics","type":"related_to","note":"shared tags: compute"},{"source":"the-bitter-lesson","target":"coherent-cluster-architecture","type":"related_to","note":"shared tags: compute"},{"source":"the-bitter-lesson","target":"open-source-convergence","type":"related_to","note":"shared tags: compute"},{"source":"the-bitter-lesson","target":"agentic-compute-dag","type":"related_to","note":"shared tags: compute"},{"source":"the-bitter-lesson","target":"heterogeneous-compute","type":"related_to","note":"shared tags: compute"},{"source":"the-bitter-lesson","target":"recursive-chip-design","type":"related_to","note":"shared tags: compute"},{"source":"the-bitter-lesson","target":"prefill-latency-dominance","type":"related_to","note":"shared tags: compute"},{"source":"the-bitter-lesson","target":"inference-lifecycle-expansion","type":"related_to","note":"shared tags: compute"},{"source":"the-bitter-lesson","target":"memory-architecture-evolution","type":"related_to","note":"shared tags: compute"},{"source":"the-bitter-lesson","target":"post-training-scaling","type":"related_to","note":"shared tags: compute"}]};

    const tagColors = {};
    const colorScale = d3.scaleOrdinal(d3.schemeTableau10);

    function getTagColor(tags) {
      const tag = tags[0] || 'other';
      if (!tagColors[tag]) tagColors[tag] = colorScale(Object.keys(tagColors).length);
      return tagColors[tag];
    }

    const width = document.getElementById('graph').clientWidth;
    const height = window.innerHeight;

    const svg = d3.select('#graph').append('svg')
      .attr('width', width).attr('height', height);

    const g = svg.append('g');

    // Zoom
    svg.call(d3.zoom().scaleExtent([0.1, 4]).on('zoom', (e) => g.attr('transform', e.transform)));

    const simulation = d3.forceSimulation(data.nodes)
      .force('link', d3.forceLink(data.edges).id(d => d.id).distance(120))
      .force('charge', d3.forceManyBody().strength(-300))
      .force('center', d3.forceCenter(width / 2, height / 2))
      .force('collision', d3.forceCollide().radius(d => Math.sqrt(d.sourceCount) * 8 + 20));

    const link = g.append('g').selectAll('line')
      .data(data.edges).enter().append('line')
      .attr('class', 'link').attr('stroke-width', 1);

    const node = g.append('g').selectAll('.node')
      .data(data.nodes).enter().append('g')
      .attr('class', 'node')
      .call(d3.drag().on('start', dragstarted).on('drag', dragged).on('end', dragended));

    // Concepts: circles; Papers: diamonds (rotated squares)
    node.each(function(d) {
      const el = d3.select(this);
      const size = Math.sqrt(d.sourceCount) * 5 + 6;
      const color = getTagColor(d.tags);
      if (d.nodeType === 'paper') {
        el.append('rect')
          .attr('width', size * 1.6).attr('height', size * 1.6)
          .attr('x', -size * 0.8).attr('y', -size * 0.8)
          .attr('rx', 3)
          .attr('transform', 'rotate(45)')
          .attr('fill', color)
          .attr('stroke', d3.color(color).darker(0.5))
          .attr('stroke-width', 2)
          .style('cursor', 'pointer');
      } else {
        el.append('circle')
          .attr('r', size)
          .attr('fill', color)
          .attr('stroke', d3.color(color).darker(0.5))
          .attr('stroke-width', 2)
          .style('cursor', 'pointer');
      }
    });

    node.append('text').text(d => d.name)
      .attr('dx', d => Math.sqrt(d.sourceCount) * 5 + 10).attr('dy', 4);

    node.on('click', (event, d) => showSidebar(d));

    simulation.on('tick', () => {
      link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
      node.attr('transform', d => `translate(${d.x},${d.y})`);
    });

    function dragstarted(e) { if (!e.active) simulation.alphaTarget(0.3).restart(); e.subject.fx = e.subject.x; e.subject.fy = e.subject.y; }
    function dragged(e) { e.subject.fx = e.x; e.subject.fy = e.y; }
    function dragended(e) { if (!e.active) simulation.alphaTarget(0); e.subject.fx = null; e.subject.fy = null; }

    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    function showSidebar(d) {
      document.getElementById('sidebar').classList.add('visible');
      document.getElementById('concept-name').textContent = d.name;
      document.getElementById('concept-def').textContent = d.definition;
      document.getElementById('concept-tags').innerHTML = d.tags.map(t => '<span class="tag">' + esc(t) + '</span>').join('');
      document.getElementById('concept-sources').innerHTML = d.sources.map(s => '<div class="source">' + esc(s.course) + ' / Lecture ' + esc(s.lecture) + '</div>').join('');

      const relEdges = data.edges.filter(e => (e.source.id || e.source) === d.id || (e.target.id || e.target) === d.id);
      document.getElementById('concept-relations').innerHTML = relEdges.map(e => {
        const other = (e.source.id || e.source) === d.id ? (e.target.name || e.target) : (e.source.name || e.source);
        return '<div class="relation">' + esc(other) + ' <span class="type">(' + esc(e.type.replace(/_/g, ' ')) + ')</span></div>';
      }).join('');

      // Highlight connected nodes
      const connected = new Set([d.id]);
      relEdges.forEach(e => { connected.add(e.source.id || e.source); connected.add(e.target.id || e.target); });
      node.classed('highlighted', n => n.id === d.id).classed('dimmed', n => !connected.has(n.id));
      link.classed('dimmed', l => !connected.has(l.source.id || l.source) || !connected.has(l.target.id || l.target));
    }

    document.getElementById('close-btn').onclick = () => {
      document.getElementById('sidebar').classList.remove('visible');
      node.classed('highlighted', false).classed('dimmed', false);
      link.classed('dimmed', false);
    };

    document.getElementById('search').addEventListener('input', (e) => {
      const q = e.target.value.toLowerCase();
      if (!q) { node.classed('dimmed', false); link.classed('dimmed', false); return; }
      const matching = new Set();
      data.nodes.forEach(n => { if (n.name.toLowerCase().includes(q) || n.tags.some(t => t.includes(q))) matching.add(n.id); });
      node.classed('dimmed', n => !matching.has(n.id));
      link.classed('dimmed', l => !matching.has(l.source.id || l.source) && !matching.has(l.target.id || l.target));
    });
  </script>
