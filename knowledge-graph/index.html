<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knowledge Graph — Learning AI</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; overflow: hidden; }
    #app { display: flex; height: 100vh; }
    #graph { flex: 1; }
    #sidebar { width: 350px; background: #161b22; border-left: 1px solid #30363d; padding: 20px; overflow-y: auto; display: none; }
    #sidebar.visible { display: block; }
    #sidebar h2 { color: #f0f6fc; margin-bottom: 8px; font-size: 18px; }
    #sidebar p { color: #8b949e; margin-bottom: 12px; line-height: 1.5; }
    #sidebar .tag { display: inline-block; background: #21262d; border: 1px solid #30363d; border-radius: 12px; padding: 2px 10px; margin: 2px; font-size: 12px; color: #58a6ff; }
    #sidebar .source { padding: 6px 0; border-bottom: 1px solid #21262d; font-size: 13px; }
    #sidebar .relation { padding: 4px 0; font-size: 13px; }
    #sidebar .relation .type { color: #8b949e; }
    #controls { position: fixed; top: 16px; left: 16px; z-index: 10; }
    #controls input { background: #21262d; border: 1px solid #30363d; border-radius: 6px; padding: 8px 12px; color: #c9d1d9; width: 250px; font-size: 14px; }
    #controls input:focus { outline: none; border-color: #58a6ff; }
    .node circle { cursor: pointer; stroke-width: 2; }
    .node text { fill: #c9d1d9; font-size: 11px; pointer-events: none; }
    .link { stroke: #30363d; stroke-opacity: 0.6; }
    .node.highlighted circle { stroke: #f0f6fc !important; stroke-width: 3; }
    .node.dimmed { opacity: 0.15; }
    .link.dimmed { opacity: 0.05; }
    h3 { color: #c9d1d9; margin: 16px 0 8px; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; }
    #close-btn { position: absolute; top: 16px; right: 16px; background: none; border: none; color: #8b949e; cursor: pointer; font-size: 20px; }
  </style>
</head>
<body>
  <div id="app">
    <div id="graph">
      <div id="controls">
        <input type="text" id="search" placeholder="Search concepts..." autocomplete="off">
      </div>
    </div>
    <div id="sidebar">
      <button id="close-btn">&times;</button>
      <h2 id="concept-name"></h2>
      <p id="concept-def"></p>
      <div id="concept-tags"></div>
      <h3>Sources</h3>
      <div id="concept-sources"></div>
      <h3>Related Concepts</h3>
      <div id="concept-relations"></div>
    </div>
  </div>
  <script>
    const data = {"nodes":[{"id":"resilience","name":"Resilience","definition":"The ability of individuals and organizations to adapt to and recover from unexpected challenges, crises, or 'punches in the face,' emerging stronger from adversity.","tags":["theory","safety","infrastructure"],"sourceCount":1,"sources":[{"course":"cs153","lecture":"01"}]},{"id":"transparency-in-crisis-management","name":"Transparency in Crisis Management","definition":"The practice of open and honest communication, especially during security incidents and outages, which builds trust with customers and the public and can mitigate negative perception.","tags":["application","safety","infrastructure","data"],"sourceCount":1,"sources":[{"course":"cs153","lecture":"01"}]},{"id":"cybersecurity-landscape-evolution","name":"Cybersecurity Landscape Evolution","definition":"The ongoing and rapid transformation of cybersecurity threats and challenges, shifting from primarily focusing on data exfiltration to also include ransomware, operational disruption, and risks posed by emerging AI technologies.","tags":["theory","safety","infrastructure","data"],"sourceCount":1,"sources":[{"course":"cs153","lecture":"01"}]},{"id":"ransomware","name":"Ransomware","definition":"A type of malicious cyberattack that encrypts a victim's data or locks them out of their systems, demanding a ransom payment for restoration of access, often leading to significant operational disruption and economic damage.","tags":["safety","application","data","infrastructure"],"sourceCount":1,"sources":[{"course":"cs153","lecture":"01"}]},{"id":"responsible-disclosure-policies","name":"Responsible Disclosure Policies","definition":"A set of guidelines published by companies that encourages security researchers to privately report vulnerabilities they find, promising not to pursue legal action if guidelines are followed, thereby fostering collaboration with the hacker community.","tags":["safety","application","data","infrastructure"],"sourceCount":1,"sources":[{"course":"cs153","lecture":"01"}]},{"id":"bug-bounty-programs","name":"Bug Bounty Programs","definition":"Programs that offer financial rewards to security researchers for discovering and reporting vulnerabilities or 'bugs' in a company's systems, incentivizing external collaboration to enhance security.","tags":["safety","optimization","data","infrastructure"],"sourceCount":1,"sources":[{"course":"cs153","lecture":"01"}]},{"id":"cybersecurity-leadership","name":"Cybersecurity Leadership","definition":"The role of security executives (like CISOs) in guiding an organization's security posture, which includes not only managing technical security teams but also educating other executives, preparing for crises, and building trust across the company.","tags":["training","architecture","safety","infrastructure"],"sourceCount":1,"sources":[{"course":"cs153","lecture":"01"}]},{"id":"government-technology-interaction","name":"Government-Technology Interaction","definition":"The complex and often evolving relationship between government entities (e.g., law enforcement, regulators) and technology companies, concerning issues such as cybercrime prosecution, data privacy, national security, and technology regulation.","tags":["application","theory","safety","infrastructure"],"sourceCount":1,"sources":[{"course":"cs153","lecture":"01"}]},{"id":"ai-in-cybersecurity","name":"AI in Cybersecurity","definition":"The application and implications of Artificial Intelligence and advanced models (like LLMs) for both enhancing cybersecurity defenses and creating new attack vectors, posing urgent challenges for government and industry in managing their release and impact.","tags":["architecture","application","safety","optimization","data","infrastructure"],"sourceCount":1,"sources":[{"course":"cs153","lecture":"01"}]},{"id":"operational-resilience","name":"Operational Resilience","definition":"The ability of an organization to withstand and quickly recover from disruptive events, such as cyberattacks (e.g., ransomware), ensuring the continuity of critical business functions, which has become a primary cybersecurity concern beyond just data theft.","tags":["architecture","safety","infrastructure"],"sourceCount":1,"sources":[{"course":"cs153","lecture":"01"}]},{"id":"computer-hacking-and-fraud-act-cfaa","name":"Computer Hacking and Fraud Act (CFAA)","definition":"A U.S. federal law (18 U.S. Code § 1030) that prohibits unauthorized access to protected computers, creating legal complexities and ambiguities regarding what constitutes 'authorization' for security researchers and bug bounty participants.","tags":["theory","safety","legal"],"sourceCount":1,"sources":[{"course":"cs153","lecture":"01"}]},{"id":"value-per-gigawatt","name":"Value per Gigawatt","definition":"The critical metric for infrastructure success, focusing on the actual utility, capability, or revenue generated for users per unit of compute capacity or cost, rather than just raw gigawatts deployed.","tags":["application","optimization","infrastructure"],"sourceCount":1,"sources":[{"course":"cs153","lecture":"02"}]},{"id":"extreme-reliability-for-ai-workloads","name":"Extreme Reliability (for AI Workloads)","definition":"The paramount importance of robust systems that minimize failures and enable rapid recovery, especially for large-scale synchronous AI computations where a single node failure can halt the entire process.","tags":["architecture","optimization","infrastructure","training","hardware"],"sourceCount":1,"sources":[{"course":"cs153","lecture":"02"}]},{"id":"system-balance-amdahls-law-at-scale","name":"System Balance (Amdahl's Law at Scale)","definition":"The critical need to balance all components of a large-scale compute system (flops, HBM, SRAM, network bandwidth, storage, CPU) according to application needs, to avoid bottlenecks and wasted investment, extending Amdahl's Law to modern distributed AI infrastructure.","tags":["architecture","hardware","optimization","infrastructure","theory"],"sourceCount":1,"sources":[{"course":"cs153","lecture":"02"}]},{"id":"ai-workload-reliability-shift","name":"AI Workload Reliability Shift","definition":"A recent phenomenon where modern AI training workloads prioritize raw compute capacity and throughput over traditional \"five-nines\" (99.999%) availability, accepting more downtime in exchange for significantly increased access to compute.","tags":["training","application","infrastructure","optimization"],"sourceCount":1,"sources":[{"course":"cs153","lecture":"02"}]},{"id":"energy-abundance-and-affordability","name":"Energy Abundance and Affordability","definition":"The biggest long-term bottleneck for scaling AI infrastructure, characterized by long lead times (years) for procuring large-scale, affordable, and sustainable energy for data centers, requiring complex community-level solutions.","tags":["infrastructure","hardware","data","optimization"],"sourceCount":1,"sources":[{"course":"cs153","lecture":"02"}]},{"id":"optical-circuit-switching-ocs","name":"Optical Circuit Switching (OCS)","definition":"A networking technology utilized by Google to provide programmable network topology in data centers, enabling rapid reconfiguration (e.g., in seconds) to maintain network coherence, recover from failures, and create direct high-bandwidth connections for specific jobs without human intervention.","tags":["architecture","hardware","infrastructure","optimization"],"sourceCount":1,"sources":[{"course":"cs153","lecture":"02"}]},{"id":"hardware-specialization-tpus","name":"Hardware Specialization (TPUs)","definition":"The strategic development of specialized hardware (e.g., Google's TPU-i for inference and TPU-t for training) to achieve significant performance and efficiency gains for specific, large workloads, as general-purpose CPUs have slowed their improvement rate.","tags":["hardware","architecture","optimization","training","application"],"sourceCount":1,"sources":[{"course":"cs153","lecture":"02"}]},{"id":"infrastructure-planning-under-uncertainty","name":"Infrastructure Planning Under Uncertainty","definition":"The complex challenge of forecasting and provisioning compute capacity (e.g., gigawatts of power, chips, buildings) years in advance due to long lead times, leading to risks of under- or over-prediction and requiring dynamic, daily replanning based on new information and changing demands.","tags":["infrastructure","data","optimization"],"sourceCount":1,"sources":[{"course":"cs153","lecture":"02"}]},{"id":"demand-response-data-centers","name":"Demand Response (Data Centers)","definition":"A practice where data centers act as assets to the power grid by agreeing to temporarily reduce their power consumption during peak demand (e.g., extreme weather), allowing utilities to provision less capacity overall and ensuring homes have necessary power.","tags":["infrastructure","optimization","safety","application"],"sourceCount":1,"sources":[{"course":"cs153","lecture":"02"}]},{"id":"goodput","name":"Goodput","definition":"A measure of the useful output or effective utilization of a system, focusing on the work that directly contributes to value rather than just raw throughput or capacity that might be idle or wasted due to inefficiencies.","tags":["optimization","application","infrastructure"],"sourceCount":1,"sources":[{"course":"cs153","lecture":"02"}]},{"id":"torus-topology","name":"Torus Topology","definition":"A specific network topology, often three-dimensional, used for ML training clusters where nodes are connected in a grid-like fashion with wrap-around connections, particularly efficient for all-reduce collective operations.","tags":["architecture","network","training"],"sourceCount":1,"sources":[{"course":"cs153","lecture":"02"}]},{"id":"the-bitter-lesson-ai-scaling","name":"The Bitter Lesson (AI Scaling)","definition":"Rich Sutton's observation that, historically in AI, simply throwing more compute at problems, combined with general-purpose methods, has consistently yielded better results than sophisticated, human-engineered solutions, leading to a continuous demand for more computational power.","tags":["theory","training","application"],"sourceCount":1,"sources":[{"course":"cs153","lecture":"02"}]},{"id":"pue-power-usage-effectiveness","name":"PUE (Power Usage Effectiveness)","definition":"A metric used to measure the energy efficiency of a data center, calculated as the ratio of total facility power to IT equipment power. A lower PUE indicates greater energy efficiency.","tags":["infrastructure","optimization"],"sourceCount":1,"sources":[{"course":"cs153","lecture":"02"}]},{"id":"societal-responsibility-in-ai-infrastructure","name":"Societal Responsibility in AI Infrastructure","definition":"The obligation of technologists and infrastructure builders to ensure that the deployment of AI infrastructure provides uplift to local communities and the environment, considering factors like noise, water usage, power grid impact, job creation, and the ethical implications of AI's societal transformation.","tags":["safety","application","infrastructure"],"sourceCount":1,"sources":[{"course":"cs153","lecture":"02"}]},{"id":"amdahls-law","name":"Amdahl's Law","definition":"A fundamental principle stating that the speedup of a program due to parallelization is limited by the sequential portion of the program. It emphasizes the importance of balancing computational power with the ability to feed it data (IO) to achieve maximum performance.","tags":["theory","architecture"],"sourceCount":1,"sources":[{"course":"cs153","lecture":"02"}]}],"edges":[{"source":"resilience","target":"cybersecurity-leadership","type":"part_of","note":"Resilience is a core trait for effective cybersecurity leadership."},{"source":"resilience","target":"transparency-in-crisis-management","type":"prerequisite_for","note":"Strong resilience helps leaders navigate crises that require transparency."},{"source":"transparency-in-crisis-management","target":"cybersecurity-leadership","type":"enables","note":"Effective cybersecurity leaders promote and facilitate transparency during crises."},{"source":"cybersecurity-landscape-evolution","target":"ransomware","type":"related_to","note":"Ransomware represents a significant driver of this evolution in threats."},{"source":"cybersecurity-landscape-evolution","target":"ai-in-cybersecurity","type":"related_to","note":"AI introduces new complexities and urgencies for cybersecurity."},{"source":"cybersecurity-landscape-evolution","target":"operational-resilience","type":"related_to","note":"Evolving threats necessitate a focus on operational resilience."},{"source":"ransomware","target":"operational-resilience","type":"enables","note":"Ransomware attacks highlight the critical need for operational resilience."},{"source":"ransomware","target":"government-technology-interaction","type":"related_to","note":"Governments are increasingly involved in combating ransomware gangs."},{"source":"responsible-disclosure-policies","target":"bug-bounty-programs","type":"enables","note":"Responsible disclosure often serves as a foundational step for implementing bug bounty programs."},{"source":"responsible-disclosure-policies","target":"computer-hacking-and-fraud-act-cfaa","type":"contrasts_with","note":"These policies aim to provide protection against potential CFAA violations for security researchers."},{"source":"bug-bounty-programs","target":"responsible-disclosure-policies","type":"part_of","note":"Bug bounty programs are an advanced form of responsible disclosure, adding financial incentives."},{"source":"bug-bounty-programs","target":"computer-hacking-and-fraud-act-cfaa","type":"related_to","note":"These programs operate in a legal grey area regarding 'authorized access' under CFAA for external researchers."},{"source":"government-technology-interaction","target":"ai-in-cybersecurity","type":"related_to","note":"Governments are highly concerned with AI's impact and potential regulation in cybersecurity."},{"source":"government-technology-interaction","target":"computer-hacking-and-fraud-act-cfaa","type":"related_to","note":"Governments utilize laws like the CFAA for cybercrime prosecution and enforcement."},{"source":"ai-in-cybersecurity","target":"cybersecurity-landscape-evolution","type":"part_of","note":"AI represents a cutting edge of new threats and opportunities in the evolving cybersecurity landscape."},{"source":"ai-in-cybersecurity","target":"government-technology-interaction","type":"related_to","note":"The rapid advancement of AI is driving increased government interest and potential regulation."},{"source":"operational-resilience","target":"ransomware","type":"enables","note":"Ransomware attacks are a major driver for focusing on operational resilience."},{"source":"computer-hacking-and-fraud-act-cfaa","target":"bug-bounty-programs","type":"contrasts_with","note":"The CFAA creates legal uncertainty for researchers participating in bug bounty programs due to its 'unauthorized access' clause."},{"source":"computer-hacking-and-fraud-act-cfaa","target":"government-technology-interaction","type":"related_to","note":"The CFAA is a key statute used by the government for prosecuting cybercrime."},{"source":"value-per-gigawatt","target":"extreme-reliability-for-ai-workloads","type":"prerequisite_for","note":"Higher reliability directly contributes to higher value per gigawatt by ensuring compute is actually usable."},{"source":"value-per-gigawatt","target":"system-balance-amdahls-law-at-scale","type":"prerequisite_for","note":"A balanced system prevents wasted compute, increasing value extraction from deployed capacity."},{"source":"value-per-gigawatt","target":"goodput","type":"related_to","note":"Goodput is a measure that contributes to achieving higher value per gigawatt."},{"source":"value-per-gigawatt","target":"energy-abundance-and-affordability","type":"related_to","note":"Affordability of energy impacts the cost component of value per dollar."},{"source":"extreme-reliability-for-ai-workloads","target":"ai-workload-reliability-shift","type":"contrasts_with","note":"While AI training often accepts *more downtime* for *more capacity*, it still demands *extreme reliability* at the individual node level because single failures are catastrophic for synchronous jobs."},{"source":"extreme-reliability-for-ai-workloads","target":"optical-circuit-switching-ocs","type":"enables","note":"OCS contributes to extreme reliability by allowing rapid, programmatic recovery from rack failures."},{"source":"extreme-reliability-for-ai-workloads","target":"value-per-gigawatt","type":"part_of","note":"Essential for extracting maximum value from deployed compute capacity."},{"source":"extreme-reliability-for-ai-workloads","target":"operational-resilience","type":"related_to","note":"Concept of ensuring continuous operation despite failures."},{"source":"system-balance-amdahls-law-at-scale","target":"amdahls-law","type":"related_to","note":"This concept is an extension of Amdahl's Law to modern, large-scale distributed systems."},{"source":"system-balance-amdahls-law-at-scale","target":"value-per-gigawatt","type":"prerequisite_for","note":"Achieves higher value per gigawatt by ensuring efficient use of all resources."},{"source":"system-balance-amdahls-law-at-scale","target":"goodput","type":"enables","note":"System balance directly improves goodput by eliminating resource starvation."},{"source":"system-balance-amdahls-law-at-scale","target":"hardware-specialization-tpus","type":"related_to","note":"Specialization often involves designing chips with specific balance points for particular workloads (e.g., AI/AT)."},{"source":"ai-workload-reliability-shift","target":"extreme-reliability-for-ai-workloads","type":"contrasts_with","note":"While AI training accepts more downtime overall, it still requires extreme reliability *within* a synchronous job."},{"source":"ai-workload-reliability-shift","target":"demand-response-data-centers","type":"enables","note":"The willingness to accept downtime allows data centers to participate in demand response programs."},{"source":"ai-workload-reliability-shift","target":"operational-resilience","type":"related_to","note":"Changes the definition and priorities of operational resilience for specific AI workloads."},{"source":"energy-abundance-and-affordability","target":"value-per-gigawatt","type":"related_to","note":"Directly impacts the \"per dollar\" aspect of value, as energy is a significant cost."},{"source":"energy-abundance-and-affordability","target":"infrastructure-planning-under-uncertainty","type":"related_to","note":"The long lead times for energy procurement exacerbate planning challenges."},{"source":"energy-abundance-and-affordability","target":"demand-response-data-centers","type":"enables","note":"Solutions like demand response help optimize existing energy resources and integrate with the grid."},{"source":"energy-abundance-and-affordability","target":"pue-power-usage-effectiveness","type":"related_to","note":"PUE is a metric for energy efficiency, which is crucial given energy scarcity."},{"source":"optical-circuit-switching-ocs","target":"extreme-reliability-for-ai-workloads","type":"enables","note":"OCS allows for rapid recovery of network topology after failures, enhancing reliability for synchronous workloads."},{"source":"optical-circuit-switching-ocs","target":"torus-topology","type":"related_to","note":"OCS is used to maintain and reconfigure a torus topology for ML training."},{"source":"hardware-specialization-tpus","target":"system-balance-amdahls-law-at-scale","type":"related_to","note":"Specialization involves designing chips with specific memory-to-compute-to-networking ratios tailored for particular applications."},{"source":"hardware-specialization-tpus","target":"value-per-gigawatt","type":"enables","note":"More efficient hardware increases the value extracted from compute capacity."},{"source":"infrastructure-planning-under-uncertainty","target":"energy-abundance-and-affordability","type":"related_to","note":"Long lead times for energy procurement are a major factor contributing to planning uncertainty."},{"source":"demand-response-data-centers","target":"ai-workload-reliability-shift","type":"prerequisite_for","note":"The willingness of AI training to accept downtime enables participation in demand response."},{"source":"demand-response-data-centers","target":"energy-abundance-and-affordability","type":"related_to","note":"Optimizes the use of existing energy resources, contributing to affordability and grid stability."},{"source":"demand-response-data-centers","target":"societal-responsibility-in-ai-infrastructure","type":"part_of","note":"An example of how data centers can be community assets."},{"source":"goodput","target":"value-per-gigawatt","type":"related_to","note":"Maximizing goodput is essential for achieving high value per gigawatt."},{"source":"goodput","target":"system-balance-amdahls-law-at-scale","type":"prerequisite_for","note":"A balanced system prevents bottlenecks that would reduce goodput."},{"source":"torus-topology","target":"optical-circuit-switching-ocs","type":"related_to","note":"OCS is used to maintain and reconfigure the torus topology for reliability."},{"source":"torus-topology","target":"extreme-reliability-for-ai-workloads","type":"related_to","note":"Maintaining the integrity of the torus topology is critical for synchronous ML training reliability."},{"source":"the-bitter-lesson-ai-scaling","target":"hardware-specialization-tpus","type":"related_to","note":"While the bitter lesson suggests general methods, specialization aims to make the 'throwing more compute' even more efficient."},{"source":"the-bitter-lesson-ai-scaling","target":"energy-abundance-and-affordability","type":"related_to","note":"The bitter lesson implies an ever-increasing demand for compute, exacerbating energy challenges."},{"source":"pue-power-usage-effectiveness","target":"energy-abundance-and-affordability","type":"related_to","note":"Improving PUE directly contributes to more affordable and sustainable energy use in data centers."},{"source":"pue-power-usage-effectiveness","target":"societal-responsibility-in-ai-infrastructure","type":"part_of","note":"Strategic decisions about PUE (e.g., balancing water usage with power efficiency) are part of responsible infrastructure development."},{"source":"societal-responsibility-in-ai-infrastructure","target":"energy-abundance-and-affordability","type":"related_to","note":"Addressing environmental impact of energy use is a key part of this responsibility."},{"source":"societal-responsibility-in-ai-infrastructure","target":"demand-response-data-centers","type":"part_of","note":"Demand response programs are an example of data centers acting as community assets."},{"source":"societal-responsibility-in-ai-infrastructure","target":"pue-power-usage-effectiveness","type":"related_to","note":"Decisions about PUE (e.g., water vs. power trade-offs) must align with community needs."},{"source":"amdahls-law","target":"system-balance-amdahls-law-at-scale","type":"related_to","note":"The concept of system balance discussed in the lecture is an extension of Amdahl's Law to large-scale distributed systems."}]};

    const tagColors = {};
    const colorScale = d3.scaleOrdinal(d3.schemeTableau10);

    function getTagColor(tags) {
      const tag = tags[0] || 'other';
      if (!tagColors[tag]) tagColors[tag] = colorScale(Object.keys(tagColors).length);
      return tagColors[tag];
    }

    const width = document.getElementById('graph').clientWidth;
    const height = window.innerHeight;

    const svg = d3.select('#graph').append('svg')
      .attr('width', width).attr('height', height);

    const g = svg.append('g');

    // Zoom
    svg.call(d3.zoom().scaleExtent([0.1, 4]).on('zoom', (e) => g.attr('transform', e.transform)));

    const simulation = d3.forceSimulation(data.nodes)
      .force('link', d3.forceLink(data.edges).id(d => d.id).distance(120))
      .force('charge', d3.forceManyBody().strength(-300))
      .force('center', d3.forceCenter(width / 2, height / 2))
      .force('collision', d3.forceCollide().radius(d => Math.sqrt(d.sourceCount) * 8 + 20));

    const link = g.append('g').selectAll('line')
      .data(data.edges).enter().append('line')
      .attr('class', 'link').attr('stroke-width', 1);

    const node = g.append('g').selectAll('.node')
      .data(data.nodes).enter().append('g')
      .attr('class', 'node')
      .call(d3.drag().on('start', dragstarted).on('drag', dragged).on('end', dragended));

    node.append('circle')
      .attr('r', d => Math.sqrt(d.sourceCount) * 5 + 6)
      .attr('fill', d => getTagColor(d.tags))
      .attr('stroke', d => d3.color(getTagColor(d.tags)).darker(0.5));

    node.append('text').text(d => d.name)
      .attr('dx', d => Math.sqrt(d.sourceCount) * 5 + 10).attr('dy', 4);

    node.on('click', (event, d) => showSidebar(d));

    simulation.on('tick', () => {
      link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
      node.attr('transform', d => `translate(${d.x},${d.y})`);
    });

    function dragstarted(e) { if (!e.active) simulation.alphaTarget(0.3).restart(); e.subject.fx = e.subject.x; e.subject.fy = e.subject.y; }
    function dragged(e) { e.subject.fx = e.x; e.subject.fy = e.y; }
    function dragended(e) { if (!e.active) simulation.alphaTarget(0); e.subject.fx = null; e.subject.fy = null; }

    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    function showSidebar(d) {
      document.getElementById('sidebar').classList.add('visible');
      document.getElementById('concept-name').textContent = d.name;
      document.getElementById('concept-def').textContent = d.definition;
      document.getElementById('concept-tags').innerHTML = d.tags.map(t => '<span class="tag">' + esc(t) + '</span>').join('');
      document.getElementById('concept-sources').innerHTML = d.sources.map(s => '<div class="source">' + esc(s.course) + ' / Lecture ' + esc(s.lecture) + '</div>').join('');

      const relEdges = data.edges.filter(e => (e.source.id || e.source) === d.id || (e.target.id || e.target) === d.id);
      document.getElementById('concept-relations').innerHTML = relEdges.map(e => {
        const other = (e.source.id || e.source) === d.id ? (e.target.name || e.target) : (e.source.name || e.source);
        return '<div class="relation">' + esc(other) + ' <span class="type">(' + esc(e.type.replace(/_/g, ' ')) + ')</span></div>';
      }).join('');

      // Highlight connected nodes
      const connected = new Set([d.id]);
      relEdges.forEach(e => { connected.add(e.source.id || e.source); connected.add(e.target.id || e.target); });
      node.classed('highlighted', n => n.id === d.id).classed('dimmed', n => !connected.has(n.id));
      link.classed('dimmed', l => !connected.has(l.source.id || l.source) || !connected.has(l.target.id || l.target));
    }

    document.getElementById('close-btn').onclick = () => {
      document.getElementById('sidebar').classList.remove('visible');
      node.classed('highlighted', false).classed('dimmed', false);
      link.classed('dimmed', false);
    };

    document.getElementById('search').addEventListener('input', (e) => {
      const q = e.target.value.toLowerCase();
      if (!q) { node.classed('dimmed', false); link.classed('dimmed', false); return; }
      const matching = new Set();
      data.nodes.forEach(n => { if (n.name.toLowerCase().includes(q) || n.tags.some(t => t.includes(q))) matching.add(n.id); });
      node.classed('dimmed', n => !matching.has(n.id));
      link.classed('dimmed', l => !matching.has(l.source.id || l.source) && !matching.has(l.target.id || l.target));
    });
  </script>
</body>
</html>
